# .github/workflows/installer-test.yml  (per-repo caller)
# Calls the central reusable installer-test workflow.
# Managed by scottconverse/installer-ci; edit there, not here.
name: installer-test
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  installer-test:
    uses: scottconverse/installer-ci/.github/workflows/installer-test.yml@main
    permissions:
      contents: read
      packages: read
    secrets: inherit
