# .github/workflows/installer-test.yml
#
# Reusable "installer test" workflow for scottconverse's PUBLIC repos.
# Auto-detects which installer type(s) a repo produces, then for each detected
# type runs a real BUILD -> INSTALL -> LAUNCH -> UPGRADE -> UNINSTALL lifecycle
# with false-pass guards G1..G8 preserved end to end.
#
# Triggers:
#   * workflow_call  (consumed by per-repo caller workflows)
#   * push to main/develop, pull_request to main, workflow_dispatch (run directly)
#
# Public repos => GitHub-hosted minutes are free; full 3-OS matrix is fine.
#
# ============================================================================
# Assembled DETERMINISTICALLY from 13 per-type recipe step groups
# (recipes/*.steps.yaml) + the detect job. Validated with actionlint.
# Only `tauri` has been through the adversarial review pass; the other 12 are
# drafted and lint-clean but their G1..G8 guards are not yet independently verified.
# ============================================================================
name: installer-test

on:
  workflow_call:
    inputs:
      force_types:
        description: 'CSV of installer types to force, overriding detection (e.g. "tauri,python-pip-wheel"). Empty = auto-detect.'
        required: false
        type: string
        default: ''
      enable_system_scope:
        description: 'Run the additional system-scope install paths where a type defines them.'
        required: false
        type: boolean
        default: true
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_types:
        description: 'CSV of installer types to force, overriding detection.'
        required: false
        type: string
        default: ''
      enable_system_scope:
        description: 'Run the additional system-scope install paths where a type defines them.'
        required: false
        type: boolean
        default: true

# Read-only token is sufficient: detection reads the tree; recipes use the
# built-in GITHUB_TOKEN only to DOWNLOAD prior release assets (contents:read)
# and, for docker-image, to pull from GHCR (packages:read).
permissions:
  contents: read
  packages: read

# One in-flight run per workflow+ref; supersede older runs of the same ref.
concurrency:
  group: installer-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Normalized access to the two knobs regardless of trigger (call vs dispatch).
  FORCE_TYPES: ${{ inputs.force_types || '' }}
  ENABLE_SYSTEM_SCOPE: ${{ (inputs.enable_system_scope || github.event_name == 'push' || github.event_name == 'pull_request') && 'true' || 'false' }}

jobs:
  # ===========================================================================
  # detect: run the detection engine, emit the matrix + noop flag.
  # ===========================================================================
  detect:
    name: Detect installer types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      noop: ${{ steps.detect.outputs.noop }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect installer types
        id: detect
        shell: bash
        env:
          FORCE_TYPES: ${{ env.FORCE_TYPES }}
        run: |
          set -eu

          # Directories we must never descend into.
          prune_find() {
            # Usage: prune_find <find-tests...>  (applied to the non-pruned branch)
            find . \
              \( -type d \( -name node_modules -o -name vendor -o -name .git \) -prune \) \
              -o \( "$@" -print \) 2>/dev/null
          }

          # True if any file whose basename matches one of the given globs exists.
          have_file() {
            local args=() g
            for g in "$@"; do args+=( -name "$g" -o ); done
            unset 'args[${#args[@]}-1]'   # drop trailing -o
            [ -n "$(prune_find -type f \( "${args[@]}" \) | head -n1)" ]
          }

          # True if any path matches one of the given -path globs (files or dirs).
          have_path() {
            local args=() g
            for g in "$@"; do args+=( -path "$g" -o ); done
            unset 'args[${#args[@]}-1]'
            [ -n "$(prune_find \( "${args[@]}" \) | head -n1)" ]
          }

          # True if EXTENDED-regex NEEDLE appears in any file matching FILEGLOBS.
          # First arg may be -i for case-insensitive.
          grep_files() {
            local ci="" needle
            if [ "$1" = "-i" ]; then ci="-i"; shift; fi
            needle="$1"; shift
            local args=() g
            for g in "$@"; do args+=( -name "$g" -o ); done
            unset 'args[${#args[@]}-1]'
            local files; files="$(prune_find -type f \( "${args[@]}" \))"
            [ -z "$files" ] && return 1
            local f
            while IFS= read -r f; do
              [ -f "$f" ] && grep -qE $ci "$needle" "$f" 2>/dev/null && return 0
            done < <(printf '%s\n' "$files")
            return 1
          }

          # Cargo.toml that is NOT under a src-tauri/ tree (tauri owns those).
          cargo_outside_tauri() {
            [ -n "$(prune_find -type f -name Cargo.toml -not -path '*/src-tauri/*' | head -n1)" ]
          }

          # Runner list per installer type. Cross-platform installers fan out to all 3.
          os_for() {
            case "$1" in
              tauri|electron|pyinstaller|dotnet|go-binary|cargo-binary)
                                 echo "ubuntu-latest macos-latest windows-latest" ;;
              shell-installer)   echo "ubuntu-latest macos-latest" ;;
              homebrew-formula)  echo "macos-latest" ;;
              python-pip-wheel|npm-bin|java-jar|docker-image|deb-rpm)
                                 echo "ubuntu-latest" ;;
              *)                 echo "ubuntu-latest" ;;
            esac
          }

          TYPES=""
          has() { printf ' %s ' "$TYPES" | grep -q " $1 "; }
          add() { has "$1" || TYPES="$TYPES $1"; }

          # --- force_types override: skip detection entirely if provided -------
          # KNOWN must list every type that has a matching recipe in the test job.
          # A forced value outside this set would create a matrix leg whose every
          # step `if:` is false -> all steps skip -> job exits 0 = false GREEN.
          # So we hard-fail on an unknown forced type instead of silently adding it.
          KNOWN="tauri electron pyinstaller python-pip-wheel npm-bin go-binary cargo-binary docker-image shell-installer deb-rpm homebrew-formula dotnet java-jar"
          if [ -n "${FORCE_TYPES:-}" ]; then
            echo "force_types override active: $FORCE_TYPES"
            IFS=',' read -ra FT <<< "$FORCE_TYPES"
            for t in "${FT[@]}"; do
              t="$(echo "$t" | tr -d '[:space:]')"
              [ -z "$t" ] && continue
              case " $KNOWN " in
                *" $t "*) add "$t" ;;
                *) echo "::error::Unknown force_types value '$t'. Known types: $KNOWN"; exit 1 ;;
              esac
            done
          else
            # --- detection (order chosen so app frameworks claim shared manifests) ---

            # tauri: authoritative signal src-tauri/tauri.conf.json
            have_path '*/src-tauri/tauri.conf.json' './src-tauri/tauri.conf.json' && add tauri

            # electron: package.json with electron / electron-builder dep (skip if tauri)
            has tauri || { grep_files '"(electron|electron-builder)"[[:space:]]*:' package.json && add electron; }

            # pyinstaller: a *.spec AND a pyinstaller dependency reference
            { have_file '*.spec' && grep_files -i 'pyinstaller' pyproject.toml setup.py setup.cfg 'requirements*.txt' Pipfile; } && add pyinstaller

            # python-pip-wheel: standard python packaging metadata
            have_file 'pyproject.toml' 'setup.py' 'setup.cfg' && add python-pip-wheel

            # npm-bin: package.json with a "bin" entry, unless it is a desktop-app manifest
            { has tauri || has electron; } || { grep_files '"bin"[[:space:]]*:' package.json && add npm-bin; }

            # go-binary
            have_file 'go.mod' && add go-binary

            # cargo-binary: Cargo.toml outside any src-tauri/ tree
            cargo_outside_tauri && add cargo-binary

            # docker-image
            have_file 'Dockerfile' 'Dockerfile.*' '*.Dockerfile' && add docker-image

            # shell-installer
            have_file 'install.sh' 'install.ps1' && add shell-installer

            # deb-rpm: debian/ packaging dir or rpm spec files
            { have_path '*/debian/control' './debian/control' '*/debian/rules' './debian/rules' \
              || have_file '*.rpmspec'; } && add deb-rpm

            # homebrew-formula: Formula/*.rb
            have_path '*/Formula/*.rb' './Formula/*.rb' && add homebrew-formula

            # dotnet
            have_file '*.csproj' '*.sln' && add dotnet

            # java-jar
            have_file 'pom.xml' 'build.gradle' 'build.gradle.kts' && add java-jar
          fi

          # --- emit matrix ---
          matrix='['
          first=1
          for t in $TYPES; do
            for os in $(os_for "$t"); do
              [ $first -eq 1 ] && first=0 || matrix="$matrix,"
              matrix="$matrix{\"type\":\"$t\",\"os\":\"$os\"}"
            done
          done
          matrix="$matrix]"

          if [ "$matrix" = "[]" ]; then
            printf 'matrix=%s\n' "[]" >>"$GITHUB_OUTPUT"
            printf 'noop=true\n'      >>"$GITHUB_OUTPUT"
            echo "detect: no installer types found; matrix=[] noop=true"
          else
            printf 'matrix=%s\n' "$matrix" >>"$GITHUB_OUTPUT"
            printf 'noop=false\n'          >>"$GITHUB_OUTPUT"
            echo "detect: types =$TYPES"
          fi

  # ===========================================================================
  # test: fan out over the detected (type, os) matrix and run each lifecycle.
  # Skips cleanly when detect found nothing (noop).
  # ===========================================================================
  test:
    name: ${{ matrix.type }} on ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.noop != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}
    env:
      ENABLE_SYSTEM_SCOPE: ${{ (inputs.enable_system_scope || github.event_name == 'push' || github.event_name == 'pull_request') && 'true' || 'false' }}
    steps:

      # ===================== tauri =====================
      - name: Checkout
        if: ${{ matrix.type == 'tauri' }}
        uses: actions/checkout@v4

      - name: Setup Node (frontend build)
        if: ${{ matrix.type == 'tauri' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        if: ${{ matrix.type == 'tauri' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        if: ${{ matrix.type == 'tauri' }}
        uses: Swatinem/rust-cache@v2
        with:
          # APP_DIR/TAURI_DIR are repo-level Actions Variables (vars.*), not env.*; a bare
          # env.TAURI_DIR would silently resolve to '' and cache the wrong workspace.
          workspaces: ${{ vars.TAURI_DIR || 'src-tauri' }} -> target

      - name: Install frontend dependencies
        if: ${{ matrix.type == 'tauri' }}
        shell: bash
        # NOTE: this step runs on all three OSes; on Windows `shell: bash` is Git Bash by
        # design. Keep the body POSIX/portable (no $HOME/chmod/xvfb here) so the Windows
        # leg does not break under MSYS path-mangling.
        working-directory: ${{ vars.APP_DIR || '.' }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # ---------- G2: BUILD THE ARTIFACT ----------
      - name: Build Tauri bundle
        if: ${{ matrix.type == 'tauri' }}
        shell: bash
        # NOTE: runs on all three OSes; on Windows `shell: bash` is Git Bash by design.
        working-directory: ${{ vars.APP_DIR || '.' }}
        run: |
          set -euo pipefail
          # Probe the project's pinned CLI exactly once, then build with ONE command path.
          # Chaining `npx --no-install tauri build || npx tauri build` was a false-pass risk:
          # a real compile failure in the first build would silently trigger a second,
          # network-fetched (unpinned) build, masking the failure / leaving stale artifacts.
          if npx --no-install tauri --version >/dev/null 2>&1; then
            RUN="npx --no-install tauri"
          else
            echo "::warning::Project-local @tauri-apps/cli not found; falling back to npx-resolved (unpinned) tauri CLI."
            RUN="npx tauri"
          fi
          # Single build invocation: a non-zero exit fails the job (G1).
          $RUN build

      # ---------- G2: VERIFY ARTIFACT EXISTS (before any install) ----------
      - name: Verify artifact exists (Linux)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' }}
        shell: bash
        working-directory: ${{ vars.APP_DIR || '.' }}
        run: |
          set -euo pipefail
          BUNDLE="${TAURI_DIR}/target/release/bundle"
          APPIMAGE=$(ls "$BUNDLE"/appimage/*.AppImage 2>/dev/null | head -n1 || true)
          DEB=$(ls "$BUNDLE"/deb/*.deb 2>/dev/null | head -n1 || true)
          if [ -z "$APPIMAGE" ] && [ -z "$DEB" ]; then
            echo "::error::No Linux Tauri artifact (.AppImage/.deb) found under $BUNDLE"
            exit 1
          fi
          echo "ARTIFACT_APPIMAGE=$APPIMAGE" >> "$GITHUB_ENV"
          echo "ARTIFACT_DEB=$DEB" >> "$GITHUB_ENV"
          echo "Found AppImage='$APPIMAGE' deb='$DEB'"
        env:
          TAURI_DIR: ${{ vars.TAURI_DIR || 'src-tauri' }}

      - name: Verify artifact exists (macOS)
        if: ${{ matrix.type == 'tauri' && runner.os == 'macOS' }}
        shell: bash
        working-directory: ${{ vars.APP_DIR || '.' }}
        run: |
          set -euo pipefail
          BUNDLE="${TAURI_DIR}/target/release/bundle"
          DMG=$(ls "$BUNDLE"/dmg/*.dmg 2>/dev/null | head -n1 || true)
          APP=$(ls -d "$BUNDLE"/macos/*.app 2>/dev/null | head -n1 || true)
          if [ -z "$DMG" ] && [ -z "$APP" ]; then
            echo "::error::No macOS Tauri artifact (.dmg/.app) found under $BUNDLE"
            exit 1
          fi
          echo "ARTIFACT_DMG=$DMG" >> "$GITHUB_ENV"
          echo "ARTIFACT_APP=$APP" >> "$GITHUB_ENV"
          echo "Found dmg='$DMG' app='$APP'"
        env:
          TAURI_DIR: ${{ vars.TAURI_DIR || 'src-tauri' }}

      - name: Verify artifact exists (Windows)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Windows' }}
        shell: pwsh
        working-directory: ${{ vars.APP_DIR || '.' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tauriDir = if ($env:TAURI_DIR) { $env:TAURI_DIR } else { 'src-tauri' }
          $bundle = "$tauriDir/target/release/bundle"
          $exe = Get-ChildItem -Path "$bundle/nsis" -Filter *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path "$bundle/nsis" -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $exe) {
            Write-Error "No Windows NSIS installer (*.exe) found under $bundle/nsis"
            exit 1
          }
          "ARTIFACT_NSIS=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Found NSIS installer: $($exe.FullName)"
        env:
          TAURI_DIR: ${{ vars.TAURI_DIR || 'src-tauri' }}

      # ---------- G8: SIGNING / NOTARIZATION (WARN, do not block) ----------
      - name: Check macOS signature / notarization (warn-only)
        if: ${{ matrix.type == 'tauri' && runner.os == 'macOS' }}
        shell: bash
        run: |
          set -uo pipefail
          APP="${ARTIFACT_APP:-}"
          if [ -z "$APP" ]; then echo "::notice::No .app to assess; skipping signature check"; exit 0; fi
          echo "--- codesign ---"
          if ! codesign -dv --verbose=4 "$APP" 2>&1; then
            echo "::warning::codesign reports app is unsigned (expected on public CI without signing secrets)"
          fi
          echo "--- spctl Gatekeeper assessment ---"
          if ! spctl --assess --type execute --verbose=4 "$APP" 2>&1; then
            echo "::warning::Gatekeeper/notarization assessment failed (expected without notarization secrets)"
          fi
          exit 0

      - name: Check Windows Authenticode signature (warn-only)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature -FilePath $env:ARTIFACT_NSIS
          Write-Host "Authenticode status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Warning "Installer is not validly signed (Status=$($sig.Status)) - expected on public CI without code-signing secrets. SmartScreen may warn end users."
          }
          exit 0

      # ---------- INSTALL (user-scope; NSIS currentUser mode) + G5 LAUNCH ----------
      - name: Install + launch (Linux, AppImage user-scope)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          cp "$ARTIFACT_APPIMAGE" "$HOME/.local/bin/app.AppImage"
          chmod +x "$HOME/.local/bin/app.AppImage"
          test -x "$HOME/.local/bin/app.AppImage" || { echo "::error::AppImage not installed/executable"; exit 1; }
          # G5: real headless GUI launch. We must assert the REAL app process, not the
          # xvfb-run wrapper: $! is the wrapper PID and stays alive even if the inner
          # binary crashed (and --appimage-extract-and-run re-execs an extracted binary),
          # which would be a false pass. Extract first so we know the inner binary name,
          # then pgrep the extracted run path.
          EXDIR="$HOME/.local/share/app-extract"
          rm -rf "$EXDIR"; mkdir -p "$EXDIR"
          ( cd "$EXDIR" && "$HOME/.local/bin/app.AppImage" --appimage-extract >/dev/null )
          APPRUN="$EXDIR/squashfs-root/AppRun"
          test -x "$APPRUN" || { echo "::error::AppImage extraction failed; AppRun not found"; exit 1; }
          xvfb-run -a "$APPRUN" &
          sleep 8
          # Match the extracted run path (anchored), not a bare basename.
          if ! pgrep -f "$EXDIR/squashfs-root" >/dev/null; then
            echo "::error::Tauri app exited/crashed within 8s of launch (no process under $EXDIR/squashfs-root)"
            exit 1
          fi
          echo "App running under $EXDIR/squashfs-root; smoke-launch OK"
          pkill -f "$EXDIR/squashfs-root" 2>/dev/null || true

      # Deb-only build must NOT skip the whole lifecycle green: install/launch/uninstall the .deb.
      - name: Install + launch (Linux, .deb system-scope)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE == '' && env.ARTIFACT_DEB != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y "$ARTIFACT_DEB"
          # Locate the installed executable owned by the .deb (do not trust a hardcoded name).
          PKG="$(dpkg-deb -f "$ARTIFACT_DEB" Package)"
          BIN="$(dpkg -L "$PKG" | grep -E '/usr/bin/|/usr/local/bin/' | head -n1 || true)"
          if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
            echo "::error::No executable installed by .deb package '$PKG'"
            dpkg -L "$PKG" || true
            exit 1
          fi
          echo "DEB_PKG=$PKG" >> "$GITHUB_ENV"
          echo "DEB_BIN=$BIN" >> "$GITHUB_ENV"
          # G5: real headless GUI launch; assert the installed binary path (anchored) is alive.
          xvfb-run -a "$BIN" &
          sleep 8
          if ! pgrep -f "$BIN" >/dev/null; then
            echo "::error::Tauri app ('$BIN') exited/crashed within 8s of launch"
            exit 1
          fi
          echo "App '$BIN' running; smoke-launch OK"
          pkill -f "$BIN" 2>/dev/null || true

      # Loud failure: an artifact existed but no Linux install path consumed it.
      - name: Fail if no Linux lifecycle path ran
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE == '' && env.ARTIFACT_DEB == '' }}
        shell: bash
        run: |
          echo "::error::Linux artifact present at verify but neither AppImage nor .deb install path ran; refusing to pass green."
          exit 1

      - name: Install + launch (macOS, .app user-scope)
        if: ${{ matrix.type == 'tauri' && runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          DEST="$HOME/Applications"
          mkdir -p "$DEST"
          if [ -n "${ARTIFACT_DMG:-}" ]; then
            MNT=$(mktemp -d)
            hdiutil attach "$ARTIFACT_DMG" -nobrowse -mountpoint "$MNT" || exit 1
            SRC_APP=$(ls -d "$MNT"/*.app | head -n1)
            cp -R "$SRC_APP" "$DEST/"
            hdiutil detach "$MNT" || true
          else
            cp -R "$ARTIFACT_APP" "$DEST/"
          fi
          APP_PATH=$(ls -d "$DEST"/*.app | head -n1)
          test -d "$APP_PATH" || { echo "::error::.app not installed"; exit 1; }
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          # G5: real GUI launch via open, assert process appears, then quit.
          BIN=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
          EXEC_PATH="$APP_PATH/Contents/MacOS/$BIN"
          echo "APP_EXEC=$EXEC_PATH" >> "$GITHUB_ENV"
          open "$APP_PATH"
          sleep 8
          # Anchor pgrep/pkill to the FULL installed executable path. A bare basename
          # ("$BIN") can substring-match an unrelated process on the shared runner = false pass.
          if ! pgrep -f "$EXEC_PATH" >/dev/null; then
            echo "::error::Tauri app process not running after launch ($EXEC_PATH)"
            exit 1
          fi
          echo "App '$EXEC_PATH' running; smoke-launch OK"
          pkill -f "$EXEC_PATH" 2>/dev/null || true

      - name: Install + launch (Windows, NSIS currentUser)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Windows' }}
        shell: pwsh
        env:
          # Product/install-dir match is derived from a documented var, not hardcoded.
          # Defaults to the literal type name so a generic Tauri repo still has a sane match.
          PRODUCT_MATCH: ${{ vars.TAURI_PRODUCT_NAME || vars.APP_NAME || 'tauri' }}
        run: |
          $ErrorActionPreference = 'Stop'
          # G1: silent install, wait, assert exit code 0.
          $p = Start-Process -FilePath $env:ARTIFACT_NSIS -ArgumentList '/S' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "NSIS installer exited with $($p.ExitCode)"; exit 1 }
          # NSIS currentUser installs under %LOCALAPPDATA%\<ProductName>. Locate installed exe
          # by matching the derived product name (no hardcoded 'CivicCast').
          $match = [regex]::Escape($env:PRODUCT_MATCH)
          $exe = Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch 'uninstall' -and $_.DirectoryName -match $match } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "Installed application exe not found under $env:LOCALAPPDATA (product match: '$($env:PRODUCT_MATCH)'). Set vars.TAURI_PRODUCT_NAME to the NSIS productName."
            exit 1
          }
          "INSTALLED_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "INSTALL_DIR=$($exe.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Installed exe: $($exe.FullName)"
          # G5: real GUI launch, assert it stays alive, then stop.
          $app = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 8
          $live = Get-Process -Id $app.Id -ErrorAction SilentlyContinue
          if (-not $live -or $app.HasExited) {
            Write-Error "Tauri app exited/crashed within 8s of launch"
            exit 1
          }
          Write-Host "App alive (pid $($app.Id)); smoke-launch OK"
          Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue

      # ---------- G6: REAL UPGRADE (install prior release first, then upgrade) ----------
      - name: Upgrade over previous release (Windows)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Windows' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PRODUCT_MATCH: ${{ vars.TAURI_PRODUCT_NAME || vars.APP_NAME || 'tauri' }}
        run: |
          $ErrorActionPreference = 'Stop'
          # Distinguish "no releases exist yet" (legit skip) from "download failed" (must FAIL).
          $tag = (gh release list --repo $env:GITHUB_REPOSITORY --limit 1 --json tagName --jq '.[0].tagName' 2>$null)
          if (-not $tag) {
            Write-Host "::notice::No published release found; SKIPPED upgrade test (clean-machine install is not an upgrade)."
            exit 0
          }
          Write-Host "Previous release tag: $tag"
          $tmp = New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP 'prev')
          # Releases exist: a download failure here is a REAL error (do not swallow it).
          gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern "*-setup.exe" --dir $tmp.FullName --clobber
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to download prior-release NSIS asset for $tag"; exit 1 }
          $prev = Get-ChildItem -Path $tmp.FullName -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $prev) {
            Write-Host "::notice::Release $tag has no *-setup.exe asset; SKIPPED upgrade test."
            exit 0
          }
          $p1 = Start-Process -FilePath $prev.FullName -ArgumentList '/S' -Wait -PassThru
          if ($p1.ExitCode -ne 0) { Write-Error "Prior-version install failed ($($p1.ExitCode))"; exit 1 }
          Write-Host "Prior version installed (dirty state created): $($prev.Name)"
          # Now upgrade with freshly built installer.
          $p2 = Start-Process -FilePath $env:ARTIFACT_NSIS -ArgumentList '/S' -Wait -PassThru
          if ($p2.ExitCode -ne 0) { Write-Error "Upgrade install failed ($($p2.ExitCode))"; exit 1 }
          $match = [regex]::Escape($env:PRODUCT_MATCH)
          $exe = Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch 'uninstall' -and $_.DirectoryName -match $match } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "App missing after upgrade"; exit 1 }
          $app = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 8
          if ($app.HasExited) { Write-Error "Upgraded app crashed on launch"; exit 1 }
          Write-Host "Upgrade verified; app launches."
          Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue

      - name: Upgrade over previous release (Linux AppImage)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # Distinguish "no releases" (legit skip) from "download failed" (must FAIL).
          PREV_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"
          if [ -z "${PREV_TAG:-}" ] || [ "${PREV_TAG}" = "null" ]; then
            echo "::notice::No published release found; SKIPPED upgrade test."
            exit 0
          fi
          echo "Previous release tag: $PREV_TAG"
          set -e
          TMP="$(mktemp -d)"
          # Releases exist: a download failure here is a REAL error (do not swallow it).
          gh release download "$PREV_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.AppImage" --dir "$TMP" --clobber
          PREV=$(ls "$TMP"/*.AppImage 2>/dev/null | head -n1 || true)
          if [ -z "$PREV" ]; then
            echo "::notice::Release $PREV_TAG has no .AppImage asset; SKIPPED upgrade test."
            exit 0
          fi
          mkdir -p "$HOME/.local/bin"
          cp "$PREV" "$HOME/.local/bin/app.AppImage"
          chmod +x "$HOME/.local/bin/app.AppImage"
          echo "Prior version installed (dirty state): $(basename "$PREV")"
          # Upgrade = overwrite with freshly built artifact.
          cp "$ARTIFACT_APPIMAGE" "$HOME/.local/bin/app.AppImage"
          chmod +x "$HOME/.local/bin/app.AppImage"
          # Launch the real app, not the xvfb-run wrapper: extract then pgrep the run path.
          EXDIR="$HOME/.local/share/app-extract-upg"
          rm -rf "$EXDIR"; mkdir -p "$EXDIR"
          ( cd "$EXDIR" && "$HOME/.local/bin/app.AppImage" --appimage-extract >/dev/null )
          APPRUN="$EXDIR/squashfs-root/AppRun"
          test -x "$APPRUN" || { echo "::error::Upgraded AppImage extraction failed"; exit 1; }
          xvfb-run -a "$APPRUN" &
          sleep 8
          pgrep -f "$EXDIR/squashfs-root" >/dev/null || { echo "::error::Upgraded app crashed on launch"; exit 1; }
          echo "Upgrade verified; app launches."
          pkill -f "$EXDIR/squashfs-root" 2>/dev/null || true

      - name: Upgrade over previous release (macOS)
        if: ${{ matrix.type == 'tauri' && runner.os == 'macOS' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # Distinguish "no releases" (legit skip) from "download failed" (must FAIL).
          PREV_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"
          if [ -z "${PREV_TAG:-}" ] || [ "${PREV_TAG}" = "null" ]; then
            echo "::notice::No published release found; SKIPPED upgrade test."
            exit 0
          fi
          echo "Previous release tag: $PREV_TAG"
          set -e
          TMP="$(mktemp -d)"
          # Releases exist: a download failure here is a REAL error (do not swallow it).
          gh release download "$PREV_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.dmg" --dir "$TMP" --clobber
          PREV=$(ls "$TMP"/*.dmg 2>/dev/null | head -n1 || true)
          if [ -z "$PREV" ]; then
            echo "::notice::Release $PREV_TAG has no .dmg asset; SKIPPED upgrade test."
            exit 0
          fi
          DEST="$HOME/Applications"; mkdir -p "$DEST"
          MNT=$(mktemp -d)
          hdiutil attach "$PREV" -nobrowse -mountpoint "$MNT"
          cp -R "$(ls -d "$MNT"/*.app | head -n1)" "$DEST/"
          hdiutil detach "$MNT" || true
          echo "Prior version installed (dirty state): $(basename "$PREV")"
          # Upgrade = overwrite .app from freshly built artifact.
          if [ -n "${ARTIFACT_DMG:-}" ]; then
            MNT2=$(mktemp -d); hdiutil attach "$ARTIFACT_DMG" -nobrowse -mountpoint "$MNT2"
            cp -R "$(ls -d "$MNT2"/*.app | head -n1)" "$DEST/"; hdiutil detach "$MNT2" || true
          else
            cp -R "$ARTIFACT_APP" "$DEST/"
          fi
          APP_PATH=$(ls -d "$DEST"/*.app | head -n1)
          BIN=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
          EXEC_PATH="$APP_PATH/Contents/MacOS/$BIN"
          # G8 stays warn-only: a DOWNLOADED prior-release asset carries com.apple.quarantine,
          # so an unsigned/un-notarized prior release would be blocked by Gatekeeper on `open`
          # and turn G6 RED. Strip quarantine before launching so signing remains warn-only.
          xattr -dr com.apple.quarantine "$APP_PATH" 2>/dev/null || true
          open "$APP_PATH"; sleep 8
          # Anchor to the full executable path, not a bare basename.
          pgrep -f "$EXEC_PATH" >/dev/null || { echo "::error::Upgraded app not running ($EXEC_PATH)"; exit 1; }
          echo "Upgrade verified; app launches."
          pkill -f "$EXEC_PATH" 2>/dev/null || true

      # ---------- G7: UNINSTALL + negative removal assertion ----------
      - name: Uninstall + verify removal (Windows)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Windows' }}
        shell: pwsh
        env:
          PRODUCT_MATCH: ${{ vars.TAURI_PRODUCT_NAME || vars.APP_NAME || 'tauri' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $match = [regex]::Escape($env:PRODUCT_MATCH)
          $dir = $env:INSTALL_DIR
          $uninst = Get-ChildItem -Path $dir -Filter 'uninstall*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $uninst) {
            $uninst = Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -Filter 'uninstall*.exe' -ErrorAction SilentlyContinue |
              Where-Object { $_.DirectoryName -match $match } | Select-Object -First 1
          }
          if (-not $uninst) { Write-Error "Uninstaller not found; cannot verify removal"; exit 1 }
          $p = Start-Process -FilePath $uninst.FullName -ArgumentList '/S' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "Uninstaller exited with $($p.ExitCode)"; exit 1 }
          Start-Sleep -Seconds 5
          # G7: negative assertion - installed exe AND install directory must be gone.
          if (Test-Path $env:INSTALLED_EXE) {
            Write-Error "Uninstall incomplete: $($env:INSTALLED_EXE) still present"
            exit 1
          }
          $remaining = if ($env:INSTALL_DIR -and (Test-Path $env:INSTALL_DIR)) { (Get-ChildItem -Path $env:INSTALL_DIR -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          if ($remaining -gt 0) {
            Write-Error "Uninstall incomplete: $remaining file(s) remain under $($env:INSTALL_DIR)"
            exit 1
          }
          Write-Host "Uninstall verified: application files removed."
          # Tripwire: a successful Windows lifecycle reached its end.
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Uninstall + verify removal (Linux AppImage)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -f "$HOME/.local/bin/app.AppImage"
          rm -rf "$HOME/.local/share/app-extract" "$HOME/.local/share/app-extract-upg"
          # G7: negative assertion - file must be gone.
          if [ -e "$HOME/.local/bin/app.AppImage" ]; then
            echo "::error::Uninstall incomplete: AppImage still present"
            exit 1
          fi
          echo "Uninstall verified: AppImage removed."
          # Tripwire: a successful Linux (AppImage) lifecycle reached its end.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (Linux deb)
        if: ${{ matrix.type == 'tauri' && runner.os == 'Linux' && env.ARTIFACT_APPIMAGE == '' && env.ARTIFACT_DEB != '' }}
        shell: bash
        run: |
          set -euo pipefail
          PKG="${DEB_PKG:-}"
          if [ -z "$PKG" ]; then echo "::error::DEB_PKG not recorded; cannot uninstall"; exit 1; fi
          sudo apt-get purge -y "$PKG"
          # G7: negative assertion - package must no longer be installed and binary gone.
          if dpkg-query -W -f='${Status}\n' "$PKG" 2>/dev/null | grep -q "install ok installed"; then
            echo "::error::Uninstall incomplete: package '$PKG' still installed"
            exit 1
          fi
          if [ -n "${DEB_BIN:-}" ] && [ -e "$DEB_BIN" ]; then
            echo "::error::Uninstall incomplete: $DEB_BIN still present"
            exit 1
          fi
          echo "Uninstall verified: .deb package removed."
          # Tripwire: a successful Linux (.deb) lifecycle reached its end.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (macOS)
        if: ${{ matrix.type == 'tauri' && runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="${APP_PATH:-}"
          if [ -z "$APP_PATH" ]; then APP_PATH=$(ls -d "$HOME/Applications"/*.app 2>/dev/null | head -n1 || true); fi
          rm -rf "$APP_PATH"
          # G7: negative assertion - .app must be gone.
          if [ -d "$APP_PATH" ]; then
            echo "::error::Uninstall incomplete: $APP_PATH still present"
            exit 1
          fi
          echo "Uninstall verified: .app removed."
          # Tripwire: a successful macOS lifecycle reached its end.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"


      # ===================== electron =====================
      - name: Checkout
        if: matrix.type == 'electron'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.type == 'electron'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: matrix.type == 'electron'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # ---------------------------------------------------------------------------
      # G2: BUILD THE ARTIFACT. Never assume dist/ exists. electron-builder is the
      # dominant packager; produce the OS-native target explicitly. CSC_IDENTITY_AUTO_
      # DISCOVERY=false prevents electron-builder from attempting (and hard-failing on)
      # signing when no cert secrets are present on public CI.
      # ---------------------------------------------------------------------------
      - name: Build Electron installer (Linux AppImage)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx --no-install electron-builder --linux AppImage --publish never
          echo "Built artifacts:"; ls -la dist/

      - name: Build Electron installer (macOS DMG)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx --no-install electron-builder --mac dmg --publish never
          echo "Built artifacts:"; ls -la dist/

      - name: Build Electron installer (Windows NSIS)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          npx --no-install electron-builder --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed with exit $LASTEXITCODE" }
          Write-Host "Built artifacts:"; Get-ChildItem dist

      # ---------------------------------------------------------------------------
      # G2: VERIFY THE ARTIFACT EXISTS before install. Resolve the exact path and
      # export it for downstream steps. Fail hard (negative path) if nothing matched.
      # ---------------------------------------------------------------------------
      - name: Verify artifact exists (Linux)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(find dist -maxdepth 1 -name '*.AppImage' | head -n1)"
          if [ -z "$artifact" ] || [ ! -f "$artifact" ]; then
            echo "::error::No .AppImage artifact found in dist/"; exit 1
          fi
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "Verified artifact: $artifact"

      - name: Verify artifact exists (macOS)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(find dist -maxdepth 1 -name '*.dmg' | head -n1)"
          if [ -z "$artifact" ] || [ ! -f "$artifact" ]; then
            echo "::error::No .dmg artifact found in dist/"; exit 1
          fi
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "Verified artifact: $artifact"

      - name: Verify artifact exists (Windows)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = Get-ChildItem dist -Filter '*.exe' | Where-Object { $_.Name -match 'Setup|setup' } | Select-Object -First 1
          if (-not $artifact) { $artifact = Get-ChildItem dist -Filter '*.exe' | Select-Object -First 1 }
          if (-not $artifact -or -not (Test-Path $artifact.FullName)) {
            Write-Error "No NSIS .exe artifact found in dist/"; exit 1
          }
          "ARTIFACT=$($artifact.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Verified artifact: $($artifact.FullName)"

      # ---------------------------------------------------------------------------
      # G8: SIGNING / NOTARIZATION (structural, WARN-only on public CI without secrets).
      # macOS: codesign -dv + spctl Gatekeeper assessment. Windows: Authenticode.
      # Linux AppImage has no OS-level signing requirement -> informational only.
      # ---------------------------------------------------------------------------
      - name: Check code signature (macOS, WARN-only)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          mnt="$(mktemp -d)"
          hdiutil attach "$ARTIFACT" -nobrowse -readonly -mountpoint "$mnt" >/dev/null
          app="$(find "$mnt" -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "$app" ]; then
            echo "::warning::No .app inside DMG to assess signing"; hdiutil detach "$mnt" >/dev/null || true; exit 0
          fi
          echo "codesign verbose:"; codesign -dv --verbose=4 "$app" 2>&1 || echo "::warning::app is unsigned (expected on public CI without CSC secrets)"
          if codesign --verify --deep --strict "$app" 2>/dev/null; then
            echo "codesign verify: OK"
          else
            echo "::warning::codesign --verify failed (unsigned/ad-hoc build on public CI)"
          fi
          if spctl --assess --type execute --verbose=4 "$app" 2>&1 | grep -q accepted; then
            echo "Gatekeeper: accepted"
          else
            echo "::warning::Gatekeeper would reject this app (not notarized) - expected without notarization secrets"
          fi
          hdiutil detach "$mnt" >/dev/null || true

      - name: Check Authenticode signature (Windows, WARN-only)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $sig = Get-AuthenticodeSignature -FilePath $env:ARTIFACT
          Write-Host "Authenticode status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Warning "Installer is not Authenticode-signed (Status=$($sig.Status)). Expected on public CI without signing secrets; SmartScreen would warn end users."
          } else {
            Write-Host "Signed by: $($sig.SignerCertificate.Subject)"
          }

      - name: Note Linux AppImage signing (informational)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        run: echo "::notice::AppImage has no OS-enforced code signing; optional GPG signing not configured."

      # ---------------------------------------------------------------------------
      # INSTALL + LAUNCH (G1 exit codes, G5 real GUI launch).
      # Linux AppImage: user-scope by nature (no system install). chmod +x and run.
      # ---------------------------------------------------------------------------
      - name: Install + launch (Linux, AppImage, user-scope)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb
          installed="$HOME/.local/bin/electron-app-under-test.AppImage"
          install -Dm755 "$ARTIFACT" "$installed"
          test -x "$installed" || { echo "::error::installed AppImage not executable"; exit 1; }
          # G5: real headless GUI launch. --no-sandbox required for AppImage chrome-sandbox under CI.
          # NOTE: $! would be the xvfb-run WRAPPER pid (stays alive even if Electron crashes),
          # so verify the REAL inner app by its full install path via pgrep.
          xvfb-run -a --server-args="-screen 0 1280x1024x24" "$installed" --no-sandbox --enable-logging &
          wrapper_pid=$!
          sleep 15
          app_pid="$(pgrep -f "$installed" | head -n1 || true)"
          if [ -n "$app_pid" ] && kill -0 "$app_pid" 2>/dev/null; then
            echo "App is alive (pid $app_pid) - GUI launch OK"
            pkill -f "$installed" 2>/dev/null || true
            kill "$wrapper_pid" 2>/dev/null || true
            wait "$wrapper_pid" 2>/dev/null || true
          else
            echo "::error::Electron app exited prematurely / no process matching $installed - launch failed"
            pkill -f "$installed" 2>/dev/null || true
            kill "$wrapper_pid" 2>/dev/null || true
            exit 1
          fi

      - name: Install + launch (macOS, DMG -> /Applications, system-scope)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mnt="$(mktemp -d)"
          hdiutil attach "$ARTIFACT" -nobrowse -mountpoint "$mnt"
          app_src="$(find "$mnt" -maxdepth 1 -name '*.app' | head -n1)"
          test -n "$app_src" || { echo "::error::no .app inside DMG"; hdiutil detach "$mnt" || true; exit 1; }
          app_name="$(basename "$app_src")"
          sudo cp -R "$app_src" /Applications/
          hdiutil detach "$mnt"
          app_path="/Applications/$app_name"
          test -d "$app_path" || { echo "::error::app not installed to /Applications"; exit 1; }
          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"
          echo "APP_NAME=$app_name" >> "$GITHUB_ENV"
          bin="$app_path/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          test -x "$bin" || { echo "::error::app binary missing/not executable: $bin"; exit 1; }
          echo "APP_BIN=$bin" >> "$GITHUB_ENV"
          # G5: real GUI launch (macOS runners have a window server, no xvfb needed).
          open -a "$app_path"
          sleep 15
          # G5: match the ABSOLUTE binary path - a bare basename ("Electron"/helper) would
          # substring-match unrelated processes and produce a false pass.
          if pgrep -f "$bin" >/dev/null; then
            echo "App process running ($bin) - GUI launch OK"
            osascript -e "quit app \"${app_name%.app}\"" 2>/dev/null || pkill -f "$bin" || true
          else
            echo "::error::Electron app did not start (no process matching $bin)"; exit 1
          fi

      - name: Install + launch (Windows, NSIS, per-user + per-machine)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # G1: -Wait -PassThru + assert ExitCode. NSIS silent flag /S; allusers per-machine.
          $proc = Start-Process -FilePath $env:ARTIFACT -ArgumentList '/S','/allusers' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { Write-Error "Installer exited with $($proc.ExitCode)"; exit 1 }
          # Resolve installed exe: electron-builder NSIS per-machine default -> %ProgramFiles%; per-user -> %LOCALAPPDATA%\Programs
          $roots = @(
            "$env:ProgramFiles",
            "${env:ProgramFiles(x86)}",
            "$env:LOCALAPPDATA\Programs"
          ) | Where-Object { $_ -and (Test-Path $_) }
          $exe = $null
          foreach ($r in $roots) {
            $exe = Get-ChildItem -Path $r -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
                   Where-Object { $_.VersionInfo.FileDescription -or $_.FullName -match 'Electron|app' } |
                   Select-Object -First 1
            if ($exe) { break }
          }
          if (-not $exe) { Write-Error "Installed Electron exe not found under $($roots -join ', ')"; exit 1 }
          if (-not (Test-Path $exe.FullName)) { Write-Error "Resolved exe path missing: $($exe.FullName)"; exit 1 }
          "INSTALLED_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "INSTALL_DIR=$($exe.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Installed exe: $($exe.FullName)"
          # G5: real GUI launch (Windows runner has an interactive desktop session).
          $app = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 15
          $live = Get-Process -Id $app.Id -ErrorAction SilentlyContinue
          if (-not $live) { Write-Error "Electron app process exited prematurely - launch failed"; exit 1 }
          Write-Host "App process running (pid $($app.Id)) - GUI launch OK"
          Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue
          Get-Process | Where-Object { $_.Path -eq $exe.FullName } | Stop-Process -Force -ErrorAction SilentlyContinue

      # ---------------------------------------------------------------------------
      # G6: REAL UPGRADE. Download the latest PUBLISHED release asset (a genuine prior
      # version), install it FIRST to create dirty state, THEN install the freshly
      # built current artifact over it. Graceful skip when no prior release exists.
      # G3: correct ${{ }} expressions + proper release-download URL slashes.
      # ---------------------------------------------------------------------------
      - name: Upgrade over previous release (Linux)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          asset_url="$(gh release view --repo "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".AppImage")) | .url' 2>/dev/null | head -n1 || true)"
          if [ -z "$asset_url" ]; then
            echo "::notice::No prior published .AppImage release - skipping upgrade test"; exit 0
          fi
          echo "Prior asset: $asset_url"
          curl -fL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" -o prev.AppImage "$asset_url"
          install -Dm755 prev.AppImage "$HOME/.local/bin/electron-app-under-test.AppImage"
          test -x "$HOME/.local/bin/electron-app-under-test.AppImage"
          echo "Prior version installed (dirty state created)."
          # Upgrade: overwrite with current build.
          install -Dm755 "$ARTIFACT" "$HOME/.local/bin/electron-app-under-test.AppImage"
          test -x "$HOME/.local/bin/electron-app-under-test.AppImage" || { echo "::error::upgrade overwrite failed"; exit 1; }
          echo "Upgrade applied over prior version."

      - name: Upgrade over previous release (macOS)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          asset_url="$(gh release view --repo "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".dmg")) | .url' 2>/dev/null | head -n1 || true)"
          if [ -z "$asset_url" ]; then
            echo "::notice::No prior published .dmg release - skipping upgrade test"; exit 0
          fi
          echo "Prior asset: $asset_url"
          curl -fL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" -o prev.dmg "$asset_url"
          mnt="$(mktemp -d)"
          hdiutil attach prev.dmg -nobrowse -mountpoint "$mnt"
          prev_app="$(find "$mnt" -maxdepth 1 -name '*.app' | head -n1)"
          test -n "$prev_app" || { echo "::error::no .app in prior DMG"; hdiutil detach "$mnt" || true; exit 1; }
          prev_name="$(basename "$prev_app")"
          sudo rm -rf "/Applications/$prev_name"
          sudo cp -R "$prev_app" /Applications/
          hdiutil detach "$mnt"
          test -d "/Applications/$prev_name" || { echo "::error::prior app not installed"; exit 1; }
          # G6: strip Gatekeeper quarantine from the downloaded prior release so an
          # unsigned prior build does not hard-fail (G8 stays warn-only).
          sudo xattr -dr com.apple.quarantine "/Applications/$prev_name" 2>/dev/null || true
          echo "Prior version installed (dirty state created)."
          # Upgrade: install current build over it.
          mnt2="$(mktemp -d)"
          hdiutil attach "$ARTIFACT" -nobrowse -mountpoint "$mnt2"
          cur_app="$(find "$mnt2" -maxdepth 1 -name '*.app' | head -n1)"
          cur_name="$(basename "$cur_app")"
          sudo rm -rf "/Applications/$cur_name"
          sudo cp -R "$cur_app" /Applications/
          hdiutil detach "$mnt2"
          test -d "/Applications/$cur_name" || { echo "::error::upgrade install failed"; exit 1; }
          # Persist BOTH installed app names so the uninstall step removes/asserts every variant.
          echo "PREV_APP_NAME=$prev_name" >> "$GITHUB_ENV"
          echo "CUR_APP_NAME=$cur_name" >> "$GITHUB_ENV"
          echo "Upgrade applied over prior version."

      - name: Upgrade over previous release (Windows)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assetUrl = (gh release view --repo "$env:REPO" --json assets `
            --jq '.assets[] | select(.name | endswith(".exe")) | .url' 2>$null | Select-Object -First 1)
          if (-not $assetUrl) {
            Write-Host "::notice::No prior published .exe release - skipping upgrade test"; exit 0
          }
          Write-Host "Prior asset: $assetUrl"
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/octet-stream' }
          Invoke-WebRequest -Uri $assetUrl -Headers $headers -OutFile prev.exe
          $p1 = Start-Process -FilePath (Resolve-Path prev.exe) -ArgumentList '/S','/allusers' -Wait -PassThru
          if ($p1.ExitCode -ne 0) { Write-Error "Prior installer failed ($($p1.ExitCode))"; exit 1 }
          Write-Host "Prior version installed (dirty state created)."
          # Upgrade: run current installer over it.
          $p2 = Start-Process -FilePath $env:ARTIFACT -ArgumentList '/S','/allusers' -Wait -PassThru
          if ($p2.ExitCode -ne 0) { Write-Error "Upgrade installer failed ($($p2.ExitCode))"; exit 1 }
          Write-Host "Upgrade applied over prior version."

      # ---------------------------------------------------------------------------
      # G7: REAL UNINSTALL + negative removal assertion (fails if anything remains).
      # ---------------------------------------------------------------------------
      - name: Uninstall + verify removal (Linux)
        if: matrix.type == 'electron' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          target="$HOME/.local/bin/electron-app-under-test.AppImage"
          rm -f "$target"
          # AppImage may create a per-user config dir on first run; clean conservatively.
          rm -rf "$HOME/.config/electron-app-under-test" 2>/dev/null || true
          if [ -e "$target" ]; then
            echo "::error::AppImage still present after uninstall: $target"; exit 1
          fi
          echo "Uninstall verified: AppImage removed."
          # Tripwire: full lifecycle completed on this OS leg (catches all-skip downstream).
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (macOS)
        if: matrix.type == 'electron' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # Remove EVERY variant installed during launch/upgrade and assert each is gone.
          # Names come from the install step (APP_NAME) and the upgrade step
          # (PREV_APP_NAME from the prior release, CUR_APP_NAME from the new build).
          targets=()
          [ -n "${APP_NAME:-}" ] && targets+=("/Applications/$APP_NAME")
          [ -n "${PREV_APP_NAME:-}" ] && targets+=("/Applications/$PREV_APP_NAME")
          [ -n "${CUR_APP_NAME:-}" ] && targets+=("/Applications/$CUR_APP_NAME")
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "::error::no installed app names recorded - nothing to uninstall (would be a false pass)"; exit 1
          fi
          for t in "${targets[@]}"; do
            sudo rm -rf "$t"
          done
          # G7: negative assertion - every variant must be gone.
          for t in "${targets[@]}"; do
            if [ -e "$t" ]; then
              echo "::error::app still present after uninstall: $t"; exit 1
            fi
          done
          echo "Uninstall verified: .app removed from /Applications."
          # Tripwire: full lifecycle completed on this OS leg (catches all-skip downstream).
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (Windows)
        if: matrix.type == 'electron' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # electron-builder NSIS drops Uninstall <App>.exe next to the app.
          $uninstaller = Get-ChildItem -Path $env:INSTALL_DIR -Filter 'Uninstall*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $uninstaller) { Write-Error "Uninstaller not found in $env:INSTALL_DIR"; exit 1 }
          # G1: -Wait -PassThru + assert exit code.
          $proc = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S','--force-run=false' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { Write-Error "Uninstaller exited with $($proc.ExitCode)"; exit 1 }
          Start-Sleep -Seconds 5
          # G7: negative assertion - install dir / exe must be gone.
          if (Test-Path $env:INSTALLED_EXE) { Write-Error "Installed exe still present: $env:INSTALLED_EXE"; exit 1 }
          if ((Test-Path $env:INSTALL_DIR) -and (Get-ChildItem $env:INSTALL_DIR -ErrorAction SilentlyContinue)) {
            Write-Error "Install dir not empty after uninstall: $env:INSTALL_DIR"; exit 1
          }
          Write-Host "Uninstall verified: exe and install dir removed."
          # Tripwire: full lifecycle completed on this OS leg (catches all-skip downstream).
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8


      # ===================== pyinstaller =====================
      - name: Checkout (pyinstaller)
        if: matrix.type == 'pyinstaller'
        uses: actions/checkout@v4

      - name: Set up Python (pyinstaller)
        if: matrix.type == 'pyinstaller'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------------------------------------------------------------------------
      # G4: OS-specific build deps in their own idiomatic-shell steps.
      # Linux needs Tk dev headers (CustomTkinter -> tkinter) at build time and
      # X11/xcb runtime libs + xvfb for the headless GUI launch later (G5).
      # ---------------------------------------------------------------------------
      - name: Install Linux build/runtime deps (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-tk tk-dev xvfb libx11-6 libxext6 libxrender1 libxtst6 libxi6 libxcb1 libxkbcommon0 libgl1 libglib2.0-0

      - name: Install Python deps + PyInstaller (pyinstaller)
        if: matrix.type == 'pyinstaller'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pyinstaller

      # ---------------------------------------------------------------------------
      # G2 + G4: BUILD the artifact in-job. Never assume dist/ exists.
      # Prefer the repo's own *.spec; otherwise reproduce the documented onedir
      # --windowed invocation. Each OS step is idiomatic to its single shell.
      # We capture a canonical APP_NAME for downstream steps.
      # ---------------------------------------------------------------------------
      - name: Build PyInstaller artifact - Unix (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os != 'Windows'
        shell: bash
        env:
          APP_NAME: CivicTransparencyToolkit
          ENTRY: main.py
        run: |
          set -euo pipefail
          rm -rf build dist
          SEP=":"
          EXTRA_DATA=()
          [ -d prompts ]   && EXTRA_DATA+=(--add-data "prompts${SEP}prompts")
          [ -d templates ] && EXTRA_DATA+=(--add-data "templates${SEP}templates")
          ICON=()
          if [ -f assets/icon.icns ]; then ICON=(--icon assets/icon.icns)
          elif [ -f assets/icon.png ]; then ICON=(--icon assets/icon.png); fi
          SPEC="$(ls *.spec 2>/dev/null | head -n1 || true)"
          if [ -n "$SPEC" ]; then
            echo "Building from spec: $SPEC"
            python -m PyInstaller --noconfirm --clean "$SPEC"
          else
            echo "No .spec found; building from $ENTRY"
            python -m PyInstaller --name "$APP_NAME" --onedir --windowed "${ICON[@]}" "${EXTRA_DATA[@]}" --hidden-import yt_dlp --hidden-import youtube_transcript_api --hidden-import docx --noconfirm --clean "$ENTRY"
          fi
          ls -la dist/
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"

      - name: Build PyInstaller artifact - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        env:
          APP_NAME: CivicTransparencyToolkit
          ENTRY: main.py
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist }
          $extra = @()
          if (Test-Path prompts)   { $extra += @('--add-data', 'prompts;prompts') }
          if (Test-Path templates) { $extra += @('--add-data', 'templates;templates') }
          $icon = @()
          if (Test-Path assets/icon.ico) { $icon = @('--icon', 'assets/icon.ico') }
          $spec = Get-ChildItem -Filter *.spec -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($spec) {
            Write-Host "Building from spec: $($spec.Name)"
            python -m PyInstaller --noconfirm --clean $spec.FullName
          } else {
            Write-Host "No .spec found; building from $env:ENTRY"
            python -m PyInstaller `
              --name $env:APP_NAME --onedir --windowed `
              @icon @extra `
              --hidden-import yt_dlp `
              --hidden-import youtube_transcript_api `
              --hidden-import docx `
              --noconfirm --clean $env:ENTRY
          }
          # G1: a crashed PyInstaller turns the job red.
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed with exit code $LASTEXITCODE" }
          Get-ChildItem dist
          "APP_NAME=$env:APP_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ---------------------------------------------------------------------------
      # G2: VERIFY the artifact actually exists before we try to "install" it.
      # onedir layout: Linux -> dist/<APP>/<APP> ; Windows -> dist/<APP>/<APP>.exe ;
      # macOS --windowed -> dist/<APP>.app (bundle).
      # ---------------------------------------------------------------------------
      - name: Verify build artifact - Linux (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          BIN="dist/${APP_NAME}/${APP_NAME}"
          if [ ! -x "$BIN" ]; then echo "::error::Expected onedir binary missing: $BIN"; ls -R dist || true; exit 1; fi
          file "$BIN"
          echo "Artifact verified: $BIN"

      - name: Verify build artifact - macOS (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/${APP_NAME}.app"
          BIN="$APP/Contents/MacOS/${APP_NAME}"
          if [ ! -d "$APP" ];  then echo "::error::Expected .app bundle missing: $APP"; ls -R dist || true; exit 1; fi
          if [ ! -f "$BIN" ];  then echo "::error::Bundle executable missing: $BIN"; exit 1; fi
          echo "Artifact verified: $APP"

      - name: Verify build artifact - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = "dist/$env:APP_NAME/$env:APP_NAME.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "::error::Expected onedir exe missing: $exe"
            Get-ChildItem -Recurse dist | Select-Object FullName
            exit 1
          }
          Write-Host "Artifact verified: $exe"

      # ---------------------------------------------------------------------------
      # G8: SIGNING / NOTARIZATION structural check. PyInstaller output is unsigned
      # on public CI (no secrets). WARN, do not hard-fail, so status is visible.
      # ---------------------------------------------------------------------------
      - name: Signing check - macOS Gatekeeper/codesign WARN (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          APP="dist/${APP_NAME}.app"
          echo "== codesign -dv =="
          if codesign -dv --verbose=4 "$APP" 2>&1 | tee /tmp/cs.txt; then :; fi
          echo "== spctl assess (Gatekeeper) =="
          if spctl --assess --type execute --verbose=4 "$APP" 2>&1 | tee /tmp/spctl.txt; then
            echo "App is accepted by Gatekeeper."
          else
            echo "::warning title=Unsigned/Unnotarized::'${APP}' is not signed/notarized (expected on public CI without Developer ID + notarytool secrets). Users will hit Gatekeeper. codesign/spctl output above."
          fi

      - name: Signing check - Windows Authenticode WARN (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = "dist/$env:APP_NAME/$env:APP_NAME.exe"
          $sig = Get-AuthenticodeSignature $exe
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Host "::warning title=Unsigned binary::'$exe' has no valid Authenticode signature (Status=$($sig.Status)). Expected on public CI without a code-signing cert; users may see SmartScreen. Not failing the build."
          } else {
            Write-Host "Authenticode signature is valid: $($sig.SignerCertificate.Subject)"
          }

      # ---------------------------------------------------------------------------
      # INSTALL (user-scope). PyInstaller has no native OS installer / no
      # system-scope concept of its own: distribution is a zip that the user
      # extracts and runs. We model the real flow: stage the dist payload into a
      # per-user install location (no admin/sudo). This is the only scope that is
      # REAL for this installer type, so we test it and note the absence of a
      # genuine system-scope path rather than faking an MSI/pkg.
      # ---------------------------------------------------------------------------
      - name: Install (user-scope, extract) - Linux (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/.local/opt/${APP_NAME}"
          rm -rf "$INSTALL_DIR"
          mkdir -p "$INSTALL_DIR"
          cp -R "dist/${APP_NAME}/." "$INSTALL_DIR/"
          test -x "$INSTALL_DIR/${APP_NAME}"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"
          echo "INSTALLED_BIN=$INSTALL_DIR/${APP_NAME}" >> "$GITHUB_ENV"
          echo "Installed to $INSTALL_DIR"

      - name: Install (user-scope, extract) - macOS (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="$HOME/Applications"
          mkdir -p "$INSTALL_DIR"
          rm -rf "$INSTALL_DIR/${APP_NAME}.app"
          cp -R "dist/${APP_NAME}.app" "$INSTALL_DIR/"
          test -d "$INSTALL_DIR/${APP_NAME}.app"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"
          echo "INSTALLED_APP=$INSTALL_DIR/${APP_NAME}.app" >> "$GITHUB_ENV"
          echo "Installed to $INSTALL_DIR/${APP_NAME}.app"

      - name: Install (user-scope, extract) - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installDir = Join-Path $env:LOCALAPPDATA "Programs\$env:APP_NAME"
          if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Copy-Item -Recurse -Force "dist/$env:APP_NAME/*" $installDir
          $exe = Join-Path $installDir "$env:APP_NAME.exe"
          if (-not (Test-Path $exe)) { throw "Install failed: $exe missing" }
          "INSTALL_DIR=$installDir"  | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "INSTALLED_EXE=$exe"       | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Installed to $installDir"

      # ---------------------------------------------------------------------------
      # G5: REAL LAUNCH (GUI). This is a CustomTkinter/Tkinter GUI with NO --version
      # flag, so we must actually start it and assert it stays alive. A frozen app
      # that fails on import/Tk-init dies in <1s; surviving N seconds proves the
      # bundle (hidden imports, --add-data, Tcl/Tk) is intact.
      # ---------------------------------------------------------------------------
      - name: Launch smoke test (headless GUI) - Linux (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "Launching under Xvfb: $INSTALLED_BIN"
          # NOTE: $! here is the xvfb-run WRAPPER pid, not the frozen app. The wrapper
          # stays alive for the full sleep even if the app dies on import in <1s, so we
          # must NOT trust it (that is a textbook false pass). Instead, after the grace
          # period, pgrep the FULL installed binary path to confirm the REAL app process
          # is alive, then assert on that.
          xvfb-run -a --server-args="-screen 0 1280x1024x24" "$INSTALLED_BIN" &
          WRAPPER_PID=$!
          sleep 8
          if pgrep -f "$INSTALLED_BIN" >/dev/null 2>&1; then
            echo "GUI app ($INSTALLED_BIN) is alive after 8s — launch OK."
            pkill -f "$INSTALLED_BIN" 2>/dev/null || true
            kill "$WRAPPER_PID" 2>/dev/null || true
            wait "$WRAPPER_PID" 2>/dev/null || true
          else
            echo "::error::GUI app process not found after 8s — launch FAILED (frozen app likely crashed on import/Tk-init)."
            kill "$WRAPPER_PID" 2>/dev/null || true
            wait "$WRAPPER_PID" 2>/dev/null || true
            exit 1
          fi

      - name: Launch smoke test (GUI) - macOS (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          BIN="$INSTALLED_APP/Contents/MacOS/${APP_NAME}"
          echo "Launching bundle executable: $BIN"
          "$BIN" &
          APP_PID=$!
          sleep 8
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App process $APP_PID is alive after 8s — launch OK."
            kill "$APP_PID" 2>/dev/null || true
            wait "$APP_PID" 2>/dev/null || true
          else
            wait "$APP_PID"; CODE=$?
            echo "::error::App exited prematurely (code $CODE) — launch FAILED."
            exit 1
          fi

      - name: Launch smoke test (GUI) - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Launching: $env:INSTALLED_EXE"
          $proc = Start-Process -FilePath $env:INSTALLED_EXE -PassThru
          Start-Sleep -Seconds 8
          $live = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if ($null -eq $live) {
            throw "GUI exited prematurely (exit code $($proc.ExitCode)) — launch FAILED."
          }
          Write-Host "GUI process $($proc.Id) is alive after 8s — launch OK."
          Stop-Process -Id $proc.Id -Force

      # ---------------------------------------------------------------------------
      # G6: REAL UPGRADE. Download the latest PUBLISHED release zip to create
      # genuine dirty/prior state, install it, then extract the freshly-built
      # version over the same install dir. Graceful skip if no release exists.
      # G3: correct release-download URL with proper slashes.
      # ---------------------------------------------------------------------------
      - name: Upgrade over previous release - Unix (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Distinguish "no releases exist yet" (legit skip) from a real gh/network/auth
          # failure (must FAIL). Capture stderr instead of swallowing it with 2>/dev/null.
          if TAG="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>/tmp/gh_err.txt)"; then
            :
          else
            if grep -qiE 'release not found|no release|not found' /tmp/gh_err.txt; then
              echo "::notice::No prior release found — skipping upgrade test (nothing to upgrade from)."
              exit 0
            fi
            echo "::error::gh release view failed (not a 'no releases' condition):"
            cat /tmp/gh_err.txt
            exit 1
          fi
          if [ -z "$TAG" ]; then
            echo "::notice::No prior release found — skipping upgrade test (nothing to upgrade from)."
            exit 0
          fi
          echo "Latest published release: $TAG"
          # Fetch the asset list once. A gh failure here must FAIL (not silently skip):
          # gh runs under -e, so a non-zero exit aborts the job before any grep.
          ASSET_LIST="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name')"
          OS_TOKEN="$(echo "${{ runner.os }}" | tr 'A-Z' 'a-z')"
          # Prefer an OS- or app-name-matched .zip; else fall back to the first .zip.
          ASSET="$(printf '%s\n' "$ASSET_LIST" | grep -iE '\.zip$' | grep -i "${OS_TOKEN}\|${APP_NAME}" | head -n1 || true)"
          if [ -z "$ASSET" ]; then
            ASSET="$(printf '%s\n' "$ASSET_LIST" | grep -iE '\.zip$' | head -n1 || true)"
          fi
          if [ -z "$ASSET" ]; then
            echo "::notice::Release $TAG has no .zip asset — skipping upgrade test."
            exit 0
          fi
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
          echo "Downloading previous version: $URL"
          rm -rf /tmp/prev; mkdir -p /tmp/prev
          # Download failure must FAIL the job (do not swallow). gh exits non-zero under -e.
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$ASSET" --dir /tmp/prev --clobber
          # G2-style hard assert: the prior-release asset really landed before we use it.
          if [ ! -f "/tmp/prev/$ASSET" ]; then
            echo "::error::Prior-release download did not produce /tmp/prev/$ASSET"
            ls -la /tmp/prev || true
            exit 1
          fi
          # Install the OLD version into the install dir to create dirty state.
          rm -rf "$INSTALL_DIR"; mkdir -p "$INSTALL_DIR"
          rm -rf /tmp/prev/extracted
          unzip -q "/tmp/prev/$ASSET" -d /tmp/prev/extracted
          # G6/G8: strip Gatekeeper quarantine from the downloaded (unsigned) prior
          # release on macOS so it does not hard-fail; signing stays warn-only.
          if [ "${{ runner.os }}" = "macOS" ]; then
            xattr -dr com.apple.quarantine /tmp/prev/extracted 2>/dev/null || true
          fi
          SRC="$(find /tmp/prev/extracted -maxdepth 2 -type d -name "${APP_NAME}*" | head -n1)"
          [ -z "$SRC" ] && SRC="/tmp/prev/extracted"
          cp -R "$SRC/." "$INSTALL_DIR/" 2>/dev/null || cp -R "$SRC" "$INSTALL_DIR/"
          echo "OLD-VERSION-MARKER" > "$INSTALL_DIR/.previous_install_marker"
          echo "Old version staged. Now upgrading with freshly built artifact..."
          # Upgrade: overlay the new build.
          if [ "${{ runner.os }}" = "macOS" ]; then
            rm -rf "$INSTALL_DIR/${APP_NAME}.app"
            cp -R "dist/${APP_NAME}.app" "$INSTALL_DIR/" 2>/dev/null || cp -R "dist/${APP_NAME}.app" "$INSTALL_DIR/${APP_NAME}.app"
            test -d "$INSTALL_DIR/${APP_NAME}.app"
          else
            cp -R "dist/${APP_NAME}/." "$INSTALL_DIR/"
            test -x "$INSTALL_DIR/${APP_NAME}"
          fi
          # The stale marker proving a real prior install existed should still be present (overlay upgrade).
          if [ -f "$INSTALL_DIR/.previous_install_marker" ]; then
            echo "Upgrade performed over a genuine prior install (marker present)."
          fi
          echo "Upgrade OK."

      - name: Upgrade over previous release - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          # Distinguish "no releases exist yet" (legit skip) from a real gh failure
          # (must FAIL). Capture stderr instead of discarding it with 2>$null.
          $tag = (gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>$env:TEMP\gh_err.txt)
          if ($LASTEXITCODE -ne 0) {
            $errText = (Get-Content $env:TEMP\gh_err.txt -Raw -ErrorAction SilentlyContinue)
            if ($errText -match '(?i)release not found|no release|not found') {
              Write-Host "::notice::No prior release found — skipping upgrade test (nothing to upgrade from)."
              exit 0
            }
            Write-Host "::error::gh release view failed (not a 'no releases' condition):"
            Write-Host $errText
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Host "::notice::No prior release found — skipping upgrade test (nothing to upgrade from)."
            exit 0
          }
          Write-Host "Latest published release: $tag"
          $assets = (gh release view $tag --repo "${{ github.repository }}" --json assets -q '.assets[].name') -split "`n" | Where-Object { $_ -match '\.zip$' }
          $asset = $assets | Select-Object -First 1
          if (-not $asset) {
            Write-Host "::notice::Release $tag has no .zip asset — skipping upgrade test."
            exit 0
          }
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$asset"
          Write-Host "Downloading previous version: $url"
          if (Test-Path "$env:TEMP\prev") { Remove-Item -Recurse -Force "$env:TEMP\prev" }
          New-Item -ItemType Directory -Force -Path "$env:TEMP\prev" | Out-Null
          gh release download $tag --repo "${{ github.repository }}" --pattern $asset --dir "$env:TEMP\prev" --clobber
          if ($LASTEXITCODE -ne 0) { throw "Prior-release download failed (gh exit $LASTEXITCODE)." }
          $assetPath = Join-Path "$env:TEMP\prev" $asset
          if (-not (Test-Path $assetPath)) { throw "Prior-release download did not produce $assetPath" }
          # Install OLD version to create dirty state.
          if (Test-Path $env:INSTALL_DIR) { Remove-Item -Recurse -Force $env:INSTALL_DIR }
          New-Item -ItemType Directory -Force -Path $env:INSTALL_DIR | Out-Null
          Expand-Archive -Path $assetPath -DestinationPath "$env:TEMP\prev\extracted" -Force
          $src = Get-ChildItem "$env:TEMP\prev\extracted" -Directory | Where-Object { $_.Name -like "$env:APP_NAME*" } | Select-Object -First 1
          if (-not $src) { $src = Get-Item "$env:TEMP\prev\extracted" }
          Copy-Item -Recurse -Force "$($src.FullName)\*" $env:INSTALL_DIR
          "OLD-VERSION-MARKER" | Out-File (Join-Path $env:INSTALL_DIR ".previous_install_marker") -Encoding utf8
          Write-Host "Old version staged. Upgrading with freshly built artifact..."
          Copy-Item -Recurse -Force "dist/$env:APP_NAME/*" $env:INSTALL_DIR
          $exe = Join-Path $env:INSTALL_DIR "$env:APP_NAME.exe"
          if (-not (Test-Path $exe)) { throw "Upgrade failed: $exe missing after overlay." }
          if (Test-Path (Join-Path $env:INSTALL_DIR ".previous_install_marker")) {
            Write-Host "Upgrade performed over a genuine prior install (marker present)."
          }
          Write-Host "Upgrade OK."

      # ---------------------------------------------------------------------------
      # G7: REAL UNINSTALL + negative assertion that nothing remains.
      # PyInstaller "uninstall" = remove the install dir; we then assert it is gone.
      # ---------------------------------------------------------------------------
      - name: Uninstall and verify removal - Unix (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "Removing $INSTALL_DIR"
          rm -rf "$INSTALL_DIR"
          if [ -e "$INSTALL_DIR" ]; then
            echo "::error::Uninstall incomplete — $INSTALL_DIR still exists."
            ls -la "$INSTALL_DIR" || true
            exit 1
          fi
          if [ "${{ runner.os }}" = "macOS" ] && [ -e "$HOME/Applications/${APP_NAME}.app" ]; then
            echo "::error::Uninstall incomplete — ${APP_NAME}.app still present."
            exit 1
          fi
          echo "Uninstall verified: all files removed."

      - name: Uninstall and verify removal - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Removing $env:INSTALL_DIR"
          if (Test-Path $env:INSTALL_DIR) { Remove-Item -Recurse -Force $env:INSTALL_DIR }
          if (Test-Path $env:INSTALL_DIR) {
            Write-Host "::error::Uninstall incomplete — $env:INSTALL_DIR still exists."
            Get-ChildItem -Recurse $env:INSTALL_DIR | Select-Object FullName
            exit 1
          }
          Write-Host "Uninstall verified: all files removed."

      # ---------------------------------------------------------------------------
      # TRIPWIRE: a SUCCESSFUL full lifecycle (build -> install -> launch -> upgrade
      # -> uninstall+verify) sets LIFECYCLE_OK=1. The lifecycle is per-OS, so each OS
      # leg sets the marker only after ITS uninstall verification passes. An all-skip
      # leg never reaches here, so a downstream gate can catch a recipe that went
      # green while testing nothing.
      # ---------------------------------------------------------------------------
      - name: Lifecycle tripwire marker - Unix (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "Lifecycle complete: LIFECYCLE_OK=1"

      - name: Lifecycle tripwire marker - Windows (pyinstaller)
        if: matrix.type == 'pyinstaller' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Lifecycle complete: LIFECYCLE_OK=1"


      # ===================== python-pip-wheel =====================
      - name: Checkout
        if: matrix.type == 'python-pip-wheel'
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.type == 'python-pip-wheel'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------------------------------------------------------------------------
      # BUILD (G2): never assume dist/ exists. Build the wheel + sdist in-job with a
      # PEP 517 frontend. Backend (hatchling/setuptools/flit) is auto-read from
      # [build-system] in pyproject.toml. One shell per step (G4).
      # ---------------------------------------------------------------------------
      - name: Install build tooling
        if: matrix.type == 'python-pip-wheel'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build wheel and sdist
        if: matrix.type == 'python-pip-wheel'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          # G1: `python -m build` runs in foreground; set -e turns a build crash red.
          python -m build
          echo "----- dist/ contents -----"
          ls -al dist

      # G2: hard-assert the wheel artifact actually exists before we try to install
      # it. A build that silently produced nothing must fail here, not "pass" later.
      - name: Verify wheel artifact exists
        if: matrix.type == 'python-pip-wheel'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No .whl produced in dist/ — build did not generate a wheel."
            exit 1
          fi
          if [ ${#sdists[@]} -eq 0 ]; then
            echo "::error::No sdist (.tar.gz) produced in dist/."
            exit 1
          fi
          WHEEL="${wheels[0]}"
          echo "WHEEL=$WHEEL" >> "$GITHUB_ENV"
          echo "Found wheel: $WHEEL"
          # Resolve the installed console-script / module name from package metadata so
          # later launch/uninstall steps assert against the REAL entry point, not a guess.
          # Capture into THIS shell first so we can hard-assert the values are non-empty
          # (an empty DIST_NAME/IMPORT_NAME would make every downstream pip/import check
          # pass vacuously — a classic false-pass). The import name comes from the wheel's
          # top_level.txt (authoritative; e.g. Pillow -> PIL), not a dist-name guess.
          META="$(python - "$WHEEL" <<'PY'
          import sys, zipfile, configparser, re
          whl = sys.argv[1]
          dist = ""
          top = ""
          scripts = []
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              for n in names:
                  if n.endswith(".dist-info/METADATA"):
                      for line in z.read(n).decode("utf-8", "replace").splitlines():
                          if line.startswith("Name:"):
                              dist = line.split(":", 1)[1].strip()
                  if n.endswith(".dist-info/top_level.txt"):
                      tops = [l.strip() for l in z.read(n).decode("utf-8", "replace").splitlines() if l.strip()]
                      if tops:
                          top = tops[0]
                  if n.endswith(".dist-info/entry_points.txt"):
                      cp = configparser.ConfigParser()
                      cp.read_string(z.read(n).decode("utf-8", "replace"))
                      if cp.has_section("console_scripts"):
                          scripts = list(cp.options("console_scripts"))
          # Fall back to the normalized dist name only if top_level.txt is absent.
          importname = top or (re.sub(r"[-.]+", "_", dist).lower() if dist else "")
          print(f"DIST_NAME={dist}")
          print(f"IMPORT_NAME={importname}")
          print(f"CONSOLE_SCRIPT={scripts[0] if scripts else ''}")
          PY
          )"
          echo "$META"
          DIST_NAME="$(printf '%s\n' "$META" | sed -n 's/^DIST_NAME=//p')"
          IMPORT_NAME="$(printf '%s\n' "$META" | sed -n 's/^IMPORT_NAME=//p')"
          CONSOLE_SCRIPT="$(printf '%s\n' "$META" | sed -n 's/^CONSOLE_SCRIPT=//p')"
          # G2: hard-assert we actually resolved a distribution + import name. Without
          # these the launch/uninstall negative assertions are meaningless.
          if [ -z "$DIST_NAME" ] || [ -z "$IMPORT_NAME" ]; then
            echo "::error::Could not resolve DIST_NAME/IMPORT_NAME from wheel metadata ($WHEEL) — refusing to continue with empty identifiers."
            exit 1
          fi
          {
            echo "DIST_NAME=$DIST_NAME"
            echo "IMPORT_NAME=$IMPORT_NAME"
            echo "CONSOLE_SCRIPT=$CONSOLE_SCRIPT"
          } >> "$GITHUB_ENV"
          echo "Resolved: dist=$DIST_NAME import=$IMPORT_NAME script=${CONSOLE_SCRIPT:-<none>}"

      # G8: wheels have no Authenticode/Gatekeeper signing. The real integrity surface
      # is PEP 427 metadata + the RECORD manifest, plus optional PEP 740 / Sigstore
      # attestations. Do a STRUCTURAL check and WARN — never hard-fail on public CI
      # that has no signing secrets.
      - name: Verify wheel metadata and integrity (warn-only signing check)
        if: matrix.type == 'python-pip-wheel'
        shell: bash
        run: |
          set -euo pipefail
          # twine check validates METADATA / long_description rendering structurally.
          if ! python -m twine check dist/*; then
            echo "::warning::twine check reported metadata issues (non-blocking)."
          fi
          # Confirm a RECORD manifest exists (the wheel's built-in integrity manifest).
          if python -c "import sys,zipfile; z=zipfile.ZipFile('$WHEEL'); sys.exit(0 if any(n.endswith('.dist-info/RECORD') for n in z.namelist()) else 1)"; then
            echo "RECORD manifest present in wheel."
          else
            echo "::warning::No RECORD manifest found in wheel — integrity manifest missing."
          fi
          # Sigstore/PEP 740 attestations only exist for published-to-PyPI artifacts; on
          # a local CI build there is no .publish attestation. Surface as a visible warning.
          echo "::warning::Wheel is unsigned (no PEP 740/Sigstore attestation on local build). Structural integrity verified via RECORD/twine only."

      # ---------------------------------------------------------------------------
      # INSTALL — user-scope: a venv is pip's REAL per-user isolation boundary.
      # Separate steps per OS (G4); each idiomatic to its shell. G1 throughout.
      # ---------------------------------------------------------------------------
      - name: Install into user-scope venv (Linux/macOS)
        if: matrix.type == 'python-pip-wheel' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python -m venv "$HOME/venv-user"
          # shellcheck disable=SC1091
          source "$HOME/venv-user/bin/activate"
          python -m pip install --upgrade pip
          # Install the freshly built WHEEL explicitly (not the source tree) — G2.
          python -m pip install "$WHEEL"
          python -m pip show "$DIST_NAME"

      - name: Install into user-scope venv (Windows)
        if: matrix.type == 'python-pip-wheel' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m venv "$env:USERPROFILE\venv-user"
          & "$env:USERPROFILE\venv-user\Scripts\Activate.ps1"
          python -m pip install --upgrade pip
          python -m pip install "$env:WHEEL"
          python -m pip show "$env:DIST_NAME"
          if ($LASTEXITCODE -ne 0) { throw "pip show failed (exit $LASTEXITCODE)" }

      # INSTALL — system-scope: pipx is the genuine "install this CLI globally on the
      # machine" path for a wheel (isolated env on PATH). Only meaningful when the
      # package ships a console_scripts entry point.
      - name: Install system-scope via pipx (Linux/macOS)
        if: matrix.type == 'python-pip-wheel' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CONSOLE_SCRIPT:-}" ]; then
            echo "No console_scripts entry point — skipping pipx (system-scope) install for this library-only package."
            exit 0
          fi
          python -m pip install --user pipx
          python -m pipx ensurepath
          # G1: pipx returns nonzero on failure; set -e turns it red.
          python -m pipx install "$WHEEL"
          python -m pipx list

      - name: Install system-scope via pipx (Windows)
        if: matrix.type == 'python-pip-wheel' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrEmpty($env:CONSOLE_SCRIPT)) {
            Write-Host "No console_scripts entry point — skipping pipx (system-scope) install."
            exit 0
          }
          python -m pip install --user pipx
          python -m pipx ensurepath
          python -m pipx install "$env:WHEEL"
          if ($LASTEXITCODE -ne 0) { throw "pipx install failed (exit $LASTEXITCODE)" }
          python -m pipx list

      # ---------------------------------------------------------------------------
      # LAUNCH / SMOKE-VERIFY (G5 applied to a CLI/library wheel): actually exercise
      # the installed software and assert it runs & exits 0 — `--version` alone is
      # not enough, so we also import the module and run a real CLI invocation.
      # ---------------------------------------------------------------------------
      - name: Launch / smoke-verify installed package (Linux/macOS)
        if: matrix.type == 'python-pip-wheel' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source "$HOME/venv-user/bin/activate"
          # 1) The package imports cleanly inside the install env (catches missing deps).
          python -c "import importlib; m=importlib.import_module('$IMPORT_NAME'); print('import OK:', m.__name__)"
          if [ -n "${CONSOLE_SCRIPT:-}" ]; then
            # 2) The console script is on PATH and executable.
            command -v "$CONSOLE_SCRIPT"
            # 3) Real invocation — try --help (universal) and assert exit 0 (G1).
            "$CONSOLE_SCRIPT" --help
            # 4) --version too, but only as an ADDITIONAL signal, never the sole check.
            "$CONSOLE_SCRIPT" --version || echo "::warning::$CONSOLE_SCRIPT has no --version flag (non-blocking)."
          else
            echo "Library-only wheel: import smoke test is the launch check."
          fi
          # If pipx installed it system-wide, verify that copy launches too.
          if [ -n "${CONSOLE_SCRIPT:-}" ] && python -m pipx list 2>/dev/null | grep -q "$DIST_NAME"; then
            "$HOME/.local/bin/$CONSOLE_SCRIPT" --help
          fi

      - name: Launch / smoke-verify installed package (Windows)
        if: matrix.type == 'python-pip-wheel' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:USERPROFILE\venv-user\Scripts\Activate.ps1"
          python -c "import importlib; m=importlib.import_module('$env:IMPORT_NAME'); print('import OK:', m.__name__)"
          if ($LASTEXITCODE -ne 0) { throw "module import failed (exit $LASTEXITCODE)" }
          if (-not [string]::IsNullOrEmpty($env:CONSOLE_SCRIPT)) {
            $cmd = Get-Command $env:CONSOLE_SCRIPT -ErrorAction Stop
            Write-Host "Console script resolved to: $($cmd.Source)"
            # G1: capture exit code explicitly.
            & $env:CONSOLE_SCRIPT --help
            if ($LASTEXITCODE -ne 0) { throw "$env:CONSOLE_SCRIPT --help failed (exit $LASTEXITCODE)" }
            & $env:CONSOLE_SCRIPT --version
            if ($LASTEXITCODE -ne 0) { Write-Host "::warning::$env:CONSOLE_SCRIPT has no --version flag (non-blocking)." }
          } else {
            Write-Host "Library-only wheel: import smoke test is the launch check."
          }

      # ---------------------------------------------------------------------------
      # UPGRADE (G6): create GENUINE dirty state by FIRST installing a real previous
      # release, then upgrade with the freshly built wheel. Graceful skip if no prior
      # release exists. We try the published GitHub release asset first, then fall
      # back to the latest version on PyPI — both are "a real previous version".
      # ---------------------------------------------------------------------------
      - name: Upgrade over previous published release (Linux/macOS)
        if: matrix.type == 'python-pip-wheel' && runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m venv "$HOME/venv-upg"
          # shellcheck disable=SC1091
          source "$HOME/venv-upg/bin/activate"
          python -m pip install --upgrade pip

          PREV_INSTALLED=0
          # (a) Try a previous wheel published as a GitHub release asset.
          #     G6: distinguish "no releases exist yet" (legit skip) from "download
          #     failed" (must FAIL). We DO NOT swallow the download error and silently
          #     fall through — that would hide a broken release pipeline behind a green.
          mkdir -p "$HOME/prevrel"
          REL_COUNT=$(gh release list --repo "${{ github.repository }}" --limit 1 | wc -l | tr -d ' ')
          if [ "$REL_COUNT" -gt 0 ]; then
            # A release exists, so a download attempt MUST succeed. If the repo's latest
            # release happens to carry no *.whl asset, that is also a real problem worth
            # surfacing, so we only treat a clean download + present file as success.
            if ! gh release download --repo "${{ github.repository }}" --pattern '*.whl' --dir "$HOME/prevrel"; then
              echo "::error::A GitHub release exists but downloading its *.whl asset failed — not skipping (would hide a broken release)."
              exit 1
            fi
            PREV_WHEEL=$(ls "$HOME/prevrel"/*.whl 2>/dev/null | head -n1 || true)
            if [ -z "${PREV_WHEEL:-}" ]; then
              echo "::error::GitHub release present but contained no *.whl asset to upgrade from."
              exit 1
            fi
            python -m pip install "$PREV_WHEEL"
            PREV_INSTALLED=1
          else
            echo "::notice::No GitHub releases yet for ${{ github.repository }} — trying PyPI for a prior version."
          fi
          # (b) Fall back to the latest version on PyPI as the "previous" release.
          #     Distinguish "no such project on PyPI" (legit skip) from a network/index
          #     error (must FAIL). pip exits 23 (no matching distribution) when the
          #     project simply does not exist; any other nonzero is a real failure.
          if [ "$PREV_INSTALLED" -eq 0 ]; then
            set +e
            PIP_OUT=$(python -m pip install "$DIST_NAME" 2>&1)
            PIP_RC=$?
            set -e
            printf '%s\n' "$PIP_OUT"
            if [ "$PIP_RC" -eq 0 ]; then
              PREV_INSTALLED=1
            elif printf '%s' "$PIP_OUT" | grep -qiE 'No matching distribution|Could not find a version|404'; then
              echo "::notice::No prior GitHub release and $DIST_NAME is not on PyPI — skipping upgrade test (nothing to upgrade from)."
              exit 0
            else
              echo "::error::Installing prior PyPI release of $DIST_NAME failed for a non-'missing' reason (pip rc=$PIP_RC) — failing rather than masking it."
              exit 1
            fi
          fi

          if [ "$PREV_INSTALLED" -eq 0 ]; then
            echo "::notice::No prior GitHub release asset or PyPI release for $DIST_NAME — skipping upgrade test (nothing to upgrade from)."
            exit 0
          fi

          OLD_VER=$(python -m pip show "$DIST_NAME" | awk -F': ' '/^Version:/{print $2}')
          echo "Installed previous version: $OLD_VER (dirty state established)"
          # Now perform the REAL upgrade with the freshly built wheel.
          python -m pip install --upgrade --force-reinstall "$WHEEL"
          NEW_VER=$(python -m pip show "$DIST_NAME" | awk -F': ' '/^Version:/{print $2}')
          echo "Upgraded to version: $NEW_VER"
          # Smoke-verify the upgraded install still launches.
          python -c "import importlib; importlib.import_module('$IMPORT_NAME'); print('post-upgrade import OK')"
          if [ -n "${CONSOLE_SCRIPT:-}" ]; then "$CONSOLE_SCRIPT" --help; fi

      - name: Upgrade over previous published release (Windows)
        if: matrix.type == 'python-pip-wheel' && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          python -m venv "$env:USERPROFILE\venv-upg"
          & "$env:USERPROFILE\venv-upg\Scripts\Activate.ps1"
          python -m pip install --upgrade pip

          $prevInstalled = $false
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\prevrel" | Out-Null
          # (a) Previous wheel from a GitHub release asset.
          #     G6: distinguish "no releases yet" (legit skip) from "download failed"
          #     (must FAIL). Do NOT swallow the download error and silently fall through.
          $relList = gh release list --repo "${{ github.repository }}" --limit 1
          if ($LASTEXITCODE -ne 0) { throw "gh release list failed (exit $LASTEXITCODE)" }
          if (-not [string]::IsNullOrWhiteSpace($relList)) {
            gh release download --repo "${{ github.repository }}" --pattern '*.whl' --dir "$env:USERPROFILE\prevrel"
            if ($LASTEXITCODE -ne 0) { throw "A GitHub release exists but downloading its *.whl asset failed (exit $LASTEXITCODE) — not skipping." }
            $prevWheel = Get-ChildItem -Path "$env:USERPROFILE\prevrel" -Filter *.whl -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $prevWheel) { throw "GitHub release present but contained no *.whl asset to upgrade from." }
            python -m pip install "$($prevWheel.FullName)"
            if ($LASTEXITCODE -ne 0) { throw "installing prior release wheel failed (exit $LASTEXITCODE)" }
            $prevInstalled = $true
          } else {
            Write-Host "::notice::No GitHub releases yet for ${{ github.repository }} — trying PyPI for a prior version."
          }
          # (b) Fall back to latest PyPI release. Distinguish "not on PyPI" (legit skip)
          #     from a network/index error (must FAIL).
          if (-not $prevInstalled) {
            $pipOut = python -m pip install "$env:DIST_NAME" 2>&1 | Out-String
            $pipRc = $LASTEXITCODE
            Write-Host $pipOut
            if ($pipRc -eq 0) {
              $prevInstalled = $true
            } elseif ($pipOut -match 'No matching distribution|Could not find a version|404') {
              Write-Host "::notice::No prior GitHub release and $env:DIST_NAME is not on PyPI — skipping upgrade test (nothing to upgrade from)."
              exit 0
            } else {
              throw "Installing prior PyPI release of $env:DIST_NAME failed for a non-'missing' reason (pip rc=$pipRc) — failing rather than masking it."
            }
          }
          if (-not $prevInstalled) {
            Write-Host "::notice::No prior GitHub release asset or PyPI release for $env:DIST_NAME — skipping upgrade test."
            exit 0
          }

          $oldVer = (python -m pip show $env:DIST_NAME | Select-String '^Version:').ToString().Split(':')[1].Trim()
          Write-Host "Installed previous version: $oldVer (dirty state established)"
          python -m pip install --upgrade --force-reinstall "$env:WHEEL"
          if ($LASTEXITCODE -ne 0) { throw "upgrade install failed (exit $LASTEXITCODE)" }
          $newVer = (python -m pip show $env:DIST_NAME | Select-String '^Version:').ToString().Split(':')[1].Trim()
          Write-Host "Upgraded to version: $newVer"
          python -c "import importlib; importlib.import_module('$env:IMPORT_NAME'); print('post-upgrade import OK')"
          if ($LASTEXITCODE -ne 0) { throw "post-upgrade import failed (exit $LASTEXITCODE)" }
          if (-not [string]::IsNullOrEmpty($env:CONSOLE_SCRIPT)) {
            & $env:CONSOLE_SCRIPT --help
            if ($LASTEXITCODE -ne 0) { throw "post-upgrade launch failed (exit $LASTEXITCODE)" }
          }

      # ---------------------------------------------------------------------------
      # UNINSTALL + NEGATIVE VERIFICATION (G7): remove from every scope we installed,
      # then ASSERT the import, console script, and dist metadata are GONE. Any
      # residue fails the job.
      # ---------------------------------------------------------------------------
      - name: Uninstall and verify full removal (Linux/macOS)
        if: matrix.type == 'python-pip-wheel' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source "$HOME/venv-user/bin/activate"
          python -m pip uninstall -y "$DIST_NAME"
          # Negative assertion 1: metadata must be gone.
          if python -m pip show "$DIST_NAME" >/dev/null 2>&1; then
            echo "::error::pip still reports $DIST_NAME installed after uninstall."
            exit 1
          fi
          # Negative assertion 2: import must now fail.
          if python -c "import importlib; importlib.import_module('$IMPORT_NAME')" 2>/dev/null; then
            echo "::error::Module $IMPORT_NAME still importable after uninstall."
            exit 1
          fi
          # Negative assertion 3: console script must be gone from the venv.
          if [ -n "${CONSOLE_SCRIPT:-}" ] && [ -e "$HOME/venv-user/bin/$CONSOLE_SCRIPT" ]; then
            echo "::error::Console script $CONSOLE_SCRIPT still present in venv after uninstall."
            exit 1
          fi
          echo "venv uninstall verified clean."
          # Tear down system-scope pipx install too, with its own negative check.
          if [ -n "${CONSOLE_SCRIPT:-}" ] && python -m pipx list 2>/dev/null | grep -q "$DIST_NAME"; then
            python -m pipx uninstall "$DIST_NAME"
            if [ -e "$HOME/.local/bin/$CONSOLE_SCRIPT" ]; then
              echo "::error::pipx console script $CONSOLE_SCRIPT still on PATH after pipx uninstall."
              exit 1
            fi
            echo "pipx uninstall verified clean."
          fi
          # Tripwire: only reached after every build/install/launch/upgrade/uninstall
          # assertion above passed (set -e would have aborted otherwise). Marks that a
          # REAL lifecycle ran on this OS, so an all-skip leg is caught downstream.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall and verify full removal (Windows)
        if: matrix.type == 'python-pip-wheel' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:USERPROFILE\venv-user\Scripts\Activate.ps1"
          python -m pip uninstall -y $env:DIST_NAME
          # Negative assertion 1: metadata gone.
          python -m pip show $env:DIST_NAME 2>$null
          if ($LASTEXITCODE -eq 0) { throw "pip still reports $env:DIST_NAME installed after uninstall." }
          # Negative assertion 2: import now fails.
          python -c "import importlib; importlib.import_module('$env:IMPORT_NAME')" 2>$null
          if ($LASTEXITCODE -eq 0) { throw "Module $env:IMPORT_NAME still importable after uninstall." }
          # Negative assertion 3: console script gone from venv Scripts dir.
          if (-not [string]::IsNullOrEmpty($env:CONSOLE_SCRIPT)) {
            $exe = "$env:USERPROFILE\venv-user\Scripts\$($env:CONSOLE_SCRIPT).exe"
            if (Test-Path $exe) { throw "Console script $exe still present after uninstall." }
          }
          Write-Host "venv uninstall verified clean."
          # Tear down pipx system-scope install too.
          if (-not [string]::IsNullOrEmpty($env:CONSOLE_SCRIPT)) {
            $list = python -m pipx list 2>$null
            if ($list -match [regex]::Escape($env:DIST_NAME)) {
              python -m pipx uninstall $env:DIST_NAME
              $pipxExe = "$env:USERPROFILE\.local\bin\$($env:CONSOLE_SCRIPT).exe"
              if (Test-Path $pipxExe) { throw "pipx console script still present after uninstall." }
              Write-Host "pipx uninstall verified clean."
            }
          }
          # Tripwire: only reached after every assertion above passed (Stop preference
          # + explicit throws abort otherwise). Marks that a REAL lifecycle ran on this
          # OS, so an all-skip leg is caught downstream.
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8


      # ===================== npm-bin =====================
      # =====================================================================
      # npm-bin installer slice
      # Type: an npm package that exposes one or more CLI executables via the
      # package.json "bin" field. "Installer artifact" = the publishable tarball
      # produced by `npm pack` (<name>-<version>.tgz). "Install" = global install
      # of that tarball, which symlinks the bin onto PATH. CLI tool => no GUI/
      # windowing; G5 is satisfied by a real executed-command smoke test, and G8
      # is satisfied structurally (integrity hash + provenance check + WARN),
      # since npm tarballs are not Authenticode/Gatekeeper-signed.
      # All steps gated on matrix.type == 'npm-bin'. OS-specific steps additionally
      # gated on runner.os, each in its own idiomatic single shell (G4).
      # =====================================================================

      # ---------- TOOLCHAIN ----------
      - name: Checkout
        if: matrix.type == 'npm-bin'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.type == 'npm-bin'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # ---------- G2: BUILD THE ARTIFACT (do not assume a .tgz pre-exists) ----------
      # Single shell per step. `npm ci` falls back to `npm install` when there is
      # no lockfile so this works for every npm-bin repo. `npm pack` is the npm-bin
      # equivalent of "build the installer": it produces the exact tarball that
      # `npm publish` would upload.
      - name: Install dependencies and build (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          # Run a build script only if one is actually defined (TS/bundlers).
          if npm run | grep -qE '^[[:space:]]*build'; then
            npm run build
          fi

      - name: Install dependencies and build (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ((Test-Path package-lock.json) -or (Test-Path npm-shrinkwrap.json)) {
            npm ci
            if ($LASTEXITCODE -ne 0) { throw "npm ci failed ($LASTEXITCODE)" }
          } else {
            npm install
            if ($LASTEXITCODE -ne 0) { throw "npm install failed ($LASTEXITCODE)" }
          }
          $scripts = (npm run) -join "`n"
          if ($scripts -match '(?m)^\s*build') {
            npm run build
            if ($LASTEXITCODE -ne 0) { throw "npm run build failed ($LASTEXITCODE)" }
          }

      # Pack the tarball. --json gives us filename + integrity in one shot so we
      # never guess the name (scoped pkgs become scope-name-version.tgz).
      - name: Pack tarball (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PACK_JSON="$(npm pack --json)"
          TARBALL="$(node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));process.stdout.write(d[0].filename)' <<< "$PACK_JSON")"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "Packed: $TARBALL"

      - name: Pack tarball (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packJson = (npm pack --json | Out-String)
          if ($LASTEXITCODE -ne 0) { throw "npm pack failed ($LASTEXITCODE)" }
          $tarball = ($packJson | ConvertFrom-Json)[0].filename
          "TARBALL=$tarball" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Packed: $tarball"

      # ---------- G2: ASSERT ARTIFACT EXISTS before install ----------
      - name: Verify artifact exists (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -f "$TARBALL" || { echo "::error::Expected tarball '$TARBALL' not found"; exit 1; }
          bytes=$(wc -c < "$TARBALL")
          [ "$bytes" -gt 0 ] || { echo "::error::Tarball is empty"; exit 1; }
          echo "Artifact OK: $TARBALL ($bytes bytes)"

      - name: Verify artifact exists (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path $env:TARBALL)) { throw "Expected tarball '$($env:TARBALL)' not found" }
          if ((Get-Item $env:TARBALL).Length -le 0) { throw "Tarball is empty" }
          Write-Host "Artifact OK: $($env:TARBALL)"

      # ---------- G8: STRUCTURAL SIGNING / PROVENANCE CHECK (WARN, never block) ----------
      # npm tarballs aren't Authenticode/Gatekeeper-signed; the real integrity story
      # is the package integrity hash + (optionally) npm registry provenance
      # attestations. On public CI without NPM_TOKEN we can only verify structurally,
      # so we WARN, never fail.
      - name: Integrity / provenance check (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          INTEGRITY="$(npm pack --dry-run --json "$TARBALL" 2>/dev/null | node -e 'try{const d=JSON.parse(require("fs").readFileSync(0,"utf8"));process.stdout.write(d[0].integrity||"")}catch(e){process.stdout.write("")}' || true)"
          if [ -n "$INTEGRITY" ]; then
            echo "Tarball integrity: $INTEGRITY"
          else
            echo "::warning::Could not compute tarball integrity hash (continuing)"
          fi
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::No npm publish token in CI -> npm registry provenance attestation (npm publish --provenance) cannot be verified here. Structural integrity check only."
          fi

      - name: Integrity / provenance check (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hash = (Get-FileHash $env:TARBALL -Algorithm SHA512).Hash
          Write-Host "Tarball SHA512: $hash"
          if (-not $env:NODE_AUTH_TOKEN) {
            Write-Host "::warning::No npm publish token in CI -> npm registry provenance attestation cannot be verified here. Structural integrity check only."
          }

      # ---------- INSTALL (system-scope vs user-scope) ----------
      # For npm-bin the real scope distinction is global vs local. We test the
      # meaningful one: GLOBAL install (`npm install -g`), which is how an end user
      # would get the CLI onto PATH. On hosted runners the npm global prefix is
      # user-writable (no sudo needed), so this is genuinely user-scope global.
      # We capture the package name from package.json (not the tarball filename).
      - name: Install globally and expose name/bins (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME="$(node -p "require('./package.json').name")"
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          # Capture declared bin names for later launch + uninstall assertions.
          node -e 'const p=require("./package.json");let b=p.bin;if(typeof b==="string")b={[p.name.replace(/^@.*\//,"")]:b};process.stdout.write(Object.keys(b||{}).join("\n"))' > bin_names.txt
          test -s bin_names.txt || { echo "::error::package.json declares no bin entries; not an npm-bin package"; exit 1; }
          echo "Declared bins:"; cat bin_names.txt
          npm install -g "./$TARBALL"
          echo "GLOBAL_BIN=$(npm bin -g 2>/dev/null || dirname "$(command -v npm)")" >> "$GITHUB_ENV"

      - name: Install globally and expose name/bins (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgName = (node -p "require('./package.json').name")
          "PKG_NAME=$pkgName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          node -e 'const p=require("./package.json");let b=p.bin;if(typeof b==="string")b={[p.name.replace(/^@.*\//,"")]:b};process.stdout.write(Object.keys(b||{}).join("`n"))' | Out-File -FilePath bin_names.txt -Encoding utf8
          if (-not (Test-Path bin_names.txt) -or ((Get-Item bin_names.txt).Length -le 0)) { throw "package.json declares no bin entries; not an npm-bin package" }
          Write-Host "Declared bins:"; Get-Content bin_names.txt
          npm install -g "./$($env:TARBALL)"
          if ($LASTEXITCODE -ne 0) { throw "npm install -g failed ($LASTEXITCODE)" }

      # ---------- G5 (CLI-appropriate) + G1: REAL LAUNCH / SMOKE-VERIFY ----------
      # This is a CLI, not a GUI, so a real launch = actually invoking each declared
      # bin via PATH resolution and asserting exit code 0. We resolve through PATH
      # (which/Get-Command) to prove the symlink/shim was created, then EXECUTE it.
      # We try common no-op subcommands and require at least one to run with exit 0.
      - name: Launch / smoke-verify each bin (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          hash -r
          while IFS= read -r BIN; do
            [ -z "$BIN" ] && continue
            RESOLVED="$(command -v "$BIN")" || { echo "::error::bin '$BIN' not found on PATH after install"; exit 1; }
            echo "Resolved '$BIN' -> $RESOLVED"
            ok=0
            for args in "--version" "--help" ""; do
              # shellcheck disable=SC2086
              if "$BIN" $args >/dev/null 2>&1; then ok=1; echo "  launched: $BIN $args (exit 0)"; break; fi
            done
            [ "$ok" -eq 1 ] || { echo "::error::bin '$BIN' resolved but failed to execute (--version/--help/no-arg all non-zero)"; exit 1; }
          done < bin_names.txt
          echo "All bins launched successfully."

      - name: Launch / smoke-verify each bin (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bins = Get-Content bin_names.txt | Where-Object { $_.Trim() -ne '' }
          foreach ($bin in $bins) {
            $cmd = Get-Command $bin -ErrorAction SilentlyContinue
            if (-not $cmd) { throw "bin '$bin' not found on PATH after install" }
            Write-Host "Resolved '$bin' -> $($cmd.Source)"
            $ok = $false
            foreach ($args in @('--version','--help','')) {
              $argList = if ($args -ne '') { @($args) } else { @() }
              $proc = Start-Process -FilePath $cmd.Source -ArgumentList $argList -NoNewWindow -Wait -PassThru `
                        -RedirectStandardOutput $env:TEMP\nb_out.txt -RedirectStandardError $env:TEMP\nb_err.txt
              if ($proc.ExitCode -eq 0) { $ok = $true; Write-Host "  launched: $bin $args (exit 0)"; break }
            }
            if (-not $ok) { throw "bin '$bin' resolved but failed to execute (--version/--help/no-arg all non-zero)" }
          }
          Write-Host "All bins launched successfully."

      # ---------- G6: REAL UPGRADE over a genuine previous release ----------
      # Create real dirty state by FIRST installing the latest published version
      # from the npm registry, then installing our freshly-built tarball over it,
      # then re-launching. Graceful skip if the package was never published.
      - name: Upgrade over previous published release (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Query the registry. Distinguish three outcomes:
          #   - package never published (E404)  -> legitimate SKIP (visible ::notice::)
          #   - registry/network error          -> FAIL (do not swallow + skip green)
          #   - a prior version exists           -> run the real upgrade
          PREV=""
          if PREV="$(npm view "$PKG_NAME" version 2>view_err.txt)"; then
            PREV="$(printf '%s' "$PREV" | tr -d '[:space:]')"
          else
            if grep -qiE 'E404|404 Not Found|is not in this registry|no such package' view_err.txt; then
              echo "::notice::No prior published version of '$PKG_NAME' on the registry -> SKIPPED upgrade test (clean-machine install is NOT an upgrade)."
              cat view_err.txt || true
              exit 0
            fi
            echo "::error::Failed to query registry for prior version of '$PKG_NAME' (not a 404 - treating as a real failure):"
            cat view_err.txt || true
            exit 1
          fi
          if [ -z "$PREV" ]; then
            echo "::notice::Registry returned no version for '$PKG_NAME' -> SKIPPED upgrade test (no prior release to upgrade from)."
            exit 0
          fi
          echo "Previous published version: $PREV"
          npm install -g "${PKG_NAME}@${PREV}"
          FIRST_BIN="$(head -n1 bin_names.txt)"
          hash -r
          command -v "$FIRST_BIN" >/dev/null || { echo "::error::previous version did not install bin '$FIRST_BIN'"; exit 1; }
          echo "Dirty state established with $PKG_NAME@$PREV. Upgrading with freshly built tarball..."
          npm install -g "./$TARBALL"
          hash -r
          NEW_VER="$(node -p "require('./package.json').version")"
          INSTALLED="$(npm ls -g --depth=0 "$PKG_NAME" 2>/dev/null | grep -oE "${PKG_NAME}@[0-9][^ ]*" | head -n1 || true)"
          echo "After upgrade, global list shows: ${INSTALLED:-<none>}"
          # Hard-assert the freshly built version is the one now installed (a no-op
          # "upgrade" that left the old version in place must NOT pass green).
          [ -n "$INSTALLED" ] || { echo "::error::package '$PKG_NAME' not found in global list after upgrade"; exit 1; }
          [ "$INSTALLED" = "${PKG_NAME}@${NEW_VER}" ] || { echo "::error::after upgrade installed '$INSTALLED' but expected '${PKG_NAME}@${NEW_VER}'"; exit 1; }
          command -v "$FIRST_BIN" >/dev/null || { echo "::error::bin '$FIRST_BIN' missing after upgrade"; exit 1; }
          "$FIRST_BIN" --version >/dev/null 2>&1 || "$FIRST_BIN" --help >/dev/null 2>&1 || { echo "::error::bin failed to run after upgrade"; exit 1; }
          echo "Upgrade $PREV -> $NEW_VER verified."

      - name: Upgrade over previous published release (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Query the registry. Distinguish package-never-published (E404 -> legitimate
          # SKIP) from a real registry/network failure (must FAIL, never skip green).
          $prevErr = & npm view $env:PKG_NAME version 2>&1
          $prevCode = $LASTEXITCODE
          if ($prevCode -ne 0) {
            $errText = ($prevErr | Out-String)
            if ($errText -match '(?i)E404|404 Not Found|is not in this registry|no such package') {
              Write-Host "::notice::No prior published version of '$($env:PKG_NAME)' on the registry -> SKIPPED upgrade test (clean-machine install is NOT an upgrade)."
              Write-Host $errText
              exit 0
            }
            Write-Host $errText
            throw "Failed to query registry for prior version of '$($env:PKG_NAME)' (not a 404 - treating as a real failure)"
          }
          $prev = (($prevErr | Out-String) -replace '\s', '')
          if (-not $prev) {
            Write-Host "::notice::Registry returned no version for '$($env:PKG_NAME)' -> SKIPPED upgrade test (no prior release to upgrade from)."
            exit 0
          }
          Write-Host "Previous published version: $prev"
          npm install -g "$($env:PKG_NAME)@$prev"
          if ($LASTEXITCODE -ne 0) { throw "installing previous version failed ($LASTEXITCODE)" }
          $firstBin = (Get-Content bin_names.txt | Where-Object { $_.Trim() -ne '' } | Select-Object -First 1)
          if (-not (Get-Command $firstBin -ErrorAction SilentlyContinue)) { throw "previous version did not install bin '$firstBin'" }
          Write-Host "Dirty state established with $($env:PKG_NAME)@$prev. Upgrading with freshly built tarball..."
          npm install -g "./$($env:TARBALL)"
          if ($LASTEXITCODE -ne 0) { throw "upgrade install failed ($LASTEXITCODE)" }
          # Hard-assert the freshly built version is now the installed one.
          $newVer = (node -p "require('./package.json').version")
          $listed = (npm ls -g --depth=0 $env:PKG_NAME 2>$null | Out-String)
          $expected = "$($env:PKG_NAME)@$newVer"
          Write-Host "After upgrade, global list shows: $listed"
          if ($listed -notmatch [regex]::Escape($expected)) {
            throw "after upgrade expected '$expected' in global list but it was not found"
          }
          $cmd = Get-Command $firstBin -ErrorAction SilentlyContinue
          if (-not $cmd) { throw "bin '$firstBin' missing after upgrade" }
          $proc = Start-Process -FilePath $cmd.Source -ArgumentList '--version' -NoNewWindow -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            $proc = Start-Process -FilePath $cmd.Source -ArgumentList '--help' -NoNewWindow -Wait -PassThru
            if ($proc.ExitCode -ne 0) { throw "bin failed to run after upgrade" }
          }
          Write-Host "Upgrade from $prev to $newVer verified."

      # ---------- G7: REAL UNINSTALL + negative assertion ----------
      - name: Uninstall and verify full removal (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          npm uninstall -g "$PKG_NAME"
          hash -r
          # Negative assertion: package gone from global list AND every bin gone from PATH.
          if npm ls -g --depth=0 "$PKG_NAME" 2>/dev/null | grep -q "${PKG_NAME}@"; then
            echo "::error::Package '$PKG_NAME' still present in global list after uninstall"; exit 1
          fi
          fail=0
          while IFS= read -r BIN; do
            [ -z "$BIN" ] && continue
            if command -v "$BIN" >/dev/null 2>&1; then
              echo "::error::bin '$BIN' still resolves on PATH after uninstall ($(command -v "$BIN"))"; fail=1
            fi
          done < bin_names.txt
          [ "$fail" -eq 0 ] || exit 1
          echo "Uninstall verified: package and all bins removed."

      - name: Uninstall and verify full removal (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          npm uninstall -g $env:PKG_NAME
          if ($LASTEXITCODE -ne 0) { throw "npm uninstall -g failed ($LASTEXITCODE)" }
          $globalList = (npm ls -g --depth=0 $env:PKG_NAME 2>$null | Out-String)
          if ($globalList -match [regex]::Escape("$($env:PKG_NAME)@")) {
            throw "Package '$($env:PKG_NAME)' still present in global list after uninstall"
          }
          $fail = $false
          $bins = Get-Content bin_names.txt | Where-Object { $_.Trim() -ne '' }
          foreach ($bin in $bins) {
            $cmd = Get-Command $bin -ErrorAction SilentlyContinue
            if ($cmd) { Write-Host "::error::bin '$bin' still resolves on PATH after uninstall ($($cmd.Source))"; $fail = $true }
          }
          if ($fail) { throw "Uninstall incomplete: one or more bins still present" }
          Write-Host "Uninstall verified: package and all bins removed."

      # ---------- TRIPWIRE: only set after a full, real lifecycle has passed ----------
      # Set as the FINAL step of a successful lifecycle (after uninstall verification),
      # so a leg that skipped every real step never sets the marker and is caught
      # downstream. Per-OS because the lifecycle is implemented per-OS above.
      - name: Mark lifecycle OK (POSIX)
        if: matrix.type == 'npm-bin' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "npm-bin lifecycle complete (build -> install -> launch -> upgrade -> uninstall)."

      - name: Mark lifecycle OK (Windows)
        if: matrix.type == 'npm-bin' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "npm-bin lifecycle complete (build -> install -> launch -> upgrade -> uninstall)."


      # ===================== go-binary =====================
      - name: Checkout
        if: matrix.type == 'go-binary'
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.type == 'go-binary'
        uses: actions/setup-go@v6
        with:
          # Pin the toolchain to whatever the module declares; avoids drift.
          go-version-file: go.mod
          cache: true

      # ----------------------------------------------------------------------------
      # BUILD (G2): produce the binary in the job. Never assume dist/ exists.
      # Pure-static, reproducible build. Output name differs by OS (.exe on Windows).
      # ----------------------------------------------------------------------------
      - name: Build binary (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          # ${{ env.APP_NAME }} / ${{ env.MAIN_PKG }} are workflow-level inputs;
          # default MAIN_PKG to '.' if the main package is the repo root.
          APP_NAME="${APP_NAME:-app}"
          MAIN_PKG="${MAIN_PKG:-.}"
          go build -trimpath -ldflags "-s -w" -o "dist/${APP_NAME}" "${MAIN_PKG}"
          echo "ARTIFACT_PATH=dist/${APP_NAME}" >> "$GITHUB_ENV"
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"

      - name: Build binary (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: '0'
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $app = if ($env:APP_NAME) { $env:APP_NAME } else { 'app' }
          $pkg = if ($env:MAIN_PKG) { $env:MAIN_PKG } else { '.' }
          go build -trimpath -ldflags "-s -w" -o "dist/$app.exe" "$pkg"
          if ($LASTEXITCODE -ne 0) { throw "go build failed with exit code $LASTEXITCODE" }
          "ARTIFACT_PATH=dist/$app.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "APP_NAME=$app"             | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ----------------------------------------------------------------------------
      # VERIFY ARTIFACT EXISTS (G2): hard-fail before any install attempt.
      # ----------------------------------------------------------------------------
      - name: Verify artifact exists (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -f "${ARTIFACT_PATH}" || { echo "::error::Build artifact ${ARTIFACT_PATH} not found"; exit 1; }
          test -s "${ARTIFACT_PATH}" || { echo "::error::Build artifact ${ARTIFACT_PATH} is empty"; exit 1; }
          chmod +x "${ARTIFACT_PATH}"
          file "${ARTIFACT_PATH}" || true
          echo "Artifact OK: $(ls -l "${ARTIFACT_PATH}")"

      - name: Verify artifact exists (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -Path $env:ARTIFACT_PATH)) { throw "Build artifact $env:ARTIFACT_PATH not found" }
          if ((Get-Item $env:ARTIFACT_PATH).Length -le 0) { throw "Build artifact $env:ARTIFACT_PATH is empty" }
          Write-Host "Artifact OK:"; Get-Item $env:ARTIFACT_PATH | Format-List FullName,Length

      # ----------------------------------------------------------------------------
      # SIGNING / GATEKEEPER (G8): Go binaries are unsigned by default.
      # On public CI without signing secrets we do a STRUCTURAL check and WARN only.
      # macOS: codesign/spctl (expect "code object is not signed at all" -> warn).
      # Windows: Authenticode status (expect NotSigned -> warn). Never hard-fail here.
      # ----------------------------------------------------------------------------
      - name: Signing / notarization check (macOS, warn-only)
        if: matrix.type == 'go-binary' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          echo "::group::codesign -dvv"
          if codesign -dvv "${ARTIFACT_PATH}" 2>&1; then
            echo "Binary carries a code signature."
          else
            echo "::warning::Go binary is unsigned (codesign found no signature). On end-user macOS this triggers Gatekeeper quarantine unless the user clears the com.apple.quarantine xattr or you notarize the release. Set up Developer ID signing + notarytool for production."
          fi
          echo "::endgroup::"
          echo "::group::spctl assessment"
          spctl -a -vvv -t install "${ARTIFACT_PATH}" 2>&1 || echo "::warning::spctl assessment rejected the unsigned binary (expected on public CI)."
          echo "::endgroup::"

      - name: Signing check (Windows, warn-only)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sig = Get-AuthenticodeSignature -FilePath $env:ARTIFACT_PATH
          Write-Host "Authenticode status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Host "::warning::Go binary is not Authenticode-signed (status=$($sig.Status)). On end-user Windows this triggers SmartScreen/Defender warnings. Use signtool with a code-signing cert for production releases."
          } else {
            Write-Host "Binary is Authenticode-signed by: $($sig.SignerCertificate.Subject)"
          }

      # ----------------------------------------------------------------------------
      # INSTALL - USER SCOPE: copy binary onto a per-user PATH dir.
      # Unix: ~/.local/bin ; Windows: %LOCALAPPDATA%\Programs\<app>\bin (+ add to PATH).
      # G1: cp/Copy-Item fail-fast under strict mode; assert the file landed.
      # ----------------------------------------------------------------------------
      - name: Install (user scope, Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          USER_BIN="${HOME}/.local/bin"
          mkdir -p "${USER_BIN}"
          install -m 0755 "${ARTIFACT_PATH}" "${USER_BIN}/${APP_NAME}"
          test -x "${USER_BIN}/${APP_NAME}" || { echo "::error::User-scope install missing"; exit 1; }
          echo "${USER_BIN}" >> "$GITHUB_PATH"
          echo "USER_BIN=${USER_BIN}" >> "$GITHUB_ENV"
          echo "Installed to user scope: ${USER_BIN}/${APP_NAME}"

      - name: Install (user scope, Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $userBin = Join-Path $env:LOCALAPPDATA "Programs\$($env:APP_NAME)\bin"
          New-Item -ItemType Directory -Force -Path $userBin | Out-Null
          Copy-Item -Path $env:ARTIFACT_PATH -Destination (Join-Path $userBin "$($env:APP_NAME).exe") -Force
          $dest = Join-Path $userBin "$($env:APP_NAME).exe"
          if (-not (Test-Path $dest)) { throw "User-scope install missing: $dest" }
          Add-Content -Path $env:GITHUB_PATH -Value $userBin
          "USER_BIN=$userBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Installed to user scope: $dest"

      # ----------------------------------------------------------------------------
      # LAUNCH / SMOKE-VERIFY (G5): a Go binary is a CLI, not a GUI, so a real
      # invocation (--version / --help) that returns exit 0 IS the correct smoke test.
      # G1: capture exit code explicitly and fail the job if non-zero.
      # Uses the freshly-installed copy resolved off PATH, not the dist/ artifact.
      # ----------------------------------------------------------------------------
      - name: Launch / smoke test (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          command -v "${APP_NAME}" >/dev/null 2>&1 || { echo "::error::${APP_NAME} not on PATH after install"; exit 1; }
          # Prefer --version; fall back to --help. Either must exit 0.
          if "${APP_NAME}" --version; then
            echo "smoke: --version OK"
          elif "${APP_NAME}" --help; then
            echo "smoke: --help OK"
          else
            echo "::error::Installed binary failed to launch (--version and --help both non-zero)"
            exit 1
          fi

      - name: Launch / smoke test (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Get-Command "$($env:APP_NAME).exe" -ErrorAction SilentlyContinue
          if (-not $exe) { throw "$($env:APP_NAME).exe not on PATH after install" }
          $p = Start-Process -FilePath $exe.Source -ArgumentList '--version' -NoNewWindow -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            $h = Start-Process -FilePath $exe.Source -ArgumentList '--help' -NoNewWindow -Wait -PassThru
            if ($h.ExitCode -ne 0) { throw "Installed binary failed to launch (--version exit $($p.ExitCode), --help exit $($h.ExitCode))" }
          }
          Write-Host "smoke: launch OK"

      # ----------------------------------------------------------------------------
      # INSTALL - SYSTEM SCOPE: copy onto a system-wide PATH dir.
      # Unix: /usr/local/bin (needs sudo). Windows: %ProgramFiles% (admin; GH runner
      # user is admin, so this works). Real distinction from user-scope install.
      # ----------------------------------------------------------------------------
      - name: Install (system scope, Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          SYS_BIN="/usr/local/bin"
          sudo install -m 0755 "${ARTIFACT_PATH}" "${SYS_BIN}/${APP_NAME}"
          test -x "${SYS_BIN}/${APP_NAME}" || { echo "::error::System-scope install missing"; exit 1; }
          echo "SYS_BIN=${SYS_BIN}" >> "$GITHUB_ENV"
          # Verify it launches from the system path explicitly.
          "${SYS_BIN}/${APP_NAME}" --version || "${SYS_BIN}/${APP_NAME}" --help || { echo "::error::System-scope binary failed to launch"; exit 1; }
          echo "Installed to system scope: ${SYS_BIN}/${APP_NAME}"

      - name: Install (system scope, Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sysBin = Join-Path $env:ProgramFiles "$($env:APP_NAME)\bin"
          New-Item -ItemType Directory -Force -Path $sysBin | Out-Null
          $dest = Join-Path $sysBin "$($env:APP_NAME).exe"
          Copy-Item -Path $env:ARTIFACT_PATH -Destination $dest -Force
          if (-not (Test-Path $dest)) { throw "System-scope install missing: $dest" }
          "SYS_BIN=$sysBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $p = Start-Process -FilePath $dest -ArgumentList '--version' -NoNewWindow -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            $h = Start-Process -FilePath $dest -ArgumentList '--help' -NoNewWindow -Wait -PassThru
            if ($h.ExitCode -ne 0) { throw "System-scope binary failed to launch (exit $($p.ExitCode))" }
          }
          Write-Host "Installed to system scope: $dest"

      # ----------------------------------------------------------------------------
      # UPGRADE (G6): FIRST install a REAL previous release to create dirty state,
      # THEN install the freshly-built current binary OVER it and verify it replaced
      # the old one. Graceful skip if the repo has no prior published release.
      # Asset names follow the GoReleaser/standard convention:
      #   <app>_<os>_<arch>.tar.gz (Unix) / <app>_<os>_<arch>.zip (Windows).
      # G3: download URL uses gh release download (handles the
      #     https://github.com/OWNER/REPO/releases/download/TAG/ASSET path correctly).
      # ----------------------------------------------------------------------------
      - name: Upgrade over previous release (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          UP_BIN="${HOME}/.local/bin"
          mkdir -p "${UP_BIN}"

          # Resolve latest published release tag. An API error must FAIL (not skip);
          # only a genuinely empty release list is a legitimate skip.
          PREV_TAG="$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')" || { echo "::error::gh release list failed (API/auth error); cannot determine prior release"; exit 1; }
          if [ -z "${PREV_TAG}" ] || [ "${PREV_TAG}" = "null" ]; then
            echo "::notice::No prior release found; skipping upgrade test (clean-machine install is NOT an upgrade)."
            exit 0
          fi
          echo "Previous release: ${PREV_TAG}"

          # Map runner to GoReleaser-style os/arch tokens.
          case "$(uname -s)" in Darwin) OS=darwin;; Linux) OS=linux;; *) OS=unknown;; esac
          case "$(uname -m)" in x86_64|amd64) ARCH=amd64;; arm64|aarch64) ARCH=arm64;; *) ARCH=$(uname -m);; esac
          ASSET="${APP_NAME}_${OS}_${ARCH}.tar.gz"

          # Enumerate the release's asset names FIRST so we can distinguish
          # "no matching asset exists" (legitimate skip) from "download failed"
          # (network/auth error -> MUST hard-fail, never swallow into a green skip).
          ASSET_NAMES="$(gh release view "${PREV_TAG}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          PATTERN=""
          if printf '%s\n' "${ASSET_NAMES}" | grep -qx "${ASSET}"; then
            PATTERN="${ASSET}"
          else
            # Fall back to any tar.gz for this OS regardless of arch token.
            MATCH="$(printf '%s\n' "${ASSET_NAMES}" | grep -E "^${APP_NAME}_${OS}_.*\.tar\.gz$" | head -n1 || true)"
            if [ -n "${MATCH}" ]; then
              echo "::warning::Exact asset ${ASSET} not in ${PREV_TAG}; using ${MATCH} instead."
              PATTERN="${MATCH}"
            fi
          fi
          if [ -z "${PATTERN}" ]; then
            echo "::notice::No matching ${OS} tar.gz asset for ${APP_NAME} in ${PREV_TAG}; skipping upgrade test (artifact variant absent, lifecycle not exercised)."
            exit 0
          fi

          tmp="$(mktemp -d)"
          # No 2>/dev/null and no '|| true': a genuine download failure now fails the job.
          gh release download "${PREV_TAG}" --repo "${{ github.repository }}" --pattern "${PATTERN}" --dir "${tmp}" || { echo "::error::Download of prior-release asset ${PATTERN} from ${PREV_TAG} failed"; exit 1; }

          tar -xzf "${tmp}"/*.tar.gz -C "${tmp}"
          OLD_BIN="$(find "${tmp}" -type f -name "${APP_NAME}" | head -n1)"
          [ -n "${OLD_BIN}" ] || { echo "::notice::No '${APP_NAME}' binary inside archive; skipping."; exit 0; }

          # macOS: strip com.apple.quarantine so an unsigned prior release does not
          # hard-fail Gatekeeper when launched below (G6/G8 stays warn-only).
          if [ "${OS}" = "darwin" ]; then
            xattr -dr com.apple.quarantine "${OLD_BIN}" 2>/dev/null || true
          fi

          # 1) Install the OLD version to create genuine dirty state.
          install -m 0755 "${OLD_BIN}" "${UP_BIN}/${APP_NAME}"
          OLD_VER="$("${UP_BIN}/${APP_NAME}" --version 2>/dev/null || echo 'unknown')"
          echo "Installed previous version reports: ${OLD_VER}"

          # 2) Upgrade IN PLACE with the freshly-built current binary.
          install -m 0755 "${ARTIFACT_PATH}" "${UP_BIN}/${APP_NAME}"
          NEW_VER="$("${UP_BIN}/${APP_NAME}" --version 2>/dev/null || echo 'unknown')"
          echo "After upgrade reports: ${NEW_VER}"

          # 3) Verify the on-disk binary is now the current build, and it still launches.
          "${UP_BIN}/${APP_NAME}" --version || "${UP_BIN}/${APP_NAME}" --help || { echo "::error::Upgraded binary failed to launch"; exit 1; }
          if [ "${OLD_VER}" != "unknown" ] && [ "${NEW_VER}" != "unknown" ] && [ "${OLD_VER}" = "${NEW_VER}" ]; then
            echo "::warning::Version string unchanged after upgrade (${NEW_VER}); ensure -ldflags injects version, or prior release was same version."
          fi
          echo "Upgrade over ${PREV_TAG} succeeded."

      - name: Upgrade over previous release (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $upBin = Join-Path $env:LOCALAPPDATA "Programs\$($env:APP_NAME)\bin"
          New-Item -ItemType Directory -Force -Path $upBin | Out-Null

          # An API error must FAIL (not skip); only an empty list is a legitimate skip.
          $prevTag = (gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          if ($LASTEXITCODE -ne 0) { throw "gh release list failed (API/auth error); cannot determine prior release" }
          if ([string]::IsNullOrWhiteSpace($prevTag) -or $prevTag -eq 'null') {
            Write-Host "::notice::No prior release found; skipping upgrade test (clean install is NOT an upgrade)."
            exit 0
          }
          Write-Host "Previous release: $prevTag"

          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'amd64' }
          $asset = "$($env:APP_NAME)_windows_$arch.zip"
          $tmp = Join-Path $env:RUNNER_TEMP ("up_" + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null

          # Enumerate the release's asset names FIRST to distinguish "no matching asset"
          # (legitimate skip) from "download failed" (network/auth -> MUST hard-fail).
          $assetNames = (gh release view $prevTag --repo "${{ github.repository }}" --json assets --jq '.assets[].name')
          if ($LASTEXITCODE -ne 0) { throw "Failed to query assets of release $prevTag" }
          $names = @($assetNames -split "`n" | Where-Object { $_ -ne '' })
          $pattern = $null
          if ($names -contains $asset) {
            $pattern = $asset
          } else {
            $match = $names | Where-Object { $_ -match "^$([regex]::Escape($env:APP_NAME))_windows_.*\.zip$" } | Select-Object -First 1
            if ($match) {
              Write-Host "::warning::Exact asset $asset not in $prevTag; using $match instead."
              $pattern = $match
            }
          }
          if (-not $pattern) {
            Write-Host "::notice::No matching Windows zip asset for $($env:APP_NAME) in $prevTag; skipping upgrade test (artifact variant absent, lifecycle not exercised)."
            exit 0
          }

          # No 2>$null: a genuine download failure now fails the job.
          gh release download $prevTag --repo "${{ github.repository }}" --pattern $pattern --dir $tmp
          if ($LASTEXITCODE -ne 0) { throw "Download of prior-release asset $pattern from $prevTag failed" }

          $zip = Get-ChildItem -Path $tmp -Filter *.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $tmp -Force
          $oldBin = Get-ChildItem -Path $tmp -Recurse -Filter "$($env:APP_NAME).exe" | Select-Object -First 1
          if (-not $oldBin) { Write-Host "::notice::No $($env:APP_NAME).exe in archive; skipping."; exit 0 }

          $dest = Join-Path $upBin "$($env:APP_NAME).exe"
          # 1) Install OLD version (dirty state)
          Copy-Item -Path $oldBin.FullName -Destination $dest -Force
          $oldVer = (& $dest --version) 2>&1 | Out-String
          Write-Host "Previous version reports: $($oldVer.Trim())"

          # 2) Upgrade in place with current build
          Copy-Item -Path $env:ARTIFACT_PATH -Destination $dest -Force
          $p = Start-Process -FilePath $dest -ArgumentList '--version' -NoNewWindow -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            $h = Start-Process -FilePath $dest -ArgumentList '--help' -NoNewWindow -Wait -PassThru
            if ($h.ExitCode -ne 0) { throw "Upgraded binary failed to launch (exit $($p.ExitCode))" }
          }
          Write-Host "Upgrade over $prevTag succeeded."

      # ----------------------------------------------------------------------------
      # UNINSTALL + VERIFY REMOVAL (G7): remove from BOTH scopes, then NEGATIVE-ASSERT
      # that nothing remains (file gone AND not resolvable on PATH).
      # ----------------------------------------------------------------------------
      - name: Uninstall and verify removal (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Remove user-scope and system-scope copies.
          rm -f "${USER_BIN}/${APP_NAME}" || true
          rm -f "${HOME}/.local/bin/${APP_NAME}" || true
          sudo rm -f "${SYS_BIN:-/usr/local/bin}/${APP_NAME}" || true

          FAIL=0
          for f in "${USER_BIN}/${APP_NAME}" "${HOME}/.local/bin/${APP_NAME}" "${SYS_BIN:-/usr/local/bin}/${APP_NAME}"; do
            if [ -e "${f}" ]; then echo "::error::Uninstall left file behind: ${f}"; FAIL=1; fi
          done
          # Negative assertion: must NOT resolve on PATH anymore (hash -r clears cache).
          hash -r 2>/dev/null || true
          if command -v "${APP_NAME}" >/dev/null 2>&1; then
            echo "::error::${APP_NAME} still resolvable on PATH after uninstall: $(command -v "${APP_NAME}")"
            FAIL=1
          fi
          [ "${FAIL}" -eq 0 ] || exit 1
          echo "Uninstall verified: no residual files, not on PATH."

      - name: Uninstall and verify removal (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exeName = "$($env:APP_NAME).exe"
          $userDest = Join-Path $env:USER_BIN $exeName
          $sysDest  = Join-Path $env:SYS_BIN  $exeName
          Remove-Item -Path $userDest -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $sysDest  -Force -ErrorAction SilentlyContinue
          # Also remove the upgrade-scope copy.
          Remove-Item -Path (Join-Path $env:LOCALAPPDATA "Programs\$($env:APP_NAME)\bin\$exeName") -Force -ErrorAction SilentlyContinue

          $fail = $false
          foreach ($f in @($userDest, $sysDest)) {
            if ($f -and (Test-Path $f)) { Write-Host "::error::Uninstall left file behind: $f"; $fail = $true }
          }
          # Negative assertion on PATH resolution.
          $still = Get-Command $exeName -ErrorAction SilentlyContinue
          if ($still) { Write-Host "::error::$exeName still resolvable on PATH: $($still.Source)"; $fail = $true }
          if ($fail) { throw "Uninstall verification failed." }
          Write-Host "Uninstall verified: no residual files, not on PATH."

      # ----------------------------------------------------------------------------
      # LIFECYCLE TRIPWIRE: only reached after a full BUILD->INSTALL->LAUNCH->UPGRADE
      # ->UNINSTALL-verified pass. Lets a downstream gate catch an all-skip leg that
      # went green without exercising anything.
      # ----------------------------------------------------------------------------
      - name: Mark lifecycle complete (Unix)
        if: matrix.type == 'go-binary' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "go-binary lifecycle complete on ${RUNNER_OS}."

      - name: Mark lifecycle complete (Windows)
        if: matrix.type == 'go-binary' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "go-binary lifecycle complete on $env:RUNNER_OS."


      # ===================== cargo-binary =====================
      # ============================================================================
      # cargo-binary installer recipe — paste under a job's `steps:`
      # Assumes a matrix with `type` and the job running across the 3-OS matrix:
      #   strategy:
      #     matrix:
      #       type: [cargo-binary, ...]
      #       os: [ubuntu-latest, windows-latest, macos-latest]
      #   runs-on: ${{ matrix.os }}
      # Env knobs (override per repo):
      #   CARGO_BIN_NAME : the installed binary name (defaults below to repo name)
      # Every step is gated on matrix.type == 'cargo-binary'. CLI tool => --version
      # is a valid smoke (G5 GUI-launch N/A, documented in guards).
      # ============================================================================

      - name: Checkout
        if: ${{ matrix.type == 'cargo-binary' }}
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        if: ${{ matrix.type == 'cargo-binary' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        if: ${{ matrix.type == 'cargo-binary' }}
        uses: Swatinem/rust-cache@v2

      # --- Resolve binary name from Cargo metadata (one source of truth) ----------
      - name: Resolve binary name (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          NAME="${CARGO_BIN_NAME:-}"
          if [ -z "$NAME" ]; then
            # First [[bin]] name, else package name. Requires jq (preinstalled on hosted runners).
            NAME="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0] as $p | ($p.targets[] | select(.kind[]=="bin") | .name) // $p.name' | head -n1)"
          fi
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            echo "::error::Could not resolve cargo binary name"; exit 1
          fi
          echo "BIN_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Resolved binary name: $NAME"

      - name: Resolve binary name (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $name = $env:CARGO_BIN_NAME
          if ([string]::IsNullOrWhiteSpace($name)) {
            $meta = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
            $pkg = $meta.packages[0]
            $bin = ($pkg.targets | Where-Object { $_.kind -contains 'bin' } | Select-Object -First 1)
            $name = if ($bin) { $bin.name } else { $pkg.name }
          }
          if ([string]::IsNullOrWhiteSpace($name)) { Write-Error "Could not resolve cargo binary name"; exit 1 }
          "BIN_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Resolved binary name: $name"

      # --- G2: BUILD the artifact in-job (never assume a prebuilt binary) ---------
      - name: Build release binary
        if: ${{ matrix.type == 'cargo-binary' }}
        shell: bash
        run: |
          set -euo pipefail
          # --locked guards against Cargo.lock drift; build fails the job on any error (G1).
          cargo build --release --locked

      # --- G2: verify the artifact EXISTS before install --------------------------
      - name: Verify built artifact exists (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          ART="target/release/${BIN_NAME}"
          if [ ! -f "$ART" ]; then
            echo "::error::Expected build artifact not found: $ART"; ls -la target/release || true; exit 1
          fi
          echo "Artifact present: $ART"
          file "$ART" || true

      - name: Verify built artifact exists (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $art = "target/release/$($env:BIN_NAME).exe"
          if (-not (Test-Path -LiteralPath $art)) {
            Write-Error "Expected build artifact not found: $art"
            Get-ChildItem target/release -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Artifact present: $art"

      # --- G8: signing posture (WARN-only; cargo binaries are unsigned) -----------
      - name: Signing posture check (macOS, WARN-only)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'macOS' }}
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          ART="target/release/${BIN_NAME}"
          echo "::group::codesign / spctl"
          if codesign -dv --verbose=4 "$ART" 2>&1; then
            echo "Binary carries a code signature."
          else
            echo "::warning::Binary is not code-signed (expected for cargo binaries on public CI without Developer ID)."
          fi
          spctl --assess --type execute --verbose "$ART" 2>&1 || echo "::warning::spctl assessment rejected/unsigned binary (no notarization). Non-blocking."
          echo "::endgroup::"

      - name: Signing posture check (Windows, WARN-only)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $art = "target/release/$($env:BIN_NAME).exe"
          $sig = Get-AuthenticodeSignature -LiteralPath $art
          Write-Host "Authenticode status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Host "::warning::Binary is not Authenticode-signed (Status=$($sig.Status)). Expected for cargo binaries on public CI; non-blocking."
          }

      # --- INSTALL: user scope (real user prefix on PATH) -------------------------
      - name: Install (user scope) (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          USER_ROOT="$HOME/.cargo-user"
          # cargo install runs directly: a crashed/failed install turns the job red (G1).
          cargo install --path . --root "$USER_ROOT" --force --locked
          INSTALLED="$USER_ROOT/bin/${BIN_NAME}"
          if [ ! -x "$INSTALLED" ]; then
            echo "::error::User-scope install did not produce $INSTALLED"; exit 1
          fi
          echo "USER_ROOT=$USER_ROOT" >> "$GITHUB_ENV"
          echo "$USER_ROOT/bin" >> "$GITHUB_PATH"
          echo "Installed (user scope): $INSTALLED"

      - name: Install (user scope) (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $userRoot = Join-Path $env:USERPROFILE '.cargo-user'
          cargo install --path . --root $userRoot --force --locked
          if ($LASTEXITCODE -ne 0) { Write-Error "cargo install (user) failed with exit $LASTEXITCODE"; exit 1 }
          $installed = Join-Path $userRoot "bin/$($env:BIN_NAME).exe"
          if (-not (Test-Path -LiteralPath $installed)) { Write-Error "User-scope install did not produce $installed"; exit 1 }
          "USER_ROOT=$userRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Join-Path $userRoot 'bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "Installed (user scope): $installed"

      # --- INSTALL: system scope (shared prefix; the real user-vs-system axis) -----
      # For cargo binaries the user/system distinction is the install PREFIX, not a
      # package DB. System scope = a root-owned shared prefix (/usr/local). Windows
      # has no canonical system cargo prefix, so system-scope is Linux/macOS only.
      - name: Install (system scope) (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          SYS_ROOT="/usr/local"
          # --root must be writable by the install; use sudo for the shared prefix.
          sudo env "PATH=$PATH" "HOME=$HOME" "$(command -v cargo)" install --path . --root "$SYS_ROOT" --force --locked
          INSTALLED="$SYS_ROOT/bin/${BIN_NAME}"
          if [ ! -x "$INSTALLED" ]; then
            echo "::error::System-scope install did not produce $INSTALLED"; exit 1
          fi
          echo "SYS_ROOT=$SYS_ROOT" >> "$GITHUB_ENV"
          echo "Installed (system scope): $INSTALLED"

      # --- G5: REAL launch/smoke of the INSTALLED binary (CLI tool) ---------------
      - name: Smoke-launch installed binary (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="$USER_ROOT/bin/${BIN_NAME}"
          echo "Launching installed binary: $BIN"
          # Capture output without letting set -e short-circuit the explicit RC check.
          OUT=""; RC=0
          OUT="$("$BIN" --version)" || RC=$?
          if [ "$RC" -ne 0 ]; then echo "::error::--version exited $RC"; exit 1; fi
          if [ -z "$OUT" ]; then echo "::error::--version produced empty output"; exit 1; fi
          echo "version output: $OUT"
          # --help is a second real invocation guarding against a stub that only knows --version.
          "$BIN" --help >/dev/null
          echo "Smoke launch OK"

      - name: Smoke-launch installed binary (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:USER_ROOT "bin/$($env:BIN_NAME).exe"
          Write-Host "Launching installed binary: $bin"
          $proc = Start-Process -FilePath $bin -ArgumentList '--version' -Wait -PassThru -NoNewWindow `
                    -RedirectStandardOutput "$env:RUNNER_TEMP\ver.txt"
          if ($proc.ExitCode -ne 0) { Write-Error "--version exited $($proc.ExitCode)"; exit 1 }
          $out = Get-Content "$env:RUNNER_TEMP\ver.txt" -Raw
          if ([string]::IsNullOrWhiteSpace($out)) { Write-Error "--version produced empty output"; exit 1 }
          Write-Host "version output: $out"
          $h = Start-Process -FilePath $bin -ArgumentList '--help' -Wait -PassThru -NoNewWindow
          if ($h.ExitCode -ne 0) { Write-Error "--help exited $($h.ExitCode)"; exit 1 }
          Write-Host "Smoke launch OK"

      # --- G6: REAL upgrade — install an actual PRIOR version first, then upgrade --
      - name: Upgrade over previous release (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          UP_ROOT="$HOME/.cargo-upgrade"
          mkdir -p "$UP_ROOT/bin"
          PREV_OK=0
          # Try latest published GitHub release asset (real prior version => dirty state).
          # Only swallow the "no releases exist" case; any OTHER gh failure must surface.
          TAG=""
          if TAG="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName 2>/tmp/gh_view.err)"; then
            :
          else
            if grep -qiE 'release not found|no releases|not found' /tmp/gh_view.err; then
              TAG=""   # legitimately no releases yet
            else
              echo "::error::gh release view failed (not a 'no releases' condition):"; cat /tmp/gh_view.err; exit 1
            fi
          fi
          if [ -n "${TAG:-}" ]; then
            OS="$(uname -s | tr '[:upper:]' '[:lower:]')"   # darwin|linux
            ARCH="$(uname -m)"                               # x86_64|arm64
            # A release EXISTS: a failed download is a HARD error (do NOT silently skip).
            # Best-effort asset match; adjust the pattern to the repo's naming.
            if ! gh release download "$TAG" --repo "${GITHUB_REPOSITORY}" --pattern "*${OS}*${ARCH}*" --dir "$UP_ROOT/dl"; then
              echo "::error::Failed to download prior release asset for tag $TAG (release exists; download must succeed)."; exit 1
            fi
            FOUND="$(find "$UP_ROOT/dl" -type f -name "*${BIN_NAME}*" | head -n1 || true)"
            if [ -z "$FOUND" ]; then
              echo "::error::Prior release $TAG downloaded but no asset matched *${BIN_NAME}* in $UP_ROOT/dl"; ls -la "$UP_ROOT/dl" || true; exit 1
            fi
            # Asset URL form (for reference): https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/<asset>
            if file "$FOUND" | grep -qiE 'archive|gzip|tar|zip'; then
              tar -xf "$FOUND" -C "$UP_ROOT/dl" || unzip -o "$FOUND" -d "$UP_ROOT/dl"
              FOUND="$(find "$UP_ROOT/dl" -type f -name "${BIN_NAME}" | head -n1 || echo "$FOUND")"
            fi
            install -m 0755 "$FOUND" "$UP_ROOT/bin/${BIN_NAME}"
            PREV_OK=1
          fi
          # Fallback: a published crates.io version, if any (also a REAL prior version).
          if [ "$PREV_OK" -eq 0 ]; then
            if cargo install "${BIN_NAME}" --root "$UP_ROOT" --force; then PREV_OK=1; fi
          fi
          if [ "$PREV_OK" -eq 0 ]; then
            echo "::notice::SKIPPED upgrade test — no prior GitHub release or crates.io version found (clean-machine install is NOT an upgrade)."
            exit 0
          fi
          OLD_VER="$("$UP_ROOT/bin/${BIN_NAME}" --version || echo 'unknown')"
          echo "Previous version installed (dirty state): $OLD_VER"
          # Now upgrade IN PLACE with the freshly built current version.
          cargo install --path . --root "$UP_ROOT" --force --locked
          NEW_VER="$("$UP_ROOT/bin/${BIN_NAME}" --version)"
          echo "Upgraded version: $NEW_VER"
          if [ -z "$NEW_VER" ]; then echo "::error::Post-upgrade binary failed to report version"; exit 1; fi
          "$UP_ROOT/bin/${BIN_NAME}" --help >/dev/null
          echo "Upgrade over prior version OK ($OLD_VER -> $NEW_VER)"

      - name: Upgrade over previous release (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $upRoot = Join-Path $env:USERPROFILE '.cargo-upgrade'
          New-Item -ItemType Directory -Force -Path (Join-Path $upRoot 'bin') | Out-Null
          $prevOk = $false
          # Only swallow the "no releases exist" case; any OTHER gh failure must surface.
          $viewErr = & gh release view --repo $env:GITHUB_REPOSITORY --json tagName -q .tagName 2>&1
          $tag = $null
          if ($LASTEXITCODE -eq 0) {
            $tag = ($viewErr | Select-Object -First 1)
          } elseif ("$viewErr" -imatch 'release not found|no releases|not found') {
            $tag = $null   # legitimately no releases yet
          } else {
            Write-Error "gh release view failed (not a 'no releases' condition): $viewErr"; exit 1
          }
          if (-not [string]::IsNullOrWhiteSpace($tag)) {
            $dl = Join-Path $upRoot 'dl'
            New-Item -ItemType Directory -Force -Path $dl | Out-Null
            # A release EXISTS: a failed download is a HARD error (do NOT silently skip).
            gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern "*windows*" --dir $dl
            if ($LASTEXITCODE -ne 0) { Write-Error "Failed to download prior release asset for tag $tag (release exists; download must succeed)."; exit 1 }
            $zip = Get-ChildItem $dl -Filter *.zip -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($zip) { Expand-Archive -Path $zip.FullName -DestinationPath $dl -Force }
            $found = Get-ChildItem $dl -Recurse -Filter "$($env:BIN_NAME).exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $found) { Write-Error "Prior release $tag downloaded but no $($env:BIN_NAME).exe asset found in $dl"; Get-ChildItem $dl -Recurse -ErrorAction SilentlyContinue; exit 1 }
            Copy-Item $found.FullName (Join-Path $upRoot "bin/$($env:BIN_NAME).exe") -Force
            $prevOk = $true
          }
          if (-not $prevOk) {
            # Fallback: a published crates.io version, if any (also a REAL prior version).
            cargo install $env:BIN_NAME --root $upRoot --force
            if ($LASTEXITCODE -eq 0) { $prevOk = $true }
          }
          if (-not $prevOk) {
            Write-Host "::notice::SKIPPED upgrade test — no prior GitHub release or crates.io version found (clean install is NOT an upgrade)."
            exit 0
          }
          $oldBin = Join-Path $upRoot "bin/$($env:BIN_NAME).exe"
          $old = (Start-Process -FilePath $oldBin -ArgumentList '--version' -Wait -PassThru -NoNewWindow `
                    -RedirectStandardOutput "$env:RUNNER_TEMP\oldver.txt")
          Write-Host "Previous version installed (dirty state). exit=$($old.ExitCode)"
          cargo install --path . --root $upRoot --force --locked
          if ($LASTEXITCODE -ne 0) { Write-Error "Upgrade install failed exit $LASTEXITCODE"; exit 1 }
          $new = Start-Process -FilePath $oldBin -ArgumentList '--version' -Wait -PassThru -NoNewWindow `
                    -RedirectStandardOutput "$env:RUNNER_TEMP\newver.txt"
          if ($new.ExitCode -ne 0) { Write-Error "Post-upgrade --version exited $($new.ExitCode)"; exit 1 }
          $newVer = Get-Content "$env:RUNNER_TEMP\newver.txt" -Raw
          if ([string]::IsNullOrWhiteSpace($newVer)) { Write-Error "Post-upgrade binary failed to report version"; exit 1 }
          Write-Host "Upgrade over prior version OK -> $newVer"

      # --- G7: REAL uninstall + negative assertion that files are GONE ------------
      - name: Uninstall and verify removal (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          # User scope
          cargo uninstall --root "$USER_ROOT" "${BIN_NAME}"
          if [ -e "$USER_ROOT/bin/${BIN_NAME}" ]; then
            echo "::error::User-scope binary still present after uninstall"; exit 1
          fi
          if cargo install --list --root "$USER_ROOT" | grep -q "^${BIN_NAME} "; then
            echo "::error::Crate still tracked in user root after uninstall"; exit 1
          fi
          # System scope
          sudo env "PATH=$PATH" "HOME=$HOME" "$(command -v cargo)" uninstall --root "$SYS_ROOT" "${BIN_NAME}"
          if [ -e "$SYS_ROOT/bin/${BIN_NAME}" ]; then
            echo "::error::System-scope binary still present after uninstall"; exit 1
          fi
          echo "Uninstall verified: binary fully removed from both scopes."

      # --- TRIPWIRE: mark a fully-successful lifecycle so an all-skip leg is caught -
      - name: Mark lifecycle OK (Linux/macOS)
        if: ${{ matrix.type == 'cargo-binary' && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "Lifecycle complete: build -> install -> launch -> upgrade -> uninstall verified."

      - name: Uninstall and verify removal (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo uninstall --root $env:USER_ROOT $env:BIN_NAME
          if ($LASTEXITCODE -ne 0) { Write-Error "cargo uninstall failed exit $LASTEXITCODE"; exit 1 }
          $bin = Join-Path $env:USER_ROOT "bin/$($env:BIN_NAME).exe"
          if (Test-Path -LiteralPath $bin) { Write-Error "Binary still present after uninstall: $bin"; exit 1 }
          $list = cargo install --list --root $env:USER_ROOT
          if ($list -match "^$([regex]::Escape($env:BIN_NAME)) ") { Write-Error "Crate still tracked after uninstall"; exit 1 }
          Write-Host "Uninstall verified: binary fully removed."

      # --- TRIPWIRE: mark a fully-successful lifecycle so an all-skip leg is caught -
      - name: Mark lifecycle OK (Windows)
        if: ${{ matrix.type == 'cargo-binary' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Lifecycle complete: build -> install -> launch -> upgrade -> uninstall verified."


      # ===================== docker-image =====================
      # =====================================================================
      # docker-image installer lifecycle
      # Linux-ONLY by design: GitHub-hosted ubuntu-latest is the only runner
      # with a working Linux Docker daemon (Buildx + Compose v2 preinstalled).
      # windows-latest only runs Windows containers; macos-latest has NO docker
      # daemon (no nested virt). Faking a "structural-only" run there would be a
      # false pass, so we scope every lifecycle step to runner.os == 'Linux'.
      # Image name assumes lowercase OWNER/REPO for GHCR (ghcr.io requires lowercase).
      # =====================================================================

      - name: Checkout (docker-image)
        if: matrix.type == 'docker-image'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        uses: docker/setup-buildx-action@v3

      # --- Resolve a deterministic, lowercase image ref + locate the Dockerfile ---
      - name: Resolve image ref and build context (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          OWNER_REPO="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_REPO=ghcr.io/${OWNER_REPO}" >> "$GITHUB_ENV"
          echo "LOCAL_TAG=installer-ci:${{ github.sha }}" >> "$GITHUB_ENV"
          # Pick the primary Dockerfile (override via env DOCKERFILE / CONTEXT_DIR if set upstream).
          DOCKERFILE="${DOCKERFILE:-}"
          if [ -z "$DOCKERFILE" ]; then
            if   [ -f Dockerfile ];          then DOCKERFILE=Dockerfile;          CONTEXT_DIR=.
            elif [ -f backend/Dockerfile ];  then DOCKERFILE=backend/Dockerfile;  CONTEXT_DIR=backend
            else DOCKERFILE="$(find . -name Dockerfile -not -path '*/node_modules/*' | head -n1)"; CONTEXT_DIR="$(dirname "$DOCKERFILE")"; fi
          fi
          test -n "$DOCKERFILE" -a -f "$DOCKERFILE" || { echo "::error::No Dockerfile found"; exit 1; }
          echo "DOCKERFILE=$DOCKERFILE"   >> "$GITHUB_ENV"
          echo "CONTEXT_DIR=${CONTEXT_DIR:-.}" >> "$GITHUB_ENV"
          # Expected runtime port for the smoke test (override via APP_PORT upstream).
          echo "APP_PORT=${APP_PORT:-3000}" >> "$GITHUB_ENV"
          echo "Using Dockerfile=$DOCKERFILE context=${CONTEXT_DIR:-.} ref=$LOCAL_TAG"

      # --- G2: BUILD the artifact (image tarball) in-job; never assume it pre-exists ---
      - name: Build image artifact (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --file "$DOCKERFILE" --tag "$LOCAL_TAG" --provenance=true --sbom=true --output type=docker,dest="${RUNNER_TEMP}/image.tar" "$CONTEXT_DIR"

      # --- G2: assert the artifact EXISTS and is a non-empty, valid image tar ---
      - name: Verify image artifact exists (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ART="${RUNNER_TEMP}/image.tar"
          test -s "$ART" || { echo "::error::Image artifact missing or empty: $ART"; exit 1; }
          # An OCI/docker save tar always contains a manifest.json at its root.
          tar -tf "$ART" | grep -q 'manifest.json' || { echo "::error::Artifact is not a valid image tar"; exit 1; }
          echo "Artifact OK: $(du -h "$ART" | cut -f1)"

      # --- INSTALL (system scope): load the built image into the daemon ---
      # Docker images are inherently system/daemon-scoped on Linux; there is no
      # genuine per-user image store, so user-scope is N/A for this type.
      - name: Install image into daemon (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker load --input "${RUNNER_TEMP}/image.tar"
          # G7 baseline: prove it is present after install (positive assertion).
          docker image inspect "$LOCAL_TAG" >/dev/null || { echo "::error::Image not present after docker load"; exit 1; }

      # --- G5: REAL LAUNCH/smoke test — run the container and prove the app works ---
      # For a server image, "launch" = run detached, then assert the container stays
      # alive AND the app actually answers on its port (not just `docker inspect`).
      - name: Launch and smoke-verify container (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          CID="$(docker run -d --rm --name ci-smoke -p ${APP_PORT}:${APP_PORT} -e NODE_ENV=production "$LOCAL_TAG")"
          echo "CID=$CID" >> "$GITHUB_ENV"
          cleanup() { docker logs ci-smoke 2>&1 | tail -n 50 || true; }
          trap cleanup EXIT
          # Poll the app for up to 60s; succeed on any HTTP response (2xx/3xx/4xx all
          # prove the server bound the port), fail if the container dies or never binds.
          ok=0
          for i in $(seq 1 30); do
            if ! docker ps --filter "id=$CID" --filter status=running -q | grep -q .; then
              echo "::error::Container exited prematurely during smoke test"; exit 1
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/" || true)"
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "App responded with HTTP $code"; ok=1; break
            fi
            sleep 2
          done
          [ "$ok" = "1" ] || { echo "::error::App never responded on port ${APP_PORT}"; exit 1; }
          trap - EXIT
          docker stop ci-smoke >/dev/null 2>&1 || true

      # --- G8: signature / provenance verification (WARN-only on public CI) ---
      - name: Install cosign (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature/provenance (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Built locally with --provenance/--sbom; confirm provenance metadata is attached.
          if docker buildx imagetools inspect "$LOCAL_TAG" >/dev/null 2>&1; then
            echo "Build provenance/SBOM metadata requested at build time."
          fi
          # Public CI has no cosign signing key. Verify keyless cosign signature against
          # the published GHCR ref IF one exists; never hard-fail when unsigned.
          if cosign verify "${GHCR_REPO}:latest" --certificate-identity-regexp '.*' --certificate-oidc-issuer-regexp '.*' >/dev/null 2>&1; then
            echo "::notice::Published image has a valid cosign signature."
          else
            echo "::warning::Image is unsigned or signature unverifiable (expected on public CI without a cosign key). Structural provenance check only."
          fi

      # --- G6: REAL UPGRADE — install an actual prior release first, then upgrade ---
      # Pull the previously published GHCR tag to create genuine dirty state, run it
      # with a persistent named volume, then load+run the freshly built image over it.
      # Gracefully SKIP if no prior published image exists.
      - name: Log in to GHCR for upgrade test (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade over previous release (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          PREV="${GHCR_REPO}:latest"
          # Distinguish "no prior tag exists yet" (legit skip) from a real download/auth/registry
          # failure (must FAIL). Probe with `docker manifest inspect`, capturing stderr so we can
          # branch on the error instead of swallowing every failure into a green skip.
          if MANIFEST_ERR="$(docker manifest inspect "$PREV" 2>&1 >/dev/null)"; then
            : # tag exists; proceed to pull below
          elif echo "$MANIFEST_ERR" | grep -qiE 'no such manifest|manifest unknown|not found|404'; then
            echo "::notice::No prior published image at ${PREV}; SKIPPED upgrade test (first release)."
            exit 0
          else
            echo "::error::Failed to query prior image ${PREV} (not a missing-tag condition): ${MANIFEST_ERR}"
            exit 1
          fi
          # The tag genuinely exists, so a failed pull is a real error, not a skip.
          docker pull "$PREV" >/dev/null || { echo "::error::Prior image ${PREV} exists but pull failed"; exit 1; }
          echo "Installed prior release: $PREV"
          # Create real prior-version state on a persistent named volume.
          docker volume create ci-upgrade-data >/dev/null
          docker run -d --name ci-prev -p ${APP_PORT}:${APP_PORT} -v ci-upgrade-data:/data -e NODE_ENV=production "$PREV"
          # Confirm the OLD version actually came up before we upgrade over it.
          up=0
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/" || true)"
            [ -n "$code" ] && [ "$code" != "000" ] && { up=1; break; }; sleep 2
          done
          [ "$up" = "1" ] || { echo "::error::Prior release failed to start; cannot perform upgrade test"; docker logs ci-prev | tail -50; exit 1; }
          PREV_ID="$(docker inspect --format '{{.Image}}' ci-prev)"
          # Tear down the old container (data survives on the volume) and bring up NEW image.
          docker rm -f ci-prev >/dev/null
          docker run -d --name ci-new -p ${APP_PORT}:${APP_PORT} -v ci-upgrade-data:/data -e NODE_ENV=production "$LOCAL_TAG"
          upg=0
          for i in $(seq 1 30); do
            if ! docker ps --filter name=ci-new --filter status=running -q | grep -q .; then
              echo "::error::Upgraded container exited during upgrade smoke test"; docker logs ci-new | tail -50; exit 1
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/" || true)"
            [ -n "$code" ] && [ "$code" != "000" ] && { upg=1; break; }; sleep 2
          done
          [ "$upg" = "1" ] || { echo "::error::Upgraded image failed to serve after upgrade over prior release"; docker logs ci-new | tail -50; exit 1; }
          NEW_ID="$(docker inspect --format '{{.Image}}' ci-new)"
          # Assert the running image genuinely changed (true upgrade, not a no-op).
          [ "$NEW_ID" != "$PREV_ID" ] || echo "::warning::New image digest equals prior release digest (no content change)."
          echo "Upgrade OK: prior=$PREV_ID -> new=$NEW_ID"
          docker rm -f ci-new >/dev/null

      # --- G7: REAL UNINSTALL + negative assertion that nothing remains ---
      - name: Uninstall and verify full removal (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Remove any containers from this run, the loaded image, and upgrade volume.
          docker rm -f ci-smoke ci-prev ci-new 2>/dev/null || true
          docker rmi -f "$LOCAL_TAG" 2>/dev/null || true
          docker volume rm -f ci-upgrade-data 2>/dev/null || true
          # Negative assertions: fail if anything from this run survived uninstall.
          if docker image inspect "$LOCAL_TAG" >/dev/null 2>&1; then
            echo "::error::Image still present after uninstall: $LOCAL_TAG"; exit 1
          fi
          if docker ps -a --format '{{.Names}}' | grep -E '^ci-(smoke|prev|new)$'; then
            echo "::error::Leftover containers after uninstall"; exit 1
          fi
          if docker volume ls --format '{{.Name}}' | grep -q '^ci-upgrade-data$'; then
            echo "::error::Leftover volume after uninstall"; exit 1
          fi
          echo "Uninstall verified: image, containers, and volume fully removed."

      # --- TRIPWIRE: mark a successful full lifecycle so an all-skip leg is caught downstream ---
      - name: Mark lifecycle complete (docker-image)
        if: matrix.type == 'docker-image' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"


      # ===================== shell-installer =====================
      # ============================================================================
      # shell-installer slice
      # Genuine OS targets: Linux + macOS. A POSIX shell installer (install.sh,
      # *.run, makeself, `curl | sh`) is native to Linux/macOS only; Windows is
      # excluded on purpose (route Windows shell installers through WSL2 instead of
      # faking a native pass). Gate the whole slice on matrix.type == 'shell-installer'.
      #
      # Env contract this slice expects (set at job/workflow level):
      #   INSTALLER_GLOB   : glob to the built installer, e.g. dist/install*.sh
      #   APP_BIN          : installed command name to smoke, e.g. civiccast
      #   IS_GUI           : 'true' | 'false' (drives G5 real-launch path)
      #   REPO_SLUG        : OWNER/REPO for release downloads (defaults to this repo)
      # ============================================================================

      - name: shell-installer | Checkout
        if: matrix.type == 'shell-installer'
        uses: actions/checkout@v4

      # --- G2: BUILD THE ARTIFACT (never assume dist/ pre-exists) ----------------
      - name: shell-installer | Build installer (Linux)
        if: matrix.type == 'shell-installer' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Build the self-contained shell installer. Prefer the repo's own build
          # entrypoint; fall back to a documented make target. Adjust to your repo.
          if [ -x ./scripts/build-installer.sh ]; then
            ./scripts/build-installer.sh
          elif [ -f Makefile ] && make -n installer >/dev/null 2>&1; then
            make installer
          else
            echo "::error::No installer build entrypoint found (scripts/build-installer.sh or 'make installer')."
            exit 1
          fi

      - name: shell-installer | Build installer (macOS)
        if: matrix.type == 'shell-installer' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ./scripts/build-installer.sh ]; then
            ./scripts/build-installer.sh
          elif [ -f Makefile ] && make -n installer >/dev/null 2>&1; then
            make installer
          else
            echo "::error::No installer build entrypoint found (scripts/build-installer.sh or 'make installer')."
            exit 1
          fi

      # --- G2: ASSERT ARTIFACT EXISTS + resolve a single path --------------------
      - name: shell-installer | Verify artifact exists
        if: matrix.type == 'shell-installer'
        shell: bash
        run: |
          set -euo pipefail
          glob="${INSTALLER_GLOB:-dist/install*.sh}"
          # shellcheck disable=SC2086
          matches=$(ls -1 $glob 2>/dev/null || true)
          count=$(printf '%s\n' "$matches" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly 1 installer matching '$glob', found $count:"
            printf '%s\n' "$matches"
            exit 1
          fi
          installer="$matches"
          test -s "$installer" || { echo "::error::Installer '$installer' is empty."; exit 1; }
          chmod +x "$installer" || true
          echo "Found installer: $installer ($(wc -c < "$installer") bytes)"
          echo "INSTALLER_PATH=$installer" >> "$GITHUB_ENV"

      # --- G8: signing / notarization (macOS Gatekeeper) — WARN, do not block ----
      # Public CI has no signing secrets. We do a structural check so signing state
      # is VISIBLE without hard-failing an unsigned dev build.
      - name: shell-installer | Signing check (macOS, warn-only)
        if: matrix.type == 'shell-installer' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          target="${INSTALLER_PATH:?}"
          echo "::group::codesign / spctl inspection"
          if codesign -dv --verbose=4 "$target" 2>&1; then
            echo "codesign: present"
          else
            echo "::warning::Installer is not code-signed (expected on unsigned public CI)."
          fi
          # Gatekeeper assessment for executable installers.
          if spctl -a -vvv --type execute "$target" 2>&1; then
            echo "spctl: Gatekeeper accepts."
          else
            echo "::warning::spctl rejects (no Developer ID / not notarized on public CI)."
          fi
          echo "::endgroup::"
          exit 0

      # ===========================================================================
      # USER-SCOPE install (no sudo). PREFIX under $HOME — the common default for a
      # shell installer's unprivileged path.
      # ===========================================================================
      # --- G1: run installer directly under set -euo pipefail; crash => red ------
      - name: shell-installer | Install (user scope)
        if: matrix.type == 'shell-installer'
        shell: bash
        run: |
          set -euo pipefail
          prefix="$HOME/.local"
          mkdir -p "$prefix/bin"
          echo "Installing to user prefix: $prefix"
          # G1: ONE canonical invocation. A `... --flags || ... bare` fallback would
          # swallow a genuine installer failure (the bare form papers over it) and go
          # green. Honor both PREFIX env and the documented flags in a single call.
          PREFIX="$prefix" "$INSTALLER_PATH" --prefix "$prefix" --yes
          echo "$prefix/bin" >> "$GITHUB_PATH"

      # --- G5 (CLI app) real launch + smoke for user-scope install ---------------
      - name: shell-installer | Launch + smoke (CLI, user scope)
        if: matrix.type == 'shell-installer' && env.IS_GUI != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bin="${APP_BIN:?APP_BIN must be set}"
          installed="$HOME/.local/bin/$bin"
          test -x "$installed" || { echo "::error::Installed binary missing: $installed"; exit 1; }
          # Real launch: exercise the binary and assert clean exit, not just presence.
          "$installed" --version
          "$installed" --help >/dev/null
          echo "User-scope CLI smoke OK."

      # --- G5 (GUI app) REAL headless launch for user-scope install --------------
      # Linux: xvfb-run + background launch, then assert the process is alive.
      - name: shell-installer | Launch + smoke (GUI, Linux, user scope)
        if: matrix.type == 'shell-installer' && runner.os == 'Linux' && env.IS_GUI == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          bin="${APP_BIN:?APP_BIN must be set}"
          installed="$HOME/.local/bin/$bin"
          test -x "$installed" || { echo "::error::Installed binary missing: $installed"; exit 1; }
          # G5: $! is the xvfb-run WRAPPER pid, NOT the app — the wrapper (and Xvfb)
          # can stay alive after the inner app crashes, producing a false pass. So
          # verify the REAL installed app by pgrep-ing its ABSOLUTE install path.
          xvfb-run -a -- "$installed" &
          wrapper_pid=$!
          sleep 8
          app_pid="$(pgrep -f "$installed" | head -n1 || true)"
          if [ -z "$app_pid" ]; then
            echo "::error::GUI app exited/crashed within 8s of launch (no process matching $installed)."
            kill "$wrapper_pid" 2>/dev/null || true
            exit 1
          fi
          echo "GUI app alive (pid $app_pid, $installed) after 8s."
          pkill -f "$installed" 2>/dev/null || true
          kill "$wrapper_pid" 2>/dev/null || true
          wait "$app_pid" 2>/dev/null || true

      # macOS: open the installed .app bundle, then assert the process is running.
      - name: shell-installer | Launch + smoke (GUI, macOS, user scope)
        if: matrix.type == 'shell-installer' && runner.os == 'macOS' && env.IS_GUI == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app_name="${APP_BIN:?APP_BIN must be set}"
          app_path="$HOME/Applications/${app_name}.app"
          test -d "$app_path" || { echo "::error::Installed .app missing: $app_path"; exit 1; }
          # G5: resolve the REAL MachO binary and pgrep its ABSOLUTE path. Matching the
          # bundle dir would also match the launching `open` process (and helpers) =
          # false pass. CFBundleExecutable gives the actual inner binary name.
          inner="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          bin="$app_path/Contents/MacOS/$inner"
          test -x "$bin" || { echo "::error::app binary missing/not executable: $bin"; exit 1; }
          open -g "$app_path"
          sleep 8
          if ! pgrep -f "$bin" >/dev/null; then
            echo "::error::GUI .app is not running 8s after open (no process matching $bin)."
            exit 1
          fi
          echo "GUI .app running after 8s ($bin)."
          pkill -f "$bin" 2>/dev/null || true

      # ===========================================================================
      # SYSTEM-SCOPE install (sudo, PREFIX=/usr/local). The privileged path of a
      # shell installer is a genuinely distinct code path worth covering.
      # ===========================================================================
      - name: shell-installer | Install (system scope, sudo)
        if: matrix.type == 'shell-installer' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          prefix="/usr/local"
          echo "Installing to system prefix: $prefix (sudo)"
          # G1: keep set -e semantics across sudo by invoking the installer directly,
          # via ONE canonical invocation. A `... || sudo ... bare` fallback would mask
          # a real failure of the privileged install path and produce a false pass.
          sudo PREFIX="$prefix" "$INSTALLER_PATH" --prefix "$prefix" --system --yes

      - name: shell-installer | Launch + smoke (system scope, CLI)
        if: matrix.type == 'shell-installer' && env.IS_GUI != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bin="${APP_BIN:?APP_BIN must be set}"
          # System-scope binary should be on PATH at /usr/local/bin.
          command -v "$bin" >/dev/null || { echo "::error::System binary not on PATH: $bin"; exit 1; }
          resolved="$(command -v "$bin")"
          case "$resolved" in
            /usr/local/*) : ;;
            *) echo "::warning::Resolved '$bin' at '$resolved' (expected /usr/local). PATH order?";;
          esac
          "$bin" --version
          echo "System-scope CLI smoke OK ($resolved)."

      # ===========================================================================
      # G6: REAL UPGRADE — install an ACTUAL previous published release first to
      # create genuine dirty state, then run the freshly built installer over it.
      # Graceful skip when no prior release exists.
      # ===========================================================================
      - name: shell-installer | Upgrade over previous release
        if: matrix.type == 'shell-installer' && runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          slug="${REPO_SLUG:-${{ github.repository }}}"
          prefix="$HOME/.local"
          mkdir -p "$prefix/bin"

          # Find the latest published, non-draft release tag.
          # G6: distinguish "no releases exist" (legit skip) from "API call failed"
          # (must HARD-FAIL). Do NOT swallow errors with `2>/dev/null || true` and then
          # silently skip green — capture the command's real exit status.
          if ! release_json="$(gh release list --repo "$slug" --limit 1 --json tagName,isDraft)"; then
            echo "::error::gh release list failed for $slug (API/auth error, not 'no releases')."
            exit 1
          fi
          tag="$(printf '%s' "$release_json" | jq -r '[.[] | select(.isDraft|not)][0].tagName // empty')"
          if [ -z "$tag" ]; then
            echo "::notice::No prior published release for $slug — skipping upgrade test (G6 graceful skip)."
            exit 0
          fi
          echo "Previous release tag: $tag"

          # Pick a shell-installer asset from that release.
          if ! assets_json="$(gh release view "$tag" --repo "$slug" --json assets)"; then
            echo "::error::gh release view failed for $slug $tag (API error, not 'no asset')."
            exit 1
          fi
          asset="$(printf '%s' "$assets_json" | jq -r '.assets[].name | select(test("install.*\\.sh$|\\.run$"))' | head -n1)"
          if [ -z "$asset" ]; then
            echo "::notice::Release $tag has no shell-installer asset — skipping upgrade test (G6 graceful skip)."
            exit 0
          fi

          # G3: correct release download URL (proper slashes), via gh to keep auth.
          workdir="$(mktemp -d)"
          gh release download "$tag" --repo "$slug" --pattern "$asset" --dir "$workdir"
          old_installer="$workdir/$asset"
          test -s "$old_installer" || { echo "::error::Downloaded prior installer is empty."; exit 1; }
          chmod +x "$old_installer"
          # G6 (macOS): strip the quarantine xattr a downloaded asset carries so an
          # unsigned prior release does not get blocked by Gatekeeper on execution.
          # (G8 stays warn-only — this only affects the downloaded prior artifact.)
          if [ "${RUNNER_OS:-}" = "macOS" ]; then
            xattr -dr com.apple.quarantine "$old_installer" 2>/dev/null || true
          fi

          # Establish dirty state: install the OLD version (G1 exit-code integrity).
          # ONE canonical invocation — a `... || ... bare` fallback would mask a real
          # failure installing the prior release and let the upgrade test pass falsely.
          PREFIX="$prefix" "$old_installer" --prefix "$prefix" --yes
          bin="${APP_BIN:?APP_BIN must be set}"
          old_ver="$("$prefix/bin/$bin" --version 2>/dev/null || echo 'unknown')"
          echo "Installed previous version: $old_ver"

          # Now UPGRADE with the freshly built installer over the dirty state (G1).
          PREFIX="$prefix" "$INSTALLER_PATH" --prefix "$prefix" --yes
          new_ver="$("$prefix/bin/$bin" --version 2>/dev/null || echo 'unknown')"
          echo "Upgraded version now reports: $new_ver"

          # Post-upgrade the binary must still launch cleanly.
          "$prefix/bin/$bin" --version >/dev/null || { echo "::error::Upgraded binary fails to launch."; exit 1; }
          if [ "$new_ver" = "$old_ver" ] && [ "$old_ver" != "unknown" ]; then
            echo "::warning::Version string unchanged across upgrade ($old_ver). Confirm version bump in build."
          fi
          echo "Upgrade-over-previous-release OK."

      # ===========================================================================
      # G7: REAL UNINSTALL — run the uninstaller, then NEGATIVE-ASSERT that the
      # binary/app/files are actually gone. Anything remaining fails the job.
      # ===========================================================================
      - name: shell-installer | Uninstall + verify removal (user scope)
        if: matrix.type == 'shell-installer'
        shell: bash
        run: |
          set -euo pipefail
          prefix="$HOME/.local"
          bin="${APP_BIN:?APP_BIN must be set}"
          installed="$prefix/bin/$bin"

          # Prefer the installer's own uninstall path; fall back to a sibling script.
          # (The final negative assertions are the real guard against a no-op
          # uninstall, so probing two mechanisms here is safe.)
          if "$INSTALLER_PATH" --uninstall --prefix "$prefix" --yes; then
            echo "Uninstalled via installer --uninstall."
          elif [ -x "$prefix/bin/${bin}-uninstall" ]; then
            PREFIX="$prefix" "$prefix/bin/${bin}-uninstall" --yes
            echo "Uninstalled via ${bin}-uninstall."
          else
            echo "::error::No uninstall entrypoint (installer --uninstall or ${bin}-uninstall)."
            exit 1
          fi

          # NEGATIVE ASSERTIONS — fail if anything is left behind.
          leftover=0
          if [ -e "$installed" ]; then echo "::error::Leftover binary: $installed"; leftover=1; fi
          if command -v "$bin" >/dev/null 2>&1 && [ "$(command -v "$bin")" = "$installed" ]; then
            echo "::error::'$bin' still resolves to the user-scope path after uninstall."; leftover=1
          fi
          # macOS user .app bundle, if this was a GUI install.
          if [ "${IS_GUI:-false}" = "true" ] && [ "$RUNNER_OS" = "macOS" ]; then
            if [ -d "$HOME/Applications/${bin}.app" ]; then
              echo "::error::Leftover .app: $HOME/Applications/${bin}.app"; leftover=1
            fi
          fi
          if [ "$leftover" -ne 0 ]; then
            echo "::error::Uninstall left files behind (G7 negative assertion failed)."
            exit 1
          fi
          echo "Uninstall verified clean — nothing remains in $prefix."

      # ===========================================================================
      # TRIPWIRE — only reached after a FULL successful lifecycle (build → install →
      # launch → upgrade → uninstall+verify). This slice runs on Linux + macOS only,
      # so gate on runner.os != 'Windows' to fire the marker on every OS this type
      # runs on. An all-skip leg never reaches here, so downstream catches it.
      # ===========================================================================
      - name: shell-installer | Lifecycle marker (tripwire)
        if: matrix.type == 'shell-installer' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "shell-installer lifecycle complete on $RUNNER_OS — LIFECYCLE_OK=1 set."


      # ===================== deb-rpm =====================
      # =====================================================================
      # deb-rpm installer slice  (Linux-only: .deb on Debian/Ubuntu family,
      # .rpm on RedHat/Fedora family). Real producer in this account is
      # klodock (Tauri -> bundle targets include "deb"/"appimage"); Tauri
      # can also emit "rpm". These are GUI desktop apps, so LAUNCH is a real
      # headless GUI launch (G5), not --version.
      #
      # Strategy on GitHub-hosted ubuntu-latest:
      #   * .deb  -> built + installed + launched NATIVELY (apt/dpkg).
      #   * .rpm  -> built on the host (rpmbuild/tauri rpm target), then
      #              installed + launched inside a fedora:latest container
      #              on the SAME runner (dnf/rpm). GitHub does not offer an
      #              rpm-native hosted runner, so the container is the
      #              idiomatic way to exercise the RedHat code path for real.
      #
      # G8 note: .deb/.rpm do NOT use macOS Gatekeeper / Windows Authenticode.
      # Their signing is GPG (debsigs / dpkg-sig for .deb, `rpm --checksig`
      # for .rpm). On public CI without GPG secrets we do a structural check
      # and WARN (never hard-fail).
      #
      # matrix.type guard "deb-rpm" is on EVERY step. runner.os guard pins
      # Linux. APP / PKG / BIN names are placeholders — wire to your repo.
      # =====================================================================

      - name: (deb-rpm) Guard - this type is Linux only
        if: matrix.type == 'deb-rpm' && runner.os != 'Linux'
        shell: bash
        run: |
          echo "::error::deb-rpm slice scheduled on non-Linux runner (${{ runner.os }}). .deb/.rpm are Linux-only; fix the matrix include." >&2
          exit 1

      - name: (deb-rpm) Checkout
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        uses: actions/checkout@v4

      # --- Build toolchain: Node (Tauri frontend) + Rust + Tauri Linux deps.
      # Adjust/remove if your producer uses nfpm/fpm/cargo-deb instead.
      - name: (deb-rpm) Setup Node
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: (deb-rpm) Setup Rust
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: (deb-rpm) Install Linux build dependencies (Tauri + rpmbuild)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # Tauri 2.x Linux deps (webkit2gtk-4.1). For Tauri 1.x use libwebkit2gtk-4.0-dev.
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf rpm dpkg-dev debsigs

      # ---------------------------------------------------------------------
      # G2: BUILD BOTH ARTIFACTS IN-JOB. Never assume a packaged file exists.
      # Tauri emits .deb under target/release/bundle/deb and .rpm under
      # target/release/bundle/rpm when those targets are configured.
      # ---------------------------------------------------------------------
      - name: (deb-rpm) Build .deb and .rpm artifacts
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          # Build both Linux package targets explicitly (overrides config so we
          # always get .deb AND .rpm regardless of tauri.conf defaults).
          npx tauri build --bundles deb,rpm
          echo "---- produced bundles ----"
          find src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.rpm' \) -print

      # G2 (assert exists) + collect canonical paths for later steps.
      - name: (deb-rpm) Verify artifacts exist and export paths
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          DEB="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' | head -n1)"
          RPM="$(find src-tauri/target/release/bundle/rpm -maxdepth 1 -name '*.rpm' | head -n1)"
          if [ -z "${DEB:-}" ] || [ ! -s "$DEB" ]; then
            echo "::error::No non-empty .deb artifact produced (looked in bundle/deb)." >&2
            exit 1
          fi
          if [ -z "${RPM:-}" ] || [ ! -s "$RPM" ]; then
            echo "::error::No non-empty .rpm artifact produced (looked in bundle/rpm)." >&2
            exit 1
          fi
          echo "Found DEB: $DEB ($(stat -c%s "$DEB") bytes)"
          echo "Found RPM: $RPM ($(stat -c%s "$RPM") bytes)"
          # Stage to stable, predictable paths so later steps & the container don't re-glob.
          mkdir -p "$GITHUB_WORKSPACE/_pkgs"
          cp "$DEB" "$GITHUB_WORKSPACE/_pkgs/app.deb"
          cp "$RPM" "$GITHUB_WORKSPACE/_pkgs/app.rpm"
          {
            echo "DEB_PATH=$GITHUB_WORKSPACE/_pkgs/app.deb"
            echo "RPM_PATH=$GITHUB_WORKSPACE/_pkgs/app.rpm"
          } >> "$GITHUB_ENV"

      # Structural sanity: the packages must actually be valid archives with metadata.
      - name: (deb-rpm) Inspect package metadata (structural integrity)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "==== .deb control metadata ===="
          dpkg-deb --info "$DEB_PATH"
          dpkg-deb --contents "$DEB_PATH" | head -n 40
          echo "==== .rpm header metadata ===="
          rpm -qpi "$RPM_PATH"
          rpm -qpl "$RPM_PATH" | head -n 40

      # ---------------------------------------------------------------------
      # G8: SIGNING — GPG, not Gatekeeper/Authenticode. WARN, don't fail, on
      # public CI without signing secrets.
      # ---------------------------------------------------------------------
      - name: (deb-rpm) Verify package signatures (G8 - warn-only on public CI)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -uo pipefail   # NOTE: intentionally no -e; this step must never hard-fail.
          echo "::group::.deb signature (debsigs / dpkg-sig)"
          if debsigs --list "$DEB_PATH" 2>/dev/null | grep -q .; then
            echo ".deb carries embedded signature(s):"
            debsigs --list "$DEB_PATH" || true
          else
            echo "::warning::.deb is UNSIGNED (no debsigs signature). Acceptable on public CI without a GPG secret; sign before public release."
          fi
          echo "::endgroup::"
          echo "::group::.rpm signature (rpm --checksig)"
          SIG="$(rpm -qp --qf '%{SIGPGP:pgpsig}%{SIGGPG:pgpsig}\n' "$RPM_PATH" 2>/dev/null || true)"
          if rpm --checksig "$RPM_PATH" 2>/dev/null | grep -qiE 'pgp|gpg|signatures? OK' && [ -n "${SIG}" ] && [ "${SIG}" != "(none)(none)" ]; then
            echo ".rpm is GPG-signed:"
            rpm --checksig "$RPM_PATH" || true
          else
            echo "::warning::.rpm is UNSIGNED (rpm --checksig shows no PGP/GPG key). Acceptable on public CI without a GPG secret; sign before public release."
            rpm --checksig "$RPM_PATH" || true
          fi
          echo "::endgroup::"

      # =====================================================================
      # DEBIAN / UBUNTU PATH (.deb) — native install / launch / upgrade /
      # uninstall. .deb has a real scope distinction: system-scope install
      # (dpkg/apt, files under /usr) vs user-scope extraction (dpkg-deb -x).
      # We test the real-world path = system-scope via apt.
      # =====================================================================

      # G6 PREP: install a REAL previous release FIRST to create dirty state.
      # Graceful skip if no prior release / asset exists.
      - name: (deb-rpm) [.deb] Upgrade prep - install previous published release
        id: deb_prev
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          PREV_TAG="$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"
          if [ -z "${PREV_TAG:-}" ] || [ "${PREV_TAG}" = "null" ]; then
            echo "::notice::(deb-rpm) [.deb] No previous release found; upgrade test SKIPPED (clean-machine install is NOT an upgrade test)."
            echo "have_prev=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Previous release tag: $PREV_TAG"
          set -e
          # Download the latest published .deb asset for that release. Do NOT swallow
          # errors: distinguish "no .deb asset" (legit skip) from a real download
          # failure (must fail, not silently green-skip) (G6).
          if gh release download "$PREV_TAG" --repo "${{ github.repository }}" --pattern '*.deb' --dir "$GITHUB_WORKSPACE/_prev" --clobber; then
            DL_RC=0
          else
            DL_RC=$?
          fi
          PREV_DEB="$(find "$GITHUB_WORKSPACE/_prev" -name '*.deb' 2>/dev/null | head -n1 || true)"
          if [ "$DL_RC" -ne 0 ]; then
            if [ -z "${PREV_DEB:-}" ]; then
              echo "::notice::(deb-rpm) [.deb] Release $PREV_TAG has no .deb asset; upgrade test SKIPPED."
              echo "have_prev=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::(deb-rpm) [.deb] gh release download for $PREV_TAG failed (rc=$DL_RC); refusing to silently skip the upgrade test." >&2
            exit 1
          fi
          if [ -z "${PREV_DEB:-}" ]; then
            echo "::notice::(deb-rpm) [.deb] Release $PREV_TAG has no .deb asset; upgrade test SKIPPED."
            echo "have_prev=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo apt-get install -y "$PREV_DEB"
          echo "Installed previous .deb to create dirty upgrade state:"
          dpkg -l | grep -i "${PKG_NAME:-klodock}" || true
          echo "have_prev=true" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      # G6: REAL UPGRADE over the dirty state (only if prev was installed).
      - name: (deb-rpm) [.deb] UPGRADE current package over previous (G6)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux' && steps.deb_prev.outputs.have_prev == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # apt install on a .deb path performs an in-place upgrade over the prior version.
          sudo apt-get install -y "$DEB_PATH"
          echo "Post-upgrade installed version:"
          dpkg-query -W -f='${Package} ${Version}\n' "${PKG_NAME:-klodock}"

      # G1: CLEAN INSTALL when there was no previous release (still must exercise install).
      - name: (deb-rpm) [.deb] INSTALL current package (clean, no prior release)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux' && steps.deb_prev.outputs.have_prev != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # apt-get install resolves deps; dpkg -i alone would fail on missing deps.
          sudo apt-get install -y "$DEB_PATH"
          echo "Installed version:"
          dpkg-query -W -f='${Package} ${Version}\n' "${PKG_NAME:-klodock}"

      # Verify install landed real files in system scope (negative-safe positive assertion).
      - name: (deb-rpm) [.deb] Verify installed files present (system scope)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the installed binary path from the package's file list.
          BIN="$(dpkg -L "${PKG_NAME:-klodock}" | grep -E '/usr/bin/' | head -n1 || true)"
          if [ -z "${BIN:-}" ]; then
            echo "::error::No /usr/bin entry owned by package after install." >&2
            dpkg -L "${PKG_NAME:-klodock}" || true
            exit 1
          fi
          test -x "$BIN" || { echo "::error::Installed binary $BIN is not executable." >&2; exit 1; }
          echo "INSTALLED_BIN=$BIN" >> "$GITHUB_ENV"
          echo "Installed binary: $BIN"

      # G5: REAL HEADLESS GUI LAUNCH for the .deb-installed app (it's a Tauri GUI).
      # --version alone is INSUFFICIENT for a GUI app. Launch under Xvfb and
      # assert the process actually starts and stays alive.
      - name: (deb-rpm) [.deb] Install headless display deps
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends xvfb

      - name: (deb-rpm) [.deb] LAUNCH installed GUI app headless and assert alive (G5)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # WebKitGTK under Xvfb on CI: disable GPU/sandbox/compositing.
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export LIBGL_ALWAYS_SOFTWARE=1
          set +e
          # NOTE: $! is the PID of the xvfb-run WRAPPER, not the installed app, so we
          # must NOT assert on it (the wrapper can outlive a crashed app = false pass).
          # We launch under Xvfb and verify the REAL installed binary by its full path
          # via pgrep -f, so a loose basename can't match an unrelated process (G5).
          xvfb-run -a --server-args="-screen 0 1280x1024x24" "$INSTALLED_BIN" &
          WRAP_PID=$!
          # Give the GUI time to initialize its window/webview, then confirm the real app
          # process (matched on its full install path) is actually running.
          APP_PID=""
          for i in $(seq 1 10); do
            sleep 1
            APP_PID="$(pgrep -f "$INSTALLED_BIN" | head -n1 || true)"
            if [ -n "$APP_PID" ]; then break; fi
            # If the wrapper itself died before the app ever appeared, stop waiting.
            kill -0 "$WRAP_PID" 2>/dev/null || break
          done
          if [ -n "$APP_PID" ] && kill -0 "$APP_PID" 2>/dev/null; then
            echo "PASS: installed GUI app alive after startup window (app pid $APP_PID, path $INSTALLED_BIN)."
            kill -TERM "$APP_PID" 2>/dev/null || true
            kill -TERM "$WRAP_PID" 2>/dev/null || true
            wait "$WRAP_PID" 2>/dev/null || true
            exit 0
          fi
          # The real app process never came up (or died). A wrapper that is still alive
          # while the app is gone is NOT a pass — fail loudly (G1/G5).
          kill -TERM "$WRAP_PID" 2>/dev/null || true
          wait "$WRAP_PID" 2>/dev/null; RC=$?
          echo "::error::Installed GUI app ($INSTALLED_BIN) did not stay alive under Xvfb (wrapper rc=$RC); not a real launch." >&2
          exit 1

      # G7: REAL UNINSTALL + negative assertion that files are GONE.
      - name: (deb-rpm) [.deb] UNINSTALL and assert full removal (G7)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # purge removes config too; verify package + binary are gone afterwards.
          sudo apt-get purge -y "${PKG_NAME:-klodock}"
          if dpkg-query -W -f='${Status}\n' "${PKG_NAME:-klodock}" 2>/dev/null | grep -q "install ok installed"; then
            echo "::error::Package still registered as installed after purge." >&2
            exit 1
          fi
          if [ -n "${INSTALLED_BIN:-}" ] && [ -e "$INSTALLED_BIN" ]; then
            echo "::error::Binary $INSTALLED_BIN still present after uninstall." >&2
            exit 1
          fi
          echo "PASS: .deb fully removed (package deregistered, binary gone)."

      # =====================================================================
      # REDHAT / FEDORA PATH (.rpm) — install / launch / upgrade / uninstall
      # inside a fedora:latest container on the SAME ubuntu-latest runner.
      # This is the idiomatic way to exercise the dnf/rpm code path for real
      # without an rpm-native hosted runner.
      # =====================================================================

      # G6 PREP (rpm): fetch previous release .rpm on the host (gh available here),
      # so the container can install it from a file. Graceful skip if none.
      - name: (deb-rpm) [.rpm] Upgrade prep - fetch previous published .rpm
        id: rpm_prev
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          PREV_TAG="$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"
          if [ -z "${PREV_TAG:-}" ] || [ "${PREV_TAG}" = "null" ]; then
            echo "::notice::(deb-rpm) [.rpm] No previous release found; .rpm upgrade test SKIPPED (clean install is NOT an upgrade test)."
            echo "have_prev=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set -e
          # Distinguish "release has no .rpm asset" (legit skip) from a real download
          # failure. Do NOT swallow download errors with '|| true' — a failed download
          # must fail the step, not silently degrade to a green skip (G6).
          if gh release download "$PREV_TAG" --repo "${{ github.repository }}" --pattern '*.rpm' --dir "$GITHUB_WORKSPACE/_prev_rpm" --clobber; then
            DL_RC=0
          else
            DL_RC=$?
          fi
          PREV_RPM="$(find "$GITHUB_WORKSPACE/_prev_rpm" -name '*.rpm' 2>/dev/null | head -n1 || true)"
          if [ "$DL_RC" -ne 0 ]; then
            # gh exits non-zero with "no assets matched" when the release simply has no
            # .rpm — treat that one case as a legitimate skip; any other failure is real.
            if [ -z "${PREV_RPM:-}" ]; then
              echo "::notice::(deb-rpm) [.rpm] Release $PREV_TAG has no .rpm asset; .rpm upgrade test SKIPPED."
              echo "have_prev=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::(deb-rpm) [.rpm] gh release download for $PREV_TAG failed (rc=$DL_RC); refusing to silently skip the upgrade test." >&2
            exit 1
          fi
          if [ -z "${PREV_RPM:-}" ]; then
            echo "::notice::(deb-rpm) [.rpm] Release $PREV_TAG has no .rpm asset; .rpm upgrade test SKIPPED."
            echo "have_prev=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "$PREV_RPM" "$GITHUB_WORKSPACE/_pkgs/prev.rpm"
          echo "have_prev=true" >> "$GITHUB_OUTPUT"

      # Single container run exercises the full RedHat lifecycle idiomatically
      # (one shell = bash on host invoking the container; G4 respected — the
      # in-container script is bash, no shell mixing).
      - name: (deb-rpm) [.rpm] Install / launch / upgrade / uninstall in Fedora container
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        env:
          HAVE_PREV: ${{ steps.rpm_prev.outputs.have_prev }}
          PKG_NAME: ${{ env.PKG_NAME || 'klodock' }}
        run: |
          set -euo pipefail
          docker run --rm -e HAVE_PREV -e PKG_NAME -v "$GITHUB_WORKSPACE/_pkgs:/pkgs:ro" fedora:latest bash -euo pipefail -c '
              echo "==== Fedora RedHat-family .rpm lifecycle ===="
              # Headless GUI + webkit deps for a real launch (G5) inside the container.
              dnf -y install xorg-x11-server-Xvfb webkit2gtk4.1 gtk3 librsvg2 procps-ng >/dev/null

              # ---- G6: REAL UPGRADE over a genuine previous version (if available) ----
              if [ "${HAVE_PREV}" = "true" ] && [ -f /pkgs/prev.rpm ]; then
                echo "Installing previous .rpm to create dirty upgrade state..."
                dnf -y install /pkgs/prev.rpm
                echo "Pre-upgrade version:"; rpm -q "${PKG_NAME}" || true
                echo "Upgrading to current .rpm..."
                # Exactly ONE command path for the upgrade. Do NOT mask a real upgrade
                # failure with "|| dnf reinstall" — that fallback turns a broken upgrade
                # green. "dnf install <file>" upgrades in place when a prior version is
                # present and is the single idempotent path that must succeed.
                dnf -y install /pkgs/app.rpm
              else
                echo "No previous .rpm release; performing CLEAN install (not an upgrade test)."
                dnf -y install /pkgs/app.rpm
              fi

              # ---- Verify install + locate binary (positive assertion) ----
              echo "Post-install package query:"; rpm -q "${PKG_NAME}"
              BIN="$(rpm -ql "${PKG_NAME}" | grep -E "^/usr/bin/" | head -n1 || true)"
              if [ -z "${BIN}" ] || [ ! -x "${BIN}" ]; then
                echo "::error::No executable /usr/bin entry owned by ${PKG_NAME} after .rpm install." >&2
                rpm -ql "${PKG_NAME}" || true
                exit 1
              fi
              echo "Installed binary: ${BIN}"

              # ---- G5: REAL HEADLESS GUI LAUNCH inside the container ----
              export WEBKIT_DISABLE_COMPOSITING_MODE=1
              export WEBKIT_DISABLE_DMABUF_RENDERER=1
              export LIBGL_ALWAYS_SOFTWARE=1
              set +e
              # $! is the xvfb-run WRAPPER pid, not the app — asserting on it is a false
              # pass. Verify the REAL installed binary by its full path via pgrep -f (G5).
              xvfb-run -a --server-args="-screen 0 1280x1024x24" "${BIN}" &
              WRAP_PID=$!
              APP_PID=""
              for i in $(seq 1 10); do
                sleep 1
                APP_PID="$(pgrep -f "${BIN}" | head -n1 || true)"
                [ -n "${APP_PID}" ] && break
                kill -0 "${WRAP_PID}" 2>/dev/null || break
              done
              if [ -n "${APP_PID}" ] && kill -0 "${APP_PID}" 2>/dev/null; then
                echo "PASS: .rpm GUI app alive after startup (app pid ${APP_PID}, path ${BIN})."
                kill -TERM "${APP_PID}" 2>/dev/null || true
                kill -TERM "${WRAP_PID}" 2>/dev/null || true
                wait "${WRAP_PID}" 2>/dev/null || true
              else
                kill -TERM "${WRAP_PID}" 2>/dev/null || true
                wait "${WRAP_PID}" 2>/dev/null; RC=$?
                echo "::error::.rpm GUI app (${BIN}) did not stay alive under Xvfb (wrapper rc=${RC}); not a real launch." >&2
                exit 1
              fi
              set -e

              # ---- G7: REAL UNINSTALL + negative assertion ----
              dnf -y remove "${PKG_NAME}"
              if rpm -q "${PKG_NAME}" >/dev/null 2>&1; then
                echo "::error::${PKG_NAME} still installed after dnf remove." >&2
                exit 1
              fi
              if [ -e "${BIN}" ]; then
                echo "::error::Binary ${BIN} still present after .rpm uninstall." >&2
                exit 1
              fi
              echo "PASS: .rpm fully removed (package gone, binary gone)."
            '

      # REQUIRED tripwire: only reached if BOTH the .deb and .rpm lifecycles above ran
      # and uninstall-verified without failing. Sets a marker so an all-skip / all-green
      # leg that tested nothing is caught downstream. Linux is the only OS this type runs.
      - name: (deb-rpm) Mark lifecycle complete (tripwire)
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "deb-rpm full lifecycle (build + .deb install/launch/uninstall + .rpm container install/launch/uninstall) completed."

      # Optional: publish the built packages for downstream release jobs / debugging.
      - name: (deb-rpm) Upload built packages as workflow artifacts
        if: matrix.type == 'deb-rpm' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: deb-rpm-packages
          path: |
            ${{ github.workspace }}/_pkgs/app.deb
            ${{ github.workspace }}/_pkgs/app.rpm
          if-no-files-found: error


      # ===================== homebrew-formula =====================
      - name: 'homebrew-formula | Resolve formula file and name'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        id: hbf
        shell: bash
        run: |
          set -euo pipefail
          # Locate the formula .rb file (G2: never assume a path; discover + assert).
          FORMULA_FILE=""
          for cand in Formula/*.rb HomebrewFormula/*.rb *.rb; do
            for f in $cand; do
              [ -f "$f" ] || continue
              if grep -qE '<\s*Formula' "$f"; then FORMULA_FILE="$f"; break 2; fi
            done
          done
          if [ -z "$FORMULA_FILE" ]; then
            echo "::error::No Homebrew formula (.rb with 'class X < Formula') found in repo."
            exit 1
          fi
          # Formula name = file basename without .rb (Homebrew's canonical naming rule).
          FORMULA_NAME="$(basename "$FORMULA_FILE" .rb)"
          echo "Found formula: $FORMULA_NAME ($FORMULA_FILE)"
          echo "file=$FORMULA_FILE"  >> "$GITHUB_OUTPUT"
          echo "name=$FORMULA_NAME" >> "$GITHUB_OUTPUT"

      - name: 'homebrew-formula | Ensure brew on PATH'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          # Linuxbrew lives outside default PATH on ubuntu runners; macos has brew already.
          if ! command -v brew >/dev/null 2>&1; then
            if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
              eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
            fi
          fi
          command -v brew >/dev/null 2>&1 || { echo "::error::brew not available on this runner"; exit 1; }
          # Persist brew env to every subsequent step.
          brew shellenv >> "$GITHUB_ENV"
          brew --version

      - name: 'homebrew-formula | Audit formula (structure validation)'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          # G1: brew audit returns nonzero on real structural errors -> turns job red.
          # --strict surfaces style/correctness issues. Run against the local file path.
          brew audit --strict --formula "${{ steps.hbf.outputs.file }}"

      - name: 'homebrew-formula | BUILD artifact (install --build-from-source, user-scope)'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          FILE="${{ steps.hbf.outputs.file }}"
          # Clean any preinstalled namesake so we build OUR formula from source (G2).
          brew uninstall --force --ignore-dependencies "$NAME" 2>/dev/null || true
          # G2: actually build the keg from the local .rb (the artifact). --build-from-source
          # forces compilation rather than pulling a prebuilt bottle. Homebrew is user-owned
          # (it refuses to run as root), so this IS the user-scope install; there is no real
          # root/system-scope install for a formula -- documenting rather than faking it.
          # G1: set -e + brew nonzero exit makes a failed build red.
          brew install --build-from-source --verbose --formula "$FILE"

      - name: 'homebrew-formula | VERIFY artifact exists (keg in Cellar)'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          # G2: assert the built keg directory exists before trusting the install.
          PREFIX="$(brew --prefix "$NAME")"
          echo "Install prefix: $PREFIX"
          [ -d "$PREFIX" ] || { echo "::error::keg prefix missing for $NAME"; exit 1; }
          CELLAR="$(brew --cellar "$NAME")"
          if [ ! -d "$CELLAR" ] || [ -z "$(ls -A "$CELLAR" 2>/dev/null)" ]; then
            echo "::error::Cellar for $NAME empty/missing: $CELLAR"; exit 1
          fi
          echo "Cellar contents:"; ls -la "$CELLAR"
          brew list --formula "$NAME" >/dev/null || { echo "::error::brew does not list $NAME after install"; exit 1; }

      - name: 'homebrew-formula | LAUNCH / smoke-verify (brew test + run installed binaries)'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          # Primary smoke check: brew test runs the formula's `test do` block, the canonical
          # functional verification for a formula. G1: nonzero exit fails the job.
          if brew test --verbose "$NAME"; then
            echo "brew test passed."
          else
            rc=$?
            # Distinguish "no test block" (some formulae lack one) from a real failure.
            if brew cat "$NAME" 2>/dev/null | grep -qE '^\s*test do'; then
              echo "::error::brew test failed for $NAME (rc=$rc)"; exit 1
            fi
            echo "::warning::Formula $NAME defines no 'test do' block; relying on binary launch below."
          fi
          # Secondary real launch: execute each installed executable so a broken binary is caught
          # (G5 -- a formula is a CLI tool, so actually invoking the binary is the real launch;
          #  brew test above is the headless functional equivalent of launching a GUI).
          PREFIX="$(brew --prefix "$NAME")"
          RAN=0
          if [ -d "$PREFIX/bin" ]; then
            for bin in "$PREFIX/bin/"*; do
              [ -x "$bin" ] || continue
              RAN=1
              echo "Launching: $bin"
              # Try common no-op invocations; succeed if ANY returns 0 (some tools exit !=0 on --help).
              if "$bin" --version >/dev/null 2>&1 || "$bin" --help    >/dev/null 2>&1 || "$bin" -h        >/dev/null 2>&1 || "$bin" version   >/dev/null 2>&1; then
                echo "  OK: $bin responded to a smoke invocation"
              else
                echo "::error::Installed binary failed to launch: $bin"; exit 1
              fi
            done
          fi
          if [ "$RAN" = 0 ]; then
            echo "::warning::Formula $NAME installed no executables in bin/; smoke limited to brew test."
          fi

      - name: 'homebrew-formula | SIGNING / notarization check (macOS, WARN-only)'
        if: matrix.type == 'homebrew-formula' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          PREFIX="$(brew --prefix "$NAME")"
          # G8: CLI formula binaries are not Gatekeeper-gated and Homebrew does not notarize,
          # but we structurally inspect any Mach-O the formula installs and WARN (never hard-fail
          # on public CI without signing secrets). If the formula ships a .app, codesign applies.
          found_macho=0
          while IFS= read -r f; do
            file "$f" 2>/dev/null | grep -qiE 'Mach-O' || continue
            found_macho=1
            echo "== codesign -dv: $f =="
            if codesign -dv --verbose=2 "$f" 2>&1; then
              spctl --assess --type execute "$f" 2>&1 && echo "::notice::$f passes spctl assessment" || echo "::warning::$f not accepted by spctl (expected for unsigned CLI binary)"
            else
              echo "::warning::$f is unsigned (expected on public CI without signing secrets)"
            fi
          done < <(find "$PREFIX" -type f -perm -u+x 2>/dev/null)
          # Any bundled .app -> stronger Gatekeeper check (still WARN-only).
          while IFS= read -r app; do
            echo "::notice::Found .app bundle: $app"
            spctl --assess --type execute --verbose "$app" 2>&1 || echo "::warning::$app not notarized/accepted by Gatekeeper (WARN-only on public CI)"
          done < <(find "$PREFIX" -name '*.app' -maxdepth 4 -type d 2>/dev/null)
          [ "$found_macho" = 0 ] && echo "::notice::No Mach-O binaries found to sign-check for $NAME."
          exit 0

      - name: 'homebrew-formula | UPGRADE over a real previous release'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          FILE="${{ steps.hbf.outputs.file }}"
          # G6: create GENUINE dirty state by installing the currently PUBLISHED formula first,
          # then upgrade to our local build. Graceful skip ONLY if no prior published release
          # exists; a download/build failure of a real prior release must FAIL (never swallow).
          # Strategy: fetch the formula .rb as published at the latest GitHub release tag.
          OWNER_REPO="${{ github.repository }}"
          # G6: "no releases yet" is a legitimate skip; any OTHER gh error must surface, so
          # only treat an empty-result (no releases) as a skip and let real failures propagate.
          if gh release view --repo "$OWNER_REPO" --json tagName -q .tagName > "$RUNNER_TEMP/_tag.txt" 2>"$RUNNER_TEMP/_tag.err"; then
            LATEST_TAG="$(cat "$RUNNER_TEMP/_tag.txt")"
          elif grep -qiE 'release not found|no releases|not found' "$RUNNER_TEMP/_tag.err"; then
            LATEST_TAG=""
          else
            echo "::error::gh release view failed for $OWNER_REPO (not a 'no releases' condition):"
            cat "$RUNNER_TEMP/_tag.err"
            exit 1
          fi
          if [ -z "$LATEST_TAG" ]; then
            echo "::notice::SKIPPED real-upgrade test: no published GitHub release for $OWNER_REPO yet (G6 legitimate skip)."
            echo "Upgrade step skipped (no prior release); lifecycle continues."
            exit 0
          fi
          echo "Latest published release tag: $LATEST_TAG"
          # G3: correct raw URL with proper slashes.
          PREV_RB="$RUNNER_TEMP/prev_${NAME}.rb"
          REL_PATH="${FILE}"
          RAW_URL="https://raw.githubusercontent.com/${OWNER_REPO}/${LATEST_TAG}/${REL_PATH}"
          echo "Fetching previous formula: $RAW_URL"
          # G6: a real release tag exists, so a fetch failure is a DOWNLOAD FAILURE -> FAIL.
          # Do NOT swallow with || true and skip green.
          if ! curl -fsSL "$RAW_URL" -o "$PREV_RB"; then
            echo "::error::Failed to download published formula at tag $LATEST_TAG ($RAW_URL). A release exists; this is a download failure, not a skip."
            exit 1
          fi
          if ! grep -qE '<\s*Formula' "$PREV_RB"; then
            echo "::error::Fetched file at $LATEST_TAG is not a Homebrew formula; cannot run real-upgrade test."
            exit 1
          fi
          # If the published formula is byte-identical to local, there is genuinely no version
          # delta to upgrade over -- a legitimate skip (visible ::notice::).
          if cmp -s "$PREV_RB" "$FILE"; then
            echo "::notice::SKIPPED real-upgrade test: published formula at $LATEST_TAG is byte-identical to working copy (no version delta, G6 legitimate skip)."
            echo "Upgrade step skipped (no delta); lifecycle continues."
            exit 0
          fi
          # Install the PREVIOUS published formula to create dirty state.
          brew uninstall --force --ignore-dependencies "$NAME" 2>/dev/null || true
          echo "Installing PREVIOUS published formula to create dirty state..."
          # G6: this is a REAL prior release we fetched; a build failure here is a real failure,
          # not a skip. G1: surface it (red).
          brew install --build-from-source --formula "$PREV_RB"
          OLD_PREFIX="$(brew --prefix "$NAME")"; echo "Old prefix: $OLD_PREFIX"
          OLD_VERSION="$(brew list --versions "$NAME" | awk '{print $2}')"; echo "Old version: $OLD_VERSION"
          # Now UPGRADE to our local working-copy build. G1: set -e + nonzero exit turns job red.
          echo "Upgrading to local working-copy formula..."
          brew reinstall --build-from-source --formula "$FILE"
          NEW_PREFIX="$(brew --prefix "$NAME")"; echo "New prefix: $NEW_PREFIX"
          NEW_VERSION="$(brew list --versions "$NAME" | awk '{print $2}')"; echo "New version: $NEW_VERSION"
          [ -d "$NEW_PREFIX" ] || { echo "::error::keg missing after upgrade"; exit 1; }
          brew list --formula "$NAME" >/dev/null || { echo "::error::$NAME not listed after upgrade"; exit 1; }
          # G6: assert the installed keg now reflects the working-copy build. The keg prefix is
          # version-stamped, so if the working copy declares a different version the prefix must
          # change; if the version is unchanged the binaries must at least match a fresh build of
          # the working copy. Confirm the working-copy formula is what is now installed.
          if [ "$NEW_PREFIX" = "$OLD_PREFIX" ] && [ "$NEW_VERSION" = "$OLD_VERSION" ]; then
            echo "::notice::Version string unchanged ($NEW_VERSION); reinstall replaced the keg with the working-copy build at the same version."
          else
            echo "Upgrade changed keg: $OLD_VERSION ($OLD_PREFIX) -> $NEW_VERSION ($NEW_PREFIX)"
          fi
          # Smoke the upgraded keg via its test block.
          brew test --verbose "$NAME" || echo "::warning::brew test post-upgrade non-zero (may lack test do)"
          echo "Upgrade over real previous release succeeded."

      - name: 'homebrew-formula | UNINSTALL and verify full removal'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.hbf.outputs.name }}"
          # Capture prefix BEFORE removal so we can negatively assert it's gone after.
          PREFIX="$(brew --prefix "$NAME" 2>/dev/null || true)"
          CELLAR_BASE=""
          [ -n "$PREFIX" ] && CELLAR_BASE="$(brew --cellar "$NAME" 2>/dev/null || true)"
          # G1: uninstall failure turns job red.
          brew uninstall --force --ignore-dependencies "$NAME"
          # G7: negative assertions -- the job FAILS if anything remains.
          if brew list --formula "$NAME" >/dev/null 2>&1; then
            echo "::error::brew still lists $NAME after uninstall"; exit 1
          fi
          if [ -n "$CELLAR_BASE" ] && [ -d "$CELLAR_BASE" ]; then
            echo "::error::Cellar dir still present after uninstall: $CELLAR_BASE"; exit 1
          fi
          # The symlinked bin should no longer resolve to this keg.
          if [ -n "$PREFIX" ] && [ -d "$PREFIX" ]; then
            echo "::error::keg prefix still present after uninstall: $PREFIX"; exit 1
          fi
          # brew --prefix for an absent formula returns the bare HOMEBREW_PREFIX or errors;
          # confirm there is no installed keg via the explicit installed-list check.
          if brew list --versions "$NAME" 2>/dev/null | grep -q .; then
            echo "::error::brew reports a version for $NAME after uninstall"; exit 1
          fi
          echo "Uninstall verified: $NAME fully removed."

      - name: 'homebrew-formula | Lifecycle tripwire (mark success)'
        if: matrix.type == 'homebrew-formula' && (runner.os == 'macOS' || runner.os == 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          # REQUIRED tripwire: only reached after build/verify/launch/upgrade/uninstall-verify all
          # passed on this OS. An all-skip leg never gets here, so downstream can catch a green
          # job that tested nothing.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"
          echo "::notice::homebrew-formula lifecycle completed on $RUNNER_OS (LIFECYCLE_OK=1)."


      # ===================== dotnet =====================
      - name: Checkout (dotnet)
        if: matrix.type == 'dotnet'
        uses: actions/checkout@v4

      - name: Setup .NET SDK (dotnet)
        if: matrix.type == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          # If a global.json is committed it pins the SDK; dotnet-version below is the
          # fallback when no global.json is present. Keep both for determinism.
          dotnet-version: '8.0.x'

      - name: Print SDK info (dotnet)
        if: matrix.type == 'dotnet'
        shell: bash
        run: |
          set -euo pipefail
          dotnet --info
          echo "DOTNET_TOOL_PKG_ID=${DOTNET_TOOL_PKG_ID:-}" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------------------
      # G2: BUILD THE ARTIFACT. A .NET "installer" is a packed .nupkg tool package.
      # Never assume nupkg/ pre-exists. Pack it here. PackAsTool must be true in the
      # csproj (a real .NET tool); we assert the nupkg exists before any install.
      # Output dir is normalized to ./nupkg-out. We capture the package id + version
      # into env so later steps reference an exact, real package (G3 correctness).
      # ---------------------------------------------------------------------------
      - name: Build .nupkg tool package (dotnet)
        if: matrix.type == 'dotnet'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./nupkg-out
          # Restore + pack in Release. dotnet exits non-zero on failure under set -e (G1).
          dotnet restore
          dotnet pack -c Release -o ./nupkg-out /p:PackAsTool=true
          echo "Packed artifacts:"
          ls -la ./nupkg-out

      - name: Verify artifact exists + resolve package id/version (dotnet)
        if: matrix.type == 'dotnet'
        shell: bash
        run: |
          set -euo pipefail
          NUPKG="$(ls ./nupkg-out/*.nupkg 2>/dev/null | grep -v '\.symbols\.nupkg$' | head -n1 || true)"
          if [ -z "${NUPKG}" ] || [ ! -f "${NUPKG}" ]; then
            echo "::error::No .nupkg artifact produced by dotnet pack. Is <PackAsTool>true</PackAsTool> set?"
            exit 1
          fi
          BASE="$(basename "${NUPKG}" .nupkg)"
          # File name is <PackageId>.<Version>.nupkg ; split on the first dotted version segment.
          VER="$(echo "${BASE}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' | head -n1)"
          PKGID="${BASE%.${VER}}"
          if [ -z "${VER}" ] || [ -z "${PKGID}" ] || [ "${PKGID}" = "${BASE}" ]; then
            echo "::error::Could not parse package id/version from '${BASE}'."
            exit 1
          fi
          # Resolve the invokable command name from the .nuspec inside the package
          # (the command can differ from the package id). Default to package id.
          CMD="${PKGID}"
          python3 - "$NUPKG" <<'PY' || true
          import sys, zipfile, re, os
          nupkg = sys.argv[1]
          cmd = None
          with zipfile.ZipFile(nupkg) as z:
              # DotnetToolSettings.xml lists the actual command name(s).
              for n in z.namelist():
                  if n.lower().endswith('dotnettoolsettings.xml'):
                      data = z.read(n).decode('utf-8', 'replace')
                      m = re.search(r'<Command\b[^>]*\bName="([^"]+)"', data)
                      if m:
                          cmd = m.group(1)
                      break
          if cmd:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"DOTNET_TOOL_CMD={cmd}\n")
              print(f"Resolved tool command: {cmd}")
          PY
          echo "DOTNET_NUPKG=${NUPKG}"   >> "$GITHUB_ENV"
          echo "DOTNET_PKG_ID=${PKGID}"  >> "$GITHUB_ENV"
          echo "DOTNET_PKG_VER=${VER}"   >> "$GITHUB_ENV"
          echo "DOTNET_SRC_DIR=$(cd ./nupkg-out && pwd)" >> "$GITHUB_ENV"
          echo "Artifact OK: id=${PKGID} version=${VER} path=${NUPKG}"

      # ---------------------------------------------------------------------------
      # G8: SIGNING. .NET tool .nupkg packages are typically NOT Authenticode-signed;
      # NuGet author/repo signatures are optional and absent on public CI without
      # secrets. Do a structural check and WARN only (never hard-fail).
      # Split per shell (G4): bash on Linux/macOS, PowerShell on Windows.
      # ---------------------------------------------------------------------------
      - name: Signature check (WARN only) (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if dotnet nuget verify "${DOTNET_NUPKG}" >/tmp/nuget_verify.txt 2>&1; then
            echo "NuGet signature verified:"; cat /tmp/nuget_verify.txt
          else
            echo "::warning::Package '${DOTNET_NUPKG}' is unsigned or signature could not be verified on public CI (no signing secrets). Structural-only check; not blocking."
            cat /tmp/nuget_verify.txt || true
          fi

      - name: Signature check (WARN only) (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $out = & dotnet nuget verify "$env:DOTNET_NUPKG" 2>&1 | Out-String
          if ($LASTEXITCODE -eq 0) {
            Write-Host "NuGet signature verified:`n$out"
          } else {
            Write-Warning "Package '$env:DOTNET_NUPKG' is unsigned or signature could not be verified on public CI (no signing secrets). Structural-only check; not blocking."
            Write-Host $out
          }

      # ---------------------------------------------------------------------------
      # USER-SCOPE INSTALL (global tool): binaries land in
      #   Linux/macOS: $HOME/.dotnet/tools   Windows: %USERPROFILE%\.dotnet\tools
      # We install from the locally built package via --add-source (G2: our artifact,
      # not nuget.org). Per-shell (G4). Install is run directly; non-zero fails the job.
      # ---------------------------------------------------------------------------
      - name: Install user-scope global tool (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool install --global "${DOTNET_PKG_ID}" --version "${DOTNET_PKG_VER}" --add-source "${DOTNET_SRC_DIR}"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install user-scope global tool (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $proc = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
            -ArgumentList @('tool','install','--global', $env:DOTNET_PKG_ID,
                            '--version', $env:DOTNET_PKG_VER,
                            '--add-source', $env:DOTNET_SRC_DIR)
          if ($proc.ExitCode -ne 0) { throw "dotnet tool install --global failed with exit code $($proc.ExitCode)" }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # ---------------------------------------------------------------------------
      # G5 / LAUNCH SMOKE: a .NET tool is a console app, so a real launch IS running
      # the installed command. We run the actual installed binary (not the source
      # tree) and assert exit code 0. We try `--version`, then fall back to `--help`,
      # so this works regardless of which the tool implements; either must exit 0.
      # ---------------------------------------------------------------------------
      - name: Launch / smoke-verify installed tool (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          CMD="${DOTNET_TOOL_CMD:-${DOTNET_PKG_ID}}"
          BIN="$HOME/.dotnet/tools/${CMD}"
          if [ ! -x "${BIN}" ]; then
            echo "::error::Installed tool binary not found/executable at ${BIN}"
            ls -la "$HOME/.dotnet/tools" || true
            exit 1
          fi
          # Real invocation of the installed binary; non-zero from BOTH probes fails.
          if ! "${BIN}" --version; then
            echo "--version not supported; falling back to --help"
            "${BIN}" --help
          fi
          echo "Smoke OK: ${CMD} launched from installed location and exited 0."

      - name: Launch / smoke-verify installed tool (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cmd = if ($env:DOTNET_TOOL_CMD) { $env:DOTNET_TOOL_CMD } else { $env:DOTNET_PKG_ID }
          $bin = Join-Path "$env:USERPROFILE\.dotnet\tools" "$cmd.exe"
          if (-not (Test-Path $bin)) { throw "Installed tool binary not found at $bin" }
          $proc = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--version')
          if ($proc.ExitCode -ne 0) {
            Write-Host "--version returned $($proc.ExitCode); falling back to --help"
            $proc = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--help')
            if ($proc.ExitCode -ne 0) { throw "Installed tool failed to launch (--version and --help both non-zero: $($proc.ExitCode))" }
          }
          Write-Host "Smoke OK: $cmd launched from installed location and exited 0."

      # ---------------------------------------------------------------------------
      # SYSTEM-SCOPE INSTALL (tool-path): the real system-scope analog for .NET tools.
      # Installs to a shared location NOT on the user PATH; we invoke by full path.
      # This proves the system-scope distinction is exercised, per the brief.
      # ---------------------------------------------------------------------------
      - name: Install + smoke system-scope (tool-path) (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TP="${RUNNER_TEMP}/dotnet-systemtools"
          rm -rf "${TP}"; mkdir -p "${TP}"
          dotnet tool install "${DOTNET_PKG_ID}" --version "${DOTNET_PKG_VER}" --add-source "${DOTNET_SRC_DIR}" --tool-path "${TP}"
          CMD="${DOTNET_TOOL_CMD:-${DOTNET_PKG_ID}}"
          BIN="${TP}/${CMD}"
          [ -x "${BIN}" ] || { echo "::error::tool-path binary missing at ${BIN}"; ls -la "${TP}"; exit 1; }
          if ! "${BIN}" --version; then "${BIN}" --help; fi
          echo "DOTNET_TOOLPATH=${TP}" >> "$GITHUB_ENV"
          echo "System-scope (tool-path) install + smoke OK."

      - name: Install + smoke system-scope (tool-path) (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tp = Join-Path $env:RUNNER_TEMP 'dotnet-systemtools'
          if (Test-Path $tp) { Remove-Item -Recurse -Force $tp }
          New-Item -ItemType Directory -Force -Path $tp | Out-Null
          $proc = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
            -ArgumentList @('tool','install', $env:DOTNET_PKG_ID,
                            '--version', $env:DOTNET_PKG_VER,
                            '--add-source', $env:DOTNET_SRC_DIR,
                            '--tool-path', $tp)
          if ($proc.ExitCode -ne 0) { throw "tool-path install failed: $($proc.ExitCode)" }
          $cmd = if ($env:DOTNET_TOOL_CMD) { $env:DOTNET_TOOL_CMD } else { $env:DOTNET_PKG_ID }
          $bin = Join-Path $tp "$cmd.exe"
          if (-not (Test-Path $bin)) { throw "tool-path binary missing at $bin" }
          $proc = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--version')
          if ($proc.ExitCode -ne 0) {
            $proc = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--help')
            if ($proc.ExitCode -ne 0) { throw "tool-path smoke failed: $($proc.ExitCode)" }
          }
          "DOTNET_TOOLPATH=$tp" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "System-scope (tool-path) install + smoke OK."

      # ---------------------------------------------------------------------------
      # G6: REAL UPGRADE. First install an ACTUAL PREVIOUS published version from
      # nuget.org to create genuine dirty state, then `dotnet tool update` to the
      # locally built version. Graceful skip if no prior published version exists.
      # Uses a fresh tool-path so it is independent of the user-scope install above.
      # ---------------------------------------------------------------------------
      - name: Upgrade over a real previous release (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          UP="${RUNNER_TEMP}/dotnet-upgrade"
          rm -rf "${UP}"; mkdir -p "${UP}"
          CMD="${DOTNET_TOOL_CMD:-${DOTNET_PKG_ID}}"

          # Install latest PUBLISHED version from nuget.org (real prior state).
          # G6: distinguish "no published version exists yet" (legitimate SKIP) from a
          # real download/feed failure (must FAIL). We capture the exit status WITHOUT
          # set -e aborting (guarded by 'if'), then inspect the output:
          #   * NU1101 / "Unable to find package" / "No packages exist with this id"
          #     => the tool was simply never published yet -> visible ::notice:: SKIP.
          #   * any other non-zero (network, feed/service-index, auth, timeout, NU1301)
          #     => a genuine failure -> hard exit 1 (never swallow & go green).
          set +e
          dotnet tool install "${DOTNET_PKG_ID}" --tool-path "${UP}" >/tmp/prev.txt 2>&1
          PREV_RC=$?
          set -e
          cat /tmp/prev.txt || true
          if [ "${PREV_RC}" -eq 0 ]; then
            echo "Installed prior published version."
            PREV_VER="$("${UP}/${CMD}" --version 2>/dev/null | head -n1 || echo unknown)"
            echo "Prior version reports: ${PREV_VER}"
            # Add our freshly built package as a source and update to it.
            dotnet tool update "${DOTNET_PKG_ID}" --version "${DOTNET_PKG_VER}" --add-source "${DOTNET_SRC_DIR}" --tool-path "${UP}"
            BIN="${UP}/${CMD}"
            [ -x "${BIN}" ] || { echo "::error::post-upgrade binary missing at ${BIN}"; exit 1; }
            if ! "${BIN}" --version; then "${BIN}" --help; fi
            echo "DOTNET_UPGRADE_PATH=${UP}" >> "$GITHUB_ENV"
            echo "Upgrade over real previous release: OK."
          elif grep -qiE 'NU1101|Unable to find package|No packages exist with this id|is not found on source' /tmp/prev.txt; then
            echo "::notice::SKIPPED real-upgrade test: no prior published version of '${DOTNET_PKG_ID}' exists on nuget.org yet (nothing to upgrade over)."
          else
            echo "::error::Failed to download prior published version of '${DOTNET_PKG_ID}' (exit ${PREV_RC}); this is NOT a 'package missing' condition (network/feed/auth error). Failing instead of silently skipping."
            exit 1
          fi

      - name: Upgrade over a real previous release (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $up = Join-Path $env:RUNNER_TEMP 'dotnet-upgrade'
          if (Test-Path $up) { Remove-Item -Recurse -Force $up }
          New-Item -ItemType Directory -Force -Path $up | Out-Null
          $cmd = if ($env:DOTNET_TOOL_CMD) { $env:DOTNET_TOOL_CMD } else { $env:DOTNET_PKG_ID }

          # G6: distinguish "no published version exists yet" (legitimate SKIP) from a
          # real download/feed failure (must FAIL). Capture stdout+stderr and inspect:
          # NU1101 / "Unable to find package" => never published -> ::notice:: SKIP;
          # any other non-zero (network/feed/auth/timeout) => hard fail, never skip green.
          $prevLog = Join-Path $env:RUNNER_TEMP 'dotnet-prev-install.txt'
          $prev = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
            -ArgumentList @('tool','install', $env:DOTNET_PKG_ID, '--tool-path', $up) `
            -RedirectStandardOutput $prevLog -RedirectStandardError "$prevLog.err"
          $prevOut = ((Get-Content $prevLog -Raw -ErrorAction SilentlyContinue) + "`n" + (Get-Content "$prevLog.err" -Raw -ErrorAction SilentlyContinue))
          Write-Host $prevOut
          if ($prev.ExitCode -ne 0) {
            if ($prevOut -match 'NU1101|Unable to find package|No packages exist with this id|is not found on source') {
              Write-Host "::notice::SKIPPED real-upgrade test: no prior published version of '$($env:DOTNET_PKG_ID)' exists on nuget.org yet (nothing to upgrade over)."
            } else {
              throw "Failed to download prior published version of '$($env:DOTNET_PKG_ID)' (exit $($prev.ExitCode)); not a 'package missing' condition (network/feed/auth error). Failing instead of silently skipping."
            }
          } else {
            $bin = Join-Path $up "$cmd.exe"
            $upd = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
              -ArgumentList @('tool','update', $env:DOTNET_PKG_ID,
                              '--version', $env:DOTNET_PKG_VER,
                              '--add-source', $env:DOTNET_SRC_DIR,
                              '--tool-path', $up)
            if ($upd.ExitCode -ne 0) { throw "dotnet tool update (upgrade) failed: $($upd.ExitCode)" }
            if (-not (Test-Path $bin)) { throw "post-upgrade binary missing at $bin" }
            $smoke = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--version')
            if ($smoke.ExitCode -ne 0) {
              $smoke = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow -ArgumentList @('--help')
              if ($smoke.ExitCode -ne 0) { throw "post-upgrade smoke failed: $($smoke.ExitCode)" }
            }
            "DOTNET_UPGRADE_PATH=$up" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Upgrade over real previous release: OK."
          }

      # ---------------------------------------------------------------------------
      # G7: REAL UNINSTALL + NEGATIVE ASSERTION. Uninstall every scope we installed
      # (user-global, tool-path, and the upgrade path if it was created) and assert
      # the binaries are actually GONE. Any remaining file turns the job red.
      # ---------------------------------------------------------------------------
      - name: Uninstall + verify full removal (dotnet, Unix)
        if: matrix.type == 'dotnet' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          CMD="${DOTNET_TOOL_CMD:-${DOTNET_PKG_ID}}"

          # 1) user-scope global
          dotnet tool uninstall --global "${DOTNET_PKG_ID}"
          if [ -e "$HOME/.dotnet/tools/${CMD}" ]; then
            echo "::error::Global tool binary still present after uninstall: $HOME/.dotnet/tools/${CMD}"; exit 1
          fi

          # 2) system-scope tool-path
          dotnet tool uninstall "${DOTNET_PKG_ID}" --tool-path "${DOTNET_TOOLPATH}"
          if [ -e "${DOTNET_TOOLPATH}/${CMD}" ]; then
            echo "::error::tool-path binary still present after uninstall: ${DOTNET_TOOLPATH}/${CMD}"; exit 1
          fi

          # 3) upgrade path (only if the upgrade test actually ran)
          if [ -n "${DOTNET_UPGRADE_PATH:-}" ]; then
            dotnet tool uninstall "${DOTNET_PKG_ID}" --tool-path "${DOTNET_UPGRADE_PATH}"
            if [ -e "${DOTNET_UPGRADE_PATH}/${CMD}" ]; then
              echo "::error::upgrade-path binary still present after uninstall: ${DOTNET_UPGRADE_PATH}/${CMD}"; exit 1
            fi
          fi

          # Final negative assertion: it must no longer resolve as a global tool.
          if dotnet tool list --global | grep -i -- "${DOTNET_PKG_ID}"; then
            echo "::error::Package '${DOTNET_PKG_ID}' still listed as a global tool after uninstall."; exit 1
          fi
          echo "Uninstall verified: all installed binaries removed."
          # TRIPWIRE: a full lifecycle completed (build -> install -> launch -> upgrade
          # -> uninstall+verify) on this OS. Catches an all-skip leg going green.
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify full removal (dotnet, Windows)
        if: matrix.type == 'dotnet' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cmd = if ($env:DOTNET_TOOL_CMD) { $env:DOTNET_TOOL_CMD } else { $env:DOTNET_PKG_ID }

          # 1) user-scope global
          $u = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
            -ArgumentList @('tool','uninstall','--global', $env:DOTNET_PKG_ID)
          if ($u.ExitCode -ne 0) { throw "global uninstall failed: $($u.ExitCode)" }
          $gbin = Join-Path "$env:USERPROFILE\.dotnet\tools" "$cmd.exe"
          if (Test-Path $gbin) { throw "Global tool binary still present after uninstall: $gbin" }

          # 2) system-scope tool-path
          $u2 = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
            -ArgumentList @('tool','uninstall', $env:DOTNET_PKG_ID, '--tool-path', $env:DOTNET_TOOLPATH)
          if ($u2.ExitCode -ne 0) { throw "tool-path uninstall failed: $($u2.ExitCode)" }
          $tbin = Join-Path $env:DOTNET_TOOLPATH "$cmd.exe"
          if (Test-Path $tbin) { throw "tool-path binary still present after uninstall: $tbin" }

          # 3) upgrade path (only if the upgrade test actually ran)
          if ($env:DOTNET_UPGRADE_PATH) {
            $u3 = Start-Process -FilePath 'dotnet' -Wait -PassThru -NoNewWindow `
              -ArgumentList @('tool','uninstall', $env:DOTNET_PKG_ID, '--tool-path', $env:DOTNET_UPGRADE_PATH)
            if ($u3.ExitCode -ne 0) { throw "upgrade-path uninstall failed: $($u3.ExitCode)" }
            $ubin = Join-Path $env:DOTNET_UPGRADE_PATH "$cmd.exe"
            if (Test-Path $ubin) { throw "upgrade-path binary still present after uninstall: $ubin" }
          }

          # Final negative assertion: must no longer resolve as a global tool.
          $list = & dotnet tool list --global | Out-String
          if ($list -match [regex]::Escape($env:DOTNET_PKG_ID)) {
            throw "Package '$($env:DOTNET_PKG_ID)' still listed as a global tool after uninstall."
          }
          Write-Host "Uninstall verified: all installed binaries removed."
          # TRIPWIRE: a full lifecycle completed on this OS. Catches an all-skip leg.
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8


      # ===================== java-jar =====================
      - name: Checkout
        if: matrix.type == 'java-jar'
        uses: actions/checkout@v4

      - name: Set up JDK 17 (includes jpackage)
        if: matrix.type == 'java-jar'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # WiX is required by jpackage to emit .msi/.exe on Windows.
      - name: Install WiX Toolset (Windows, required by jpackage MSI)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install wixtoolset --no-progress -y
          echo "${env:WIX}bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # ---------------------------------------------------------------------------
      # G2: BUILD the runnable JAR, then BUILD the native installer artifact.
      # Never assume target/ or dist/ pre-exists. We detect Maven vs Gradle.
      # ---------------------------------------------------------------------------
      - name: Build runnable JAR (POSIX)
        if: matrix.type == 'java-jar' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Product/package names are derived from a documented var with a sane
          # default; no hardcoded product name leaks into install/launch/uninstall.
          APP_NAME="${PRODUCT_NAME:-${{ vars.PRODUCT_NAME || 'InstallerTestApp' }}}"
          LINUX_PKG="$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9.+-')"
          echo "APP_NAME=$APP_NAME" >> "$GITHUB_ENV"
          echo "LINUX_PKG=$LINUX_PKG" >> "$GITHUB_ENV"
          if [ -f mvnw ]; then
            ./mvnw -B -ntp package -DskipTests
          elif [ -f pom.xml ]; then
            mvn -B -ntp package -DskipTests
          elif [ -f gradlew ]; then
            ./gradlew --no-daemon clean build -x test
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            gradle --no-daemon clean build -x test
          else
            echo "::error::No Maven/Gradle build descriptor found for java-jar type."
            exit 1
          fi
          # Locate the produced runnable/fat JAR (skip sources/javadoc/original-* jars).
          JAR="$(find target build/libs -type f -name '*.jar' 2>/dev/null | grep -Ev 'sources|javadoc|original-' | sort | tail -n1 || true)"
          if [ -z "${JAR:-}" ] || [ ! -f "$JAR" ]; then
            echo "::error::Build completed but no runnable JAR was found."
            exit 1
          fi
          echo "Found JAR: $JAR"
          # Stage exactly one jar into a clean input dir for jpackage.
          rm -rf jp-input && mkdir -p jp-input
          cp "$JAR" "jp-input/app.jar"
          # Verify the JAR declares a Main-Class (required for a runnable installer).
          if ! unzip -p "$JAR" META-INF/MANIFEST.MF | tr -d '\r' | grep -q '^Main-Class:'; then
            echo "::error::JAR has no Main-Class in MANIFEST.MF; cannot build a launchable installer."
            exit 1
          fi
          MAIN_CLASS="$(unzip -p "$JAR" META-INF/MANIFEST.MF | tr -d '\r' | awk -F': ' '/^Main-Class:/{print $2}')"
          echo "APP_MAIN_CLASS=$MAIN_CLASS" >> "$GITHUB_ENV"

      - name: Build runnable JAR (Windows)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Product name derived from a documented var with a sane default.
          $appName = if ($env:PRODUCT_NAME) { $env:PRODUCT_NAME } elseif ("${{ vars.PRODUCT_NAME }}") { "${{ vars.PRODUCT_NAME }}" } else { "InstallerTestApp" }
          "APP_NAME=$appName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if (Test-Path mvnw.cmd)      { .\mvnw.cmd -B -ntp package -DskipTests }
          elseif (Test-Path pom.xml)   { mvn -B -ntp package -DskipTests }
          elseif (Test-Path gradlew.bat) { .\gradlew.bat --no-daemon clean build -x test }
          elseif ((Test-Path build.gradle) -or (Test-Path build.gradle.kts)) { gradle --no-daemon clean build -x test }
          else { Write-Error "No Maven/Gradle build descriptor found for java-jar type."; exit 1 }
          if ($LASTEXITCODE -ne 0) { Write-Error "Build failed."; exit 1 }
          $jar = Get-ChildItem -Recurse -Path target,build/libs -Filter *.jar -ErrorAction SilentlyContinue |
                 Where-Object { $_.Name -notmatch 'sources|javadoc|original-' } |
                 Sort-Object FullName | Select-Object -Last 1
          if (-not $jar) { Write-Error "Build completed but no runnable JAR was found."; exit 1 }
          Write-Host "Found JAR: $($jar.FullName)"
          if (Test-Path jp-input) { Remove-Item -Recurse -Force jp-input }
          New-Item -ItemType Directory -Path jp-input | Out-Null
          Copy-Item $jar.FullName jp-input/app.jar
          $manifest = (jar xf $jar.FullName META-INF/MANIFEST.MF) 2>$null
          $mfText = Get-Content META-INF/MANIFEST.MF -Raw
          $mainLine = ($mfText -split "`r?`n" | Where-Object { $_ -match '^Main-Class:' })
          if (-not $mainLine) { Write-Error "JAR has no Main-Class in MANIFEST.MF; cannot build a launchable installer."; exit 1 }
          $mainClass = ($mainLine -replace '^Main-Class:\s*','').Trim()
          "APP_MAIN_CLASS=$mainClass" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ---------------------------------------------------------------------------
      # Build the NATIVE INSTALLER with jpackage. One step per OS (G4: idiomatic).
      # ---------------------------------------------------------------------------
      - name: jpackage installer (Linux .deb)
        if: matrix.type == 'java-jar' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          jpackage --type deb --name "${APP_NAME}" --app-version 1.0.0 --input jp-input --main-jar app.jar --main-class "${APP_MAIN_CLASS}" --dest dist --linux-package-name "${LINUX_PKG}" --linux-shortcut
          DEB="$(find dist -maxdepth 1 -name '*.deb' | head -n1)"
          if [ -z "${DEB:-}" ] || [ ! -f "$DEB" ]; then
            echo "::error::jpackage did not produce a .deb artifact."; exit 1
          fi
          echo "Built installer: $DEB ($(du -h "$DEB" | cut -f1))"
          echo "INSTALLER_PATH=$DEB" >> "$GITHUB_ENV"

      - name: jpackage installer (macOS .dmg)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          jpackage --type dmg --name "${APP_NAME}" --app-version 1.0.0 --input jp-input --main-jar app.jar --main-class "${APP_MAIN_CLASS}" --dest dist
          DMG="$(find dist -maxdepth 1 -name '*.dmg' | head -n1)"
          if [ -z "${DMG:-}" ] || [ ! -f "$DMG" ]; then
            echo "::error::jpackage did not produce a .dmg artifact."; exit 1
          fi
          echo "Built installer: $DMG ($(du -h "$DMG" | cut -f1))"
          echo "INSTALLER_PATH=$DMG" >> "$GITHUB_ENV"

      - name: jpackage installer (Windows .msi)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & jpackage `
            --type msi `
            --name "$env:APP_NAME" `
            --app-version 1.0.0 `
            --input jp-input `
            --main-jar app.jar `
            --main-class "$env:APP_MAIN_CLASS" `
            --dest dist `
            --win-per-user-install `
            --win-menu `
            --win-dir-chooser
          if ($LASTEXITCODE -ne 0) { Write-Error "jpackage failed to build the .msi."; exit 1 }
          $msi = Get-ChildItem dist -Filter *.msi | Select-Object -First 1
          if (-not $msi) { Write-Error "jpackage did not produce a .msi artifact."; exit 1 }
          Write-Host "Built installer: $($msi.FullName) ($([math]::Round($msi.Length/1MB,1)) MB)"
          "INSTALLER_PATH=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ---------------------------------------------------------------------------
      # G8: SIGNING/NOTARIZATION structural check (WARN, never hard-fail on public CI).
      # ---------------------------------------------------------------------------
      - name: Signature / notarization check (macOS, WARN only)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        run: |
          set -uo pipefail
          echo "::group::Gatekeeper / codesign status (informational)"
          if spctl -a -vvv -t open --context context:primary-signature "${INSTALLER_PATH}" 2>&1; then
            echo "spctl: assessment passed."
          else
            echo "::warning::DMG not notarized/accepted by Gatekeeper (expected on public CI without signing secrets)."
          fi
          if codesign -dv --verbose=4 "${INSTALLER_PATH}" 2>&1; then
            echo "codesign: signature present."
          else
            echo "::warning::DMG is unsigned (expected without APPLE_DEVELOPER_ID secrets)."
          fi
          echo "::endgroup::"

      - name: Signature check (Windows Authenticode, WARN only)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $sig = Get-AuthenticodeSignature "$env:INSTALLER_PATH"
          Write-Host "Authenticode status: $($sig.Status)"
          if ($sig.Status -ne 'Valid') {
            Write-Warning "MSI is not Authenticode-signed (expected on public CI without a code-signing cert). SmartScreen would warn end users."
          } else {
            Write-Host "MSI is validly signed by: $($sig.SignerCertificate.Subject)"
          }

      # ---------------------------------------------------------------------------
      # G6 (prep): UPGRADE — install a REAL previous release FIRST to create dirty
      # state. Graceful skip if no prior release / no matching asset exists.
      # ---------------------------------------------------------------------------
      - name: Install previous release for upgrade test (Linux)
        if: matrix.type == 'java-jar' && runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "${TAG:-}" ]; then
            echo "PREV_INSTALLED=false" >> "$GITHUB_ENV"
            echo "::notice::SKIPPED upgrade dirty-state: no prior release exists; upgrade will run as clean install."
            exit 0
          fi
          echo "Downloading previous release $TAG"
          # Distinguish "no matching asset" (legit skip) from a real API/download error
          # (must FAIL). Capture the asset list first so a gh API failure hard-fails
          # here instead of being swallowed by the asset-presence test below.
          ASSETS="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          if echo "$ASSETS" | grep -q '\.deb$'; then
            # A .deb asset exists -> any download failure is a HARD error, never a skip.
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern '*.deb' --dir prev
          else
            echo "PREV_INSTALLED=false" >> "$GITHUB_ENV"
            echo "::notice::SKIPPED upgrade dirty-state: release $TAG has no .deb asset."
            exit 0
          fi
          PREV_DEB="$(find prev -name '*.deb' | head -n1)"
          if [ -z "${PREV_DEB:-}" ] || [ ! -f "$PREV_DEB" ]; then
            echo "::error::Prior .deb download reported success but no file is present."; exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y "./$PREV_DEB"
          echo "PREV_INSTALLED=true" >> "$GITHUB_ENV"
          echo "Previous version installed; binary present: $(ls -l "/opt/${LINUX_PKG}/bin/" || true)"

      - name: Install previous release for upgrade test (macOS)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "${TAG:-}" ]; then
            echo "PREV_INSTALLED=false" >> "$GITHUB_ENV"
            echo "::notice::SKIPPED upgrade dirty-state: no prior release exists; upgrade will run as clean install."
            exit 0
          fi
          # Distinguish "no matching asset" (legit skip) from an API/download error
          # (FAIL). Capture asset list first so a gh API failure is not swallowed.
          ASSETS="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          if echo "$ASSETS" | grep -q '\.dmg$'; then
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern '*.dmg' --dir prev
          else
            echo "PREV_INSTALLED=false" >> "$GITHUB_ENV"
            echo "::notice::SKIPPED upgrade dirty-state: release $TAG has no .dmg asset."
            exit 0
          fi
          PREV_DMG="$(find prev -name '*.dmg' | head -n1)"
          if [ -z "${PREV_DMG:-}" ] || [ ! -f "$PREV_DMG" ]; then
            echo "::error::Prior .dmg download reported success but no file is present."; exit 1
          fi
          MNT="$(hdiutil attach "$PREV_DMG" -nobrowse -readonly | awk '/Volumes/{print $3; exit}')"
          sudo cp -R "$MNT/${APP_NAME}.app" /Applications/
          hdiutil detach "$MNT" || true
          # Strip Gatekeeper quarantine so an unsigned prior release does not hard-fail
          # if launched before the upgrade overwrites it (G8 stays warn-only).
          sudo xattr -dr com.apple.quarantine "/Applications/${APP_NAME}.app" || true
          echo "PREV_INSTALLED=true" >> "$GITHUB_ENV"
          test -d "/Applications/${APP_NAME}.app" || { echo "::error::Previous .app not staged."; exit 1; }

      - name: Install previous release for upgrade test (Windows)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = (gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          if (-not $tag) {
            "PREV_INSTALLED=false" | Out-File $env:GITHUB_ENV -Append
            Write-Host "::notice::SKIPPED upgrade dirty-state: no prior release exists; upgrade will run as clean install."
            exit 0
          }
          # Distinguish "no .msi asset" (legit skip) from a real download error (FAIL).
          $assets = (gh release view $tag --repo "${{ github.repository }}" --json assets --jq '.assets[].name')
          if (-not ($assets | Select-String -Pattern '\.msi$' -Quiet)) {
            "PREV_INSTALLED=false" | Out-File $env:GITHUB_ENV -Append
            Write-Host "::notice::SKIPPED upgrade dirty-state: release $tag has no .msi asset."
            exit 0
          }
          gh release download $tag --repo "${{ github.repository }}" --pattern '*.msi' --dir prev
          if ($LASTEXITCODE -ne 0) { Write-Error "Prior .msi download failed (exit $LASTEXITCODE)."; exit 1 }
          $prev = Get-ChildItem prev -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $prev) { Write-Error "Prior .msi download reported success but no file is present."; exit 1 }
          $p = Start-Process msiexec -ArgumentList "/i `"$($prev.FullName)`" /qn /norestart" -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "Previous MSI install failed (exit $($p.ExitCode))."; exit 1 }
          "PREV_INSTALLED=true" | Out-File $env:GITHUB_ENV -Append

      # ---------------------------------------------------------------------------
      # INSTALL the freshly built installer. On a clean machine this is install;
      # when PREV_INSTALLED=true it is a genuine UPGRADE over dirty state (G6).
      # G1: exit codes asserted on every installer invocation.
      # ---------------------------------------------------------------------------
      - name: Install / upgrade (Linux .deb, system scope)
        if: matrix.type == 'java-jar' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y "${INSTALLER_PATH}"   # dpkg upgrade-in-place if prev present
          test -x "/opt/${LINUX_PKG}/bin/${APP_NAME}" || { echo "::error::Installed launcher missing after install."; exit 1; }
          echo "Install OK. Upgrade-over-prev: ${PREV_INSTALLED:-false}"

      - name: Install / upgrade (macOS .dmg, user/Applications scope)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          MNT="$(hdiutil attach "${INSTALLER_PATH}" -nobrowse | awk '/Volumes/{print $3; exit}')"
          # Real upgrade semantics: replace any prior .app in place.
          sudo rm -rf "/Applications/${APP_NAME}.app"
          sudo cp -R "$MNT/${APP_NAME}.app" /Applications/
          hdiutil detach "$MNT" || true
          test -d "/Applications/${APP_NAME}.app" || { echo "::error::.app not present in /Applications after install."; exit 1; }
          echo "Install OK. Upgrade-over-prev: ${PREV_INSTALLED:-false}"

      - name: Install / upgrade (Windows .msi, per-user scope)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $log = "$env:RUNNER_TEMP\install.log"
          $p = Start-Process msiexec -ArgumentList "/i `"$env:INSTALLER_PATH`" /qn /norestart /l*v `"$log`"" -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Host "----- MSI log tail -----"; Get-Content $log -Tail 40
            Write-Error "MSI install/upgrade failed (exit $($p.ExitCode))."; exit 1
          }
          $exe = Get-ChildItem "$env:LOCALAPPDATA\$env:APP_NAME","$env:ProgramFiles\$env:APP_NAME" -Recurse -Filter "$($env:APP_NAME).exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { Write-Error "Installed $($env:APP_NAME).exe not found after install."; exit 1 }
          "APP_EXE=$($exe.FullName)" | Out-File $env:GITHUB_ENV -Append
          Write-Host "Install OK at $($exe.FullName). Upgrade-over-prev: $env:PREV_INSTALLED"

      # ---------------------------------------------------------------------------
      # G5: REAL LAUNCH of the installed app. jpackage apps are launchable native
      # binaries; we start the process headless and assert it actually runs.
      # (Console apps exit 0; GUI apps are launched under a display and probed alive.)
      # ---------------------------------------------------------------------------
      - name: Launch / smoke-verify (Linux, headless via xvfb)
        if: matrix.type == 'java-jar' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y xvfb
          BIN="/opt/${LINUX_PKG}/bin/${APP_NAME}"
          test -x "$BIN" || { echo "::error::Installed launcher $BIN missing/not executable."; exit 1; }
          set +e
          # Launch under a virtual display. Do NOT trust the xvfb-run wrapper's PID/exit:
          # a 124 timeout only means *something* under the wrapper survived. Probe the
          # REAL app process by its full install path before deciding success.
          timeout 25s xvfb-run -a "$BIN" >launch.out 2>&1 &
          WRAPPER_PID=$!
          # Give the JVM a moment to fork the real launcher under the wrapper.
          sleep 10
          if pgrep -f "$BIN" >/dev/null; then
            # GUI app: the real installed binary is alive (verified by full path).
            echo "Launch verified: installed app process alive ($BIN)."
            pkill -f "$BIN" || true
            kill "$WRAPPER_PID" 2>/dev/null || true
            wait "$WRAPPER_PID" 2>/dev/null || true
          else
            # Not alive: either a console app that exited cleanly, or a real crash.
            wait "$WRAPPER_PID"
            rc=$?
            cat launch.out || true
            if [ "$rc" -eq 0 ]; then
              echo "Launch verified: console app ran and exited cleanly (0)."
            else
              echo "::error::Installed app failed to launch (no live process; exit=$rc)."; exit 1
            fi
          fi

      - name: Launch / smoke-verify (macOS)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          BIN="/Applications/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
          test -x "$BIN" || { echo "::error::Installed launcher $BIN missing/not executable."; exit 1; }
          open -g "/Applications/${APP_NAME}.app"
          sleep 8
          # Match the FULL absolute launcher path so we cannot false-pass on an
          # unrelated process that merely shares a basename substring.
          if pgrep -f "$BIN" >/dev/null; then
            echo "Launch verified: process is alive ($BIN)."
            pkill -f "$BIN" || true
          else
            # Console-style jpackage app may have already exited cleanly; verify the
            # launcher binary at least executes without crashing.
            "$BIN" & APP_PID=$!
            sleep 5
            if kill -0 "$APP_PID" 2>/dev/null; then echo "Launch verified (alive)."; kill "$APP_PID" || true;
            else
              wait "$APP_PID"; rc=$?
              if [ "$rc" -eq 0 ]; then echo "Launch verified: console app exited cleanly (0).";
              else echo "::error::Installed app did not stay alive and no clean run detected (exit=$rc)."; exit 1; fi
            fi
          fi

      - name: Launch / smoke-verify (Windows)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $proc = Start-Process -FilePath "$env:APP_EXE" -PassThru
          Start-Sleep -Seconds 8
          $live = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if ($live) {
            Write-Host "Launch verified: process alive (PID $($proc.Id))."
            Stop-Process -Id $proc.Id -Force
          }
          elseif ($proc.HasExited -and $proc.ExitCode -eq 0) {
            Write-Host "Launch verified: console app exited cleanly (0)."
          }
          else {
            Write-Error "Installed app failed to launch (exit $($proc.ExitCode))."; exit 1
          }

      # ---------------------------------------------------------------------------
      # G7: UNINSTALL, then NEGATIVE-ASSERT full removal (fail if anything remains).
      # ---------------------------------------------------------------------------
      - name: Uninstall + verify removal (Linux)
        if: matrix.type == 'java-jar' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get remove -y "${LINUX_PKG}"
          sudo apt-get purge -y "${LINUX_PKG}" || true
          if [ -e "/opt/${LINUX_PKG}/bin/${APP_NAME}" ] || [ -d "/opt/${LINUX_PKG}" ]; then
            echo "::error::Files remain under /opt/${LINUX_PKG} after uninstall."; exit 1
          fi
          if dpkg -s "${LINUX_PKG}" >/dev/null 2>&1; then
            echo "::error::Package still registered with dpkg after uninstall."; exit 1
          fi
          echo "Uninstall verified: package and files fully removed."
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (macOS)
        if: matrix.type == 'java-jar' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf "/Applications/${APP_NAME}.app"
          if [ -d "/Applications/${APP_NAME}.app" ]; then
            echo "::error::.app still present after uninstall."; exit 1
          fi
          echo "Uninstall verified: /Applications/${APP_NAME}.app removed."
          echo "LIFECYCLE_OK=1" >> "$GITHUB_ENV"

      - name: Uninstall + verify removal (Windows)
        if: matrix.type == 'java-jar' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $log = "$env:RUNNER_TEMP\uninstall.log"
          # Resolve ProductCode from the freshly built MSI for a reliable silent uninstall.
          $p = Start-Process msiexec -ArgumentList "/x `"$env:INSTALLER_PATH`" /qn /norestart /l*v `"$log`"" -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Host "----- uninstall log tail -----"; Get-Content $log -Tail 40
            Write-Error "MSI uninstall failed (exit $($p.ExitCode))."; exit 1
          }
          if (Test-Path "$env:APP_EXE") {
            Write-Error "$($env:APP_NAME).exe still present after uninstall: $env:APP_EXE"; exit 1
          }
          $still = Get-ChildItem "$env:LOCALAPPDATA\$env:APP_NAME","$env:ProgramFiles\$env:APP_NAME" -ErrorAction SilentlyContinue
          if ($still) { Write-Error "Install directory still present after uninstall."; exit 1 }
          Write-Host "Uninstall verified: executable and install dir removed."
          "LIFECYCLE_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Upload the built installer so other jobs / future upgrade tests can consume it.
      - name: Upload installer artifact
        if: matrix.type == 'java-jar'
        uses: actions/upload-artifact@v4
        with:
          name: java-jar-installer-${{ runner.os }}
          path: dist/*
          if-no-files-found: error


      # ===================== false-pass tripwire =====================
      - name: Assert this leg exercised a real lifecycle (false-pass tripwire)
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          if [ "${LIFECYCLE_OK:-}" != "1" ]; then
            echo "::error::No lifecycle completed for type='${{ matrix.type }}' on '${{ matrix.os }}'. Either every step skipped (a would-be false GREEN) or an earlier step failed. Failing this leg on purpose."
            exit 1
          fi
          echo "Tripwire OK: ${{ matrix.type }} on ${{ matrix.os }} ran a full build/install/launch/uninstall lifecycle."
